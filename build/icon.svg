<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161820"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b2c"/>
      <stop offset="100%" stop-color="#a34418"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="80" y="80" width="864" height="864" rx="180" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="180" fill="none" stroke="rgba(255,107,44,0.15)" stroke-width="3"/>
  <!-- Glow under "B+" -->
  <text x="512" y="640" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="500" text-anchor="middle" fill="url(#accent)" filter="url(#glow)" opacity="0.5">B+</text>
  <!-- Main "B+" -->
  <text x="512" y="640" font-family="Helvetica, Arial, sans-serif" font-weight="900" font-size="500" text-anchor="middle" fill="url(#accent)" letter-spacing="-20">B+</text>
  <!-- Bottom underline accent -->
  <rect x="280" y="780" width="464" height="6" rx="3" fill="#ff6b2c" opacity="0.7"/>
  <rect x="380" y="800" width="264" height="3" rx="1.5" fill="#ff6b2c" opacity="0.4"/>
</svg>

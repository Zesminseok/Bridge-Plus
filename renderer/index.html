}

/* patchDeck: replace a single deck's DOM without touching other decks' WebGL */
function patchDeck(slot){
  const el=document.getElementById('dk'+slot);
  if(!el)return; // deck element doesn't exist → need full renderDecks
  const d=DECKS[slot];if(!d)return;
  // Destroy only THIS deck's GL contexts
  if(d.wgl){try{d.wgl.destroy();}catch(_){}d.wgl=null;}
  if(d.ovgl){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}
  d._wovOlCtx=null;
  // Replace just this deck's HTML
  const tmp=document.createElement('div');
  tmp.innerHTML=deckHTML(slot);
  const newEl=tmp.firstElementChild;
  el.replaceWith(newEl);
  bindDeck(slot);
  // Restore expanded state
  if(_expandedSlot===slot){newEl.classList.add('dk-wide');}
}

function bindDeck(slot){
  const el=document.getElementById('dk'+slot);if(!el)return;
  const d=DECKS[slot];
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dov');});
  el.addEventListener('dragleave',()=>el.classList.remove('dov'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('dov');
    const f=e.dataTransfer.files[0];
    if(f&&(f.type.startsWith('audio/')||f.type.startsWith('video/')||/\.(mp3|wav|flac|aac|ogg|m4a|aiff?|mp4|mkv|mka|dts|dtshd|truehd|thd|eac3|ac3)$/i.test(f.name)))loadFile(slot,f);
  });
  // Click to open file picker
  const ddzEl=el.querySelector('.ddz[data-a="open"]');
  if(ddzEl){ddzEl.addEventListener('click',()=>{
    const inp=document.createElement('input');inp.type='file';
    inp.accept='audio/*,video/mp4,.mp3,.wav,.flac,.aac,.ogg,.m4a,.aiff,.aif,.mp4,.mkv,.mka,.dts,.dtshd,.truehd,.thd,.eac3,.ac3';
    inp.onchange=()=>{const f=inp.files[0];if(f)loadFile(slot,f);};
    inp.click();
  });}
  // Overview canvas: click → seek
  document.getElementById('dwov'+slot)?.addEventListener('click',e=>{
    const r=e.target.closest('.dwov');if(!r)return;
    const rc=r.getBoundingClientRect();doSeek(slot,Math.max(0,Math.min(1,(e.clientX-rc.left)/rc.width)));
  });
  // Zoom canvas: vinyl scratch simulation
  // Physics: drag speed → playbackRate, stationary platter → silence, release → accelerate to 1.0
  const wzDiv=document.getElementById('dwz'+slot);
  if(wzDiv){
    let _drag=null, _vel=0, _raf=null, _lastMoveT=0, _lastSeek=0;
    // Vinyl motor loop — runs at 60fps during scratch
    // Simulates platter inertia: velocity decays when mouse stops, accelerates to 1.0 after release
    const _vinylTick=()=>{
      _raf=null;
      const d2=DECKS[slot];if(!d2)return;
      const au=d2.au;
      if(d2.scratch){
        // During scratch: decay velocity if mouse has been still >35ms (platter friction)
        if(!_drag||performance.now()-_lastMoveT>35) _vel*=0.80;
        if(au){
          if(_vel<0.08){
            // Below Chromium minimum rate (~0.0625) — just pause (don't set rate)
            if(!au.paused)au.pause();
          } else {
            try{au.playbackRate=Math.min(4.0,Math.max(0.08,_vel));}catch(_){}
            if(au.paused&&au.readyState>=2)au.play().catch(()=>{});
          }
        }
        if(_vel>0.003||performance.now()-_lastMoveT<100) _raf=requestAnimationFrame(_vinylTick);
      } else {
        // After release: motor spin-up — gradually accelerate playbackRate to 1.0
        if(au&&!au.paused&&d2.pl){
          const cur=au.playbackRate;
          if(cur<0.98){
            au.playbackRate=Math.min(1.0,cur*1.25+0.05); // fast acceleration
            _raf=requestAnimationFrame(_vinylTick);
          } else {
            au.playbackRate=1.0;
          }
        }
      }
    };
    wzDiv.addEventListener('pointerdown',e=>{
      if(e.target.closest('.dzb'))return;
      e.preventDefault();
      const d2=DECKS[slot];if(!d2||!d2.ld)return;
      DECKS[slot].scratch=true; _vel=0; _lastMoveT=performance.now(); _lastSeek=0;
      _drag={startX:e.clientX,startPos:d2.pos,lastX:e.clientX,lastT:performance.now()};
      wzDiv.setPointerCapture(e.pointerId);
      // Platter down: immediately pause audio (vinyl stop effect)
      if(d2.au&&!d2.au.paused){try{d2.au.pause();}catch(_){}}
      if(!_raf)_raf=requestAnimationFrame(_vinylTick);
    });
    wzDiv.addEventListener('pointermove',e=>{
      if(!_drag)return;
      const d2=DECKS[slot];if(!d2||d2.type==='hw')return;
      const rc=wzDiv.getBoundingClientRect(),msPerPx=(DECKS[slot]?.zoomMs||8000)/rc.width;
      const newMs=Math.max(0,Math.min(d2.dur,_drag.startPos-(e.clientX-_drag.startX)*msPerPx));
      d2.pos=newMs;
      // Throttle seeks to ≤1 per 80ms — prevents audio buffer tearing at 60fps
      const _now=performance.now();
      if(d2.au&&_now-_lastSeek>80){d2.au.currentTime=newMs/1000;_lastSeek=_now;}
      const now=performance.now(),dt=Math.max(1,now-_drag.lastT),dx=e.clientX-_drag.lastX;
      _drag.lastX=e.clientX;_drag.lastT=now;
      // Target velocity = |drag px/ms × ms_track/px| = playbackRate (dimensionless)
      const targetVel=Math.abs((dx/dt)*msPerPx);
      _vel=_vel*0.3+targetVel*0.7; // low-pass: fast response to new speed
      _lastMoveT=now;
      if(!_raf)_raf=requestAnimationFrame(_vinylTick);
    });
    wzDiv.addEventListener('pointerup',()=>{
      _drag=null; DECKS[slot].scratch=false;
      const d2=DECKS[slot];
      if(d2?.au){
        // Platter release: restore playbackRate to 1.0 and resume if was playing
        d2.au.playbackRate=1.0;
        d2.au.currentTime=(d2.pos||0)/1000;
        if(d2.pl){d2.au.play().catch(()=>{});}
        else{d2.au.pause();}
      }
      _vel=0; if(_raf){cancelAnimationFrame(_raf);_raf=null;}
    });
    wzDiv.addEventListener('pointercancel',()=>{
      _drag=null;_vel=0;DECKS[slot].scratch=false;
      if(_raf){cancelAnimationFrame(_raf);_raf=null;}
      const d2=DECKS[slot];
      if(d2?.au){d2.au.playbackRate=1.0;if(d2.pl)d2.au.play().catch(()=>{});}
    });
  }
  // Virtual fader drag control — click/drag on F bar to set fader level
  const faderEl=el.querySelector('.dvu-fader');
  if(faderEl&&d.type!=='hw'){
    faders[slot]=255; // default fader up
    window.bridge.setFader?.(slot,255);
    const _setFaderFromY=(e)=>{
      const bar=faderEl.querySelector('.dvu-hbar');if(!bar)return;
      const rc=bar.getBoundingClientRect();
      const pct=1-Math.max(0,Math.min(1,(e.clientY-rc.top)/rc.height));
      const val=Math.round(pct*255);
      faders[slot]=val;
      window.bridge.setFader?.(slot,val);
      const fill=document.getElementById('dvuF'+slot);
      if(fill)fill.style.height=Math.round(pct*100)+'%';
    };
    faderEl.addEventListener('pointerdown',e=>{
      e.preventDefault();_setFaderFromY(e);
      faderEl.setPointerCapture(e.pointerId);
      const _move=ev=>_setFaderFromY(ev);
      const _up=()=>{faderEl.removeEventListener('pointermove',_move);faderEl.removeEventListener('pointerup',_up);};
      faderEl.addEventListener('pointermove',_move);
      faderEl.addEventListener('pointerup',_up);
    });
  }
  // CUE button — pointerdown/up for hold-to-cue behaviour
  const cb=el.querySelector('[data-a="cue"]');
  if(cb&&d.type!=='hw'){
    cb.addEventListener('pointerdown',ev=>{ev.preventDefault();doCueDown(slot);});
    cb.addEventListener('pointerup',ev=>{ev.preventDefault();doCueUp(slot);});
    cb.addEventListener('pointerleave',()=>{if(DECKS[slot]?.cu&&!DECKS[slot]?.pl)doCueUp(slot);});
  }
  // init overview canvas — size-guarded to avoid unnecessary WebGL context reset
  if(document.getElementById('wov'+slot)){
    setTimeout(()=>{
      const wov=document.getElementById('wov'+slot);
      if(!wov)return;
      const p=wov.parentElement;
      const w=p?.offsetWidth||280, h=p?.offsetHeight||14;
      // Destroy if canvas element changed (DOM rebuild) OR dimensions differ
      const ovCanvasChanged=d.ovgl&&d.ovgl.gl.canvas!==wov;
      if(ovCanvasChanged){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}
      // Only set canvas size if actually different — setting canvas.width ALWAYS resets WebGL!
      if(wov.width!==w||wov.height!==h){
        if(d.ovgl){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}
        wov.width=w; wov.height=h;
      }
      if(!d.ovgl){
        try{
          d.ovgl=new OverviewGL(wov); d.wovCtx=null;
          const _wfD=d.rgbWfDetail||d.rgbWf;
          if(_wfD){d.ovgl.setData(_wfD);drawOverview(slot,d.dur>0&&d.pos>0?d.pos/d.dur:0);}
        }catch(e){console.warn('[WGL] fallback 2D overview:',e);d.wovCtx=wov.getContext('2d');}
      }
      // Init overview overlay canvas for cue/loop markers
      const wovol=document.getElementById('wovol'+slot);
      if(wovol&&(wovol.width!==w||wovol.height!==h)){
        wovol.width=w;wovol.height=h;d._wovOlCtx=wovol.getContext('2d');
      }
    },0);
  }
  // init zoom canvas — size-guarded to avoid unnecessary WebGL context reset
  if(document.getElementById('wzc'+slot)){
    setTimeout(()=>{
      const wzc=document.getElementById('wzc'+slot);
      if(!wzc)return;
      const p=wzc.parentElement;
      const w=p?.offsetWidth||280, h=p?.offsetHeight||64;
      // Destroy if canvas element changed (DOM rebuild) OR dimensions differ
      const wglCanvasChanged=d.wgl&&d.wgl.gl.canvas!==wzc;
      if(wglCanvasChanged){try{d.wgl.destroy();}catch(_){}d.wgl=null;}
      // Only set canvas size if actually different — setting canvas.width ALWAYS resets WebGL!
      if(wzc.width!==w||wzc.height!==h){
        if(d.wgl){try{d.wgl.destroy();}catch(_){}d.wgl=null;}
        wzc.width=w; wzc.height=h;
      }
      if(!d.wgl){
        try{
          d.wgl=new WaveformGL(wzc); d.wzCtx=null;
          const _wfD=d.rgbWfDetail||d.rgbWf;
          if(_wfD){d.wgl.setData(_wfD,(_wfD.length/150*1000)||1);drawZoomWaveform(slot,d.dur>0&&d.pos>0?d.pos/d.dur:0);}
          const wzov=document.getElementById('wzov'+slot);
          if(wzov){wzov.width=w;wzov.height=h;d.wovCtx2=wzov.getContext('2d');}
        }catch(e){
          console.warn('[WGL] fallback 2D zoom:',e);
          const wzc2=document.getElementById('wzc'+slot);
          if(wzc2)d.wzCtx=wzc2.getContext('2d');
          const wzov=document.getElementById('wzov'+slot);
          if(wzov){wzov.width=w;wzov.height=h;d.wovCtx2=wzov.getContext('2d');}
        }
      }
    },0);
  }
}

// ID3v2 tag parser — TIT2 (title), TPE1/TPE2 (artist), APIC (album art)
function _id3DecodeText(fdata){
  const enc=fdata[0];let txt='';
  if(enc===0){for(let i=1;i<fdata.length;i++){if(fdata[i]===0)break;txt+=String.fromCharCode(fdata[i]);}}
  else if(enc===1){let s=1,le=true;if(fdata.length>2&&fdata[1]===0xFF&&fdata[2]===0xFE){le=true;s=3;}else if(fdata.length>2&&fdata[1]===0xFE&&fdata[2]===0xFF){le=false;s=3;}for(let i=s;i+1<fdata.length;i+=2){const c=le?(fdata[i]|fdata[i+1]<<8):(fdata[i]<<8|fdata[i+1]);if(c===0)break;txt+=String.fromCharCode(c);}}
  else if(enc===2){for(let i=1;i+1<fdata.length;i+=2){const c=(fdata[i]<<8|fdata[i+1]);if(c===0)break;txt+=String.fromCharCode(c);}}
  else if(enc===3){txt=new TextDecoder('utf-8').decode(fdata.slice(1));const ni=txt.indexOf('\0');if(ni>=0)txt=txt.slice(0,ni);}
  return txt.trim();
}

async function readID3Tags(file){
  const tags={title:'',artist:'',art:null,key:'',bpm:0};
  try{
    const buf=await file.slice(0,Math.min(file.size,524288)).arrayBuffer();
    const view=new DataView(buf);
    let id3Start=0;
    // AIFF: ID3v2 lives inside an 'ID3 ' chunk (may be at end of file)
    if(view.getUint32(0,false)===0x464F524D){ // "FORM"
      const formType=String.fromCharCode(view.getUint8(8),view.getUint8(9),view.getUint8(10),view.getUint8(11));
      if(formType==='AIFF'||formType==='AIFC'){
        // scan all chunks — ID3 tag may appear after the large SSND chunk
        const id3Off=await _findAIFFId3(file);
        if(id3Off<0)return tags;
        const id3Buf=await file.slice(id3Off,id3Off+524288).arrayBuffer();
        const id3V=new DataView(id3Buf);
        if(id3V.getUint8(0)!==0x49||id3V.getUint8(1)!==0x44||id3V.getUint8(2)!==0x33)return tags;
        const id3ver=id3V.getUint8(3);
        const id3sz=(id3V.getUint8(6)&0x7F)<<21|(id3V.getUint8(7)&0x7F)<<14|(id3V.getUint8(8)&0x7F)<<7|(id3V.getUint8(9)&0x7F);
        let ip=10;const ie=Math.min(10+id3sz,id3Buf.byteLength);
        while(ip+10<ie){
          const fid=String.fromCharCode(id3V.getUint8(ip),id3V.getUint8(ip+1),id3V.getUint8(ip+2),id3V.getUint8(ip+3));
          if(fid[0]==='\0')break;
          let fsz=id3ver===4?(id3V.getUint8(ip+4)&0x7F)<<21|(id3V.getUint8(ip+5)&0x7F)<<14|(id3V.getUint8(ip+6)&0x7F)<<7|(id3V.getUint8(ip+7)&0x7F):id3V.getUint32(ip+4,false);
          if(fsz<=0||ip+10+fsz>ie)break;
          const fdata=new Uint8Array(id3Buf,ip+10,fsz);
          if(fid==='TIT2'||fid==='TPE1'||fid==='TPE2'||fid==='TKEY'||fid==='TBPM'){const txt=_id3DecodeText(fdata);if(fid==='TIT2'&&txt)tags.title=txt;if(fid==='TPE1'&&txt)tags.artist=txt;if(fid==='TPE2'&&txt&&!tags.artist)tags.artist=txt;if(fid==='TKEY'&&txt)tags.key=txt;if(fid==='TBPM'&&txt){const b=parseFloat(txt);if(b>0)tags.bpm=b;}}
          if(fid==='APIC'&&!tags.art){try{const enc=fdata[0];let o=1;let mime='';while(o<fdata.length&&fdata[o]!==0){mime+=String.fromCharCode(fdata[o]);o++;}o++;o++;if(enc===0||enc===3){while(o<fdata.length&&fdata[o]!==0)o++;o++;}else{while(o+1<fdata.length){if(fdata[o]===0&&fdata[o+1]===0){o+=2;break;}o+=2;}}if(o<fdata.length){const imgData=fdata.slice(o);if(!mime||mime==='image/')mime=imgData[0]===0x89?'image/png':'image/jpeg';const blob=new Blob([imgData],{type:mime});tags.art=URL.createObjectURL(blob);tags._artRaw=imgData;}}catch(_){}}
          ip+=10+fsz;
        }
        return tags;
      }
    }
    // ID3v2 header check: "ID3"
    if(view.getUint8(id3Start)!==0x49||view.getUint8(id3Start+1)!==0x44||view.getUint8(id3Start+2)!==0x33) return tags;
    const ver=view.getUint8(id3Start+3);
    const sz=(view.getUint8(id3Start+6)&0x7F)<<21|(view.getUint8(id3Start+7)&0x7F)<<14|(view.getUint8(id3Start+8)&0x7F)<<7|(view.getUint8(id3Start+9)&0x7F);
    let pos=id3Start+10;
    const end=Math.min(id3Start+10+sz,buf.byteLength);
    while(pos+10<end){
      const fid=String.fromCharCode(view.getUint8(pos),view.getUint8(pos+1),view.getUint8(pos+2),view.getUint8(pos+3));
      if(fid[0]==='\0') break;
      let fsz;
      if(ver===4) fsz=(view.getUint8(pos+4)&0x7F)<<21|(view.getUint8(pos+5)&0x7F)<<14|(view.getUint8(pos+6)&0x7F)<<7|(view.getUint8(pos+7)&0x7F);
      else fsz=view.getUint32(pos+4);
      if(fsz<=0||pos+10+fsz>end) break;
      const fdata=new Uint8Array(buf,pos+10,fsz);
      if(fid==='TIT2'||fid==='TPE1'||fid==='TPE2'||fid==='TKEY'||fid==='TBPM'){
        const txt=_id3DecodeText(fdata);
        if(fid==='TIT2'&&txt) tags.title=txt;
        if(fid==='TPE1'&&txt) tags.artist=txt;
        if(fid==='TPE2'&&txt&&!tags.artist) tags.artist=txt;
        if(fid==='TKEY'&&txt) tags.key=txt;
        if(fid==='TBPM'&&txt){const b=parseFloat(txt);if(b>0)tags.bpm=b;}
      }
      // APIC: album art (front cover preferred)
      if(fid==='APIC'&&!tags.art){
        try{
          const enc=fdata[0];let o=1;
          let mime='';while(o<fdata.length&&fdata[o]!==0){mime+=String.fromCharCode(fdata[o]);o++;}o++; // null-terminate
          const picType=fdata[o];o++;
          // skip description string
          if(enc===0||enc===3){while(o<fdata.length&&fdata[o]!==0)o++;o++;}
          else{while(o+1<fdata.length){if(fdata[o]===0&&fdata[o+1]===0){o+=2;break;}o+=2;}}
          if(o<fdata.length){
            const imgData=fdata.slice(o);
            // Detect MIME by magic bytes (more reliable than APIC mime string)
            if(imgData[0]===0xFF&&imgData[1]===0xD8) mime='image/jpeg';
            else if(imgData[0]===0x89&&imgData[1]===0x50) mime='image/png';
            else if(imgData[0]===0x47&&imgData[1]===0x49) mime='image/gif';
            else if(!mime||!mime.startsWith('image/')) mime='image/jpeg';
            console.log(`[ID3 APIC] enc=${enc} picType=${picType} mime=${mime} size=${imgData.length} magic=0x${imgData[0].toString(16)}${imgData[1].toString(16)}`);
            const blob=new Blob([imgData],{type:mime});
            tags.art=URL.createObjectURL(blob);
            tags._artRaw=imgData;  // keep raw bytes for virtual dbserver
          }else{console.warn('[ID3 APIC] no image data after header, o='+o+' fdata.length='+fdata.length);}
        }catch(e){console.warn('[ID3 APIC parse error]',e);}
      }
      pos+=10+fsz;
    }
  }catch(e){console.warn('ID3 parse error:',e);}
  return tags;
}

// BPM analysis — Spectral Flux + Generalized Autocorrelation (Rekordbox-style)
// Based on: Tzanetakis DWT method + DJ software best practices
// FFT window=1024, hop=512, spectral flux onset → GAC with √ exponent
// Detect first audio position above -69dB (amplitude ≈ 0.000355) — CDJ/Rekordbox style
function detectAudioStart(ch, sr){
  const threshold=Math.pow(10, -69/20); // -69dB → ~0.000355
  const winSamples=Math.round(sr*0.005); // 5ms window for RMS
  for(let i=0;i<ch.length-winSamples;i+=winSamples){
    let sum=0;
    for(let j=0;j<winSamples;j++){const s=ch[i+j]||0;sum+=s*s;}
    if(Math.sqrt(sum/winSamples)>=threshold) return i/sr*1000; // ms
  }
  return 0;
}

async function analyzeBPM(blob){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
    const ab=await blob.arrayBuffer();
    const buf=await ctx.decodeAudioData(ab);
    ctx.close();
    const ch=buf.getChannelData(0),sr=buf.sampleRate;

    // --- Energy-based onset detection (much faster than DFT) ---
    const hopSz=256, frameSz=1024;
    // Analyse 45 seconds from the middle for stable BPM
    const maxSamples=Math.min(ch.length, sr*45);
    const startSample=Math.max(0, Math.floor((ch.length-maxSamples)/2));
    const nFrames=Math.floor((maxSamples-frameSz)/hopSz);
    if(nFrames<100) return {bpm:0,startMs:0};

    // Low-pass filter for kick detection (< 200Hz)
    const aLP=Math.min(1, 2*Math.PI*200/sr);
    // Compute sub-band energy per frame (kick-focused)
    const energy=new Float32Array(nFrames);
    let lp=0;
    for(let f=0;f<nFrames;f++){
      const off=startSample+f*hopSz;
      let eLow=0,eFull=0;
      for(let i=0;i<frameSz;i++){
        const s=ch[off+i]||0;
        lp+=aLP*(s-lp);
        eLow+=lp*lp;
        eFull+=s*s;
      }
      // Weighted: 70% kick energy + 30% full energy for better transient detection
      energy[f]=0.7*eLow/frameSz + 0.3*eFull/frameSz;
    }

    // Onset detection: energy derivative (positive flux)
    const onset=new Float32Array(nFrames);
    for(let f=1;f<nFrames;f++){
      const d=energy[f]-energy[f-1];
      onset[f]=d>0?d:0;
    }

    // Adaptive threshold: local mean + 1.5*std in 0.5s windows
    const winFrames=Math.round(500/(hopSz/sr*1000));
    const peaks=new Float32Array(nFrames);
    for(let f=0;f<nFrames;f++){
      const lo=Math.max(0,f-winFrames),hi=Math.min(nFrames,f+winFrames);
      let sum=0,sum2=0,cnt=0;
      for(let i=lo;i<hi;i++){sum+=onset[i];sum2+=onset[i]*onset[i];cnt++;}
      const mean=sum/cnt,std=Math.sqrt(sum2/cnt-mean*mean);
      peaks[f]=onset[f]>(mean+1.5*std)?onset[f]:0;
    }

    // Autocorrelation on onset peaks
    const hopMs=hopSz/sr*1000;
    const minLag=Math.round(60000/(200*hopMs)); // 200 BPM
    const maxLag=Math.round(60000/(60*hopMs));   // 60 BPM
    const corrLen=Math.min(nFrames, Math.round(20000/hopMs));
    const corr=new Float32Array(maxLag+1);

    for(let lag=minLag;lag<=Math.min(maxLag,nFrames-1);lag++){
      let c=0;
      for(let i=0;i<corrLen&&i+lag<nFrames;i++) c+=peaks[i]*peaks[i+lag];
      corr[lag]=c;
    }

    // Find peaks in correlation
    const cPeaks=[];
    for(let lag=minLag+1;lag<maxLag&&lag<nFrames-1;lag++){
      if(corr[lag]>corr[lag-1]&&corr[lag]>corr[lag+1]&&corr[lag]>0){
        // Parabolic interpolation for sub-frame precision
        const a2=corr[lag-1],b2=corr[lag],c2=corr[lag+1];
        const denom=a2-2*b2+c2;
        const frac=denom!==0?(a2-c2)/(2*denom):0;
        cPeaks.push({lag:lag+frac,val:b2});
      }
    }
    cPeaks.sort((a,b)=>b.val-a.val);
    if(cPeaks.length===0) return {bpm:0,startMs:0};

    // Octave analysis: check multiples
    let bestLag=cPeaks[0].lag;
    const bestVal=cPeaks[0].val;

    // Check half-lag (double BPM) — prefer faster tempo if strong
    const halfLag=bestLag/2;
    if(halfLag>=minLag){
      // Find correlation near halfLag
      const hIdx=Math.round(halfLag);
      const hVal=corr[Math.max(minLag,Math.min(maxLag,hIdx))]||0;
      if(hVal>bestVal*0.6) bestLag=halfLag;
    }
    // Check 2x lag (half BPM) — if much stronger, use it
    const dblLag=bestLag*2;
    if(dblLag<=maxLag){
      const dIdx=Math.round(dblLag);
      const dVal=corr[Math.max(minLag,Math.min(maxLag,dIdx))]||0;
      if(dVal>bestVal*1.3) bestLag=dblLag;
    }

    let bpm=60000/(bestLag*hopMs);
    // Normalize to 70-180 BPM range (DJ standard for electronic/dance)
    while(bpm>180) bpm/=2;
    while(bpm<70) bpm*=2;
    // Round to nearest 0.1
    bpm=Math.round(bpm*10)/10;

    // Detect audio start at -69dB
    const startMs=detectAudioStart(ch,sr);

    return {bpm, startMs};
  }catch(e){console.warn('[BPM]',e);return {bpm:0,startMs:0};}
}

function loadFile(slot,f){
  const d=DECKS[slot];if(!d)return;
  if(d.type==='hw'){console.warn('[loadFile] HW 모드 덱에 파일 로드 차단');return;}
  if(d.au){d.au.pause();URL.revokeObjectURL(d.au.src);d.au=null;}
  if(d.artUrl){URL.revokeObjectURL(d.artUrl);d.artUrl=null;}
  d.art=null;         // clear dbserver-fetched artwork (HW/virtual)
  d._artRawB64=null;  // clear stale artwork from previous track
  d.ld=true;d.pl=false;d.cu=false;d.pos=0;d.cp=0;d.cuw=false;d.wf=null;d._fileName=f.name;d._pwv7=false;
  // Immediately clear artwork UI
  const _dartReset=document.getElementById('dart'+slot);
  if(_dartReset)_dartReset.innerHTML='<span class="noart-icon">♪</span>';
  // filename parsing used as fallback only — ID3 tags take priority
  const n=f.name.replace(/\.[^.]+$/,'');
  if(n.includes(' - ')){const p=n.split(' - ');d.ar=p[0].trim();d.tn=p.slice(1).join(' - ').trim();}
  else{d.tn=n;d.ar='';}
  // trackId: 파일명 해시로 고유 ID 생성
  d.trackId=(f.name+f.size).split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,0)>>>0;
  // async ID3 tag read (MP3, AIFF, WAV, FLAC — all use ID3v2 at start)
  if(/\.(mp3|aiff?|wav|flac)$/i.test(f.name)){
    readID3Tags(f).then(tags=>{
      if(tags.title) d.tn=tags.title;
      if(tags.artist) d.ar=tags.artist;
      if(tags.art) d.artUrl=tags.art;
      if(tags.key) d.key=_toCamelot(tags.key);
      if(tags.bpm>0){d._id3Bpm=tags.bpm;} // store for priority over analysis
      console.log(`[ID3] slot=${slot} title="${d.tn}" artist="${d.ar}" key="${d.key}" bpm=${tags.bpm||'-'} art=${!!tags.art}`);
      // Send artwork to virtual dbserver for Arena — convert to JPEG first (CDJ/Arena expects JPEG)
      if(tags._artRaw){
        const _sendArt=(buf)=>{
          const u8=new Uint8Array(buf);
          let b64='';const chunk=8192;
          for(let i=0;i<u8.length;i+=chunk) b64+=String.fromCharCode(...u8.subarray(i,i+chunk));
          d._artRawB64=btoa(b64);
          if(E&&run&&window.bridge?.setVirtualArt) window.bridge.setVirtualArt(slot, d._artRawB64);
        };
        // Convert any format (PNG/BMP/etc.) to JPEG via canvas before sending
        const _rawBlob=new Blob([tags._artRaw]);
        const _rawUrl=URL.createObjectURL(_rawBlob);
        const _img=new Image();
        _img.onload=()=>{
          const cv=document.createElement('canvas');
          cv.width=80; cv.height=80;  // CDJ rekordbox stores artwork at 80x80
          cv.getContext('2d').drawImage(_img,0,0,80,80);
          URL.revokeObjectURL(_rawUrl);
          cv.toBlob(jpegBlob=>jpegBlob.arrayBuffer().then(ab=>_sendArt(ab)),'image/jpeg',0.88);
        };
        _img.onerror=()=>{URL.revokeObjectURL(_rawUrl);_sendArt(tags._artRaw);};
        _img.src=_rawUrl;
      }
      // Update metadata in-place — avoids DOM rebuild and canvas context reset
      const _tn=document.getElementById('dtn'+slot);if(_tn)_tn.textContent=d.tn||'—';
      const _ta=document.getElementById('dta'+slot);if(_ta)_ta.textContent=d.ar||'';
      const _art=document.getElementById('dart'+slot);
      if(_art&&d.artUrl){
        const _existImg=_art.querySelector('img');
        if(_existImg){_existImg.src=d.artUrl;}
        else{_art.innerHTML=`<img src="${d.artUrl}" alt="" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.innerHTML='<span class=\\'noart-icon\\'>♪</span>'">`;}
      }
      if(E&&run)window.bridge.updateLayer(slot,{trackName:d.tn||'',artistName:d.ar||''});
    });
  }
  // audio init — AIFF files are converted to WAV first (Chromium has no AIFF decoder)
  const _initAudio=(audioBlob)=>{
    if(d.au){d.au.pause();URL.revokeObjectURL(d.au.src);d.au=null;}
    d.au=new Audio();d.au.src=URL.createObjectURL(audioBlob);d.au.preload='auto';
    if(cfg.aoId)setOut(d.au,cfg.aoId);
    d.au.addEventListener('loadedmetadata',()=>{
      d.dur=d.au.duration*1000;d.bpm=0;d.ld=true;
      patchDeck(slot);
      // Setup canvases — double rAF ensures layout is fully settled (critical for first-load)
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        const wov=document.getElementById('wov'+slot);
        if(wov){
          const p=wov.parentElement;
          const w=p?.offsetWidth||280, h=p?.offsetHeight||14;
          if(wov.width!==w||wov.height!==h){
            if(d.ovgl){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}
            wov.width=w; wov.height=h;
          }
          if(!d.ovgl){try{d.ovgl=new OverviewGL(wov);d.wovCtx=null;}catch(e){d.wovCtx=wov.getContext('2d');}}
          const wovol=document.getElementById('wovol'+slot);
          if(wovol){wovol.width=w;wovol.height=h;d._wovOlCtx=wovol.getContext('2d');}
        }
        const wzc=document.getElementById('wzc'+slot);
        if(wzc){
          const p=wzc.parentElement;
          const w=p?.offsetWidth||280, h=p?.offsetHeight||64;
          if(wzc.width!==w||wzc.height!==h){
            if(d.wgl){try{d.wgl.destroy();}catch(_){}d.wgl=null;}
            wzc.width=w; wzc.height=h;
          }
          if(!d.wgl){try{d.wgl=new WaveformGL(wzc);d.wzCtx=null;}catch(e){d.wzCtx=wzc.getContext('2d');}}
          const wzov=document.getElementById('wzov'+slot);
          if(wzov&&!d.wovCtx2){wzov.width=w;wzov.height=h;d.wovCtx2=wzov.getContext('2d');}
        }
      }));
      if(E&&run){
        window.bridge.updateLayer(slot,{
          state:0,timecodeMs:0,bpm:d.bpm||128,
          trackId:d.trackId||0,totalLength:Math.round(d.dur)||0,
          trackName:d.tn||'',artistName:d.ar||'',deviceName:'CDJ-3000',beatPhase:0,
        });
        // Send placeholder art to Arena if no album art was found in ID3 tags
        // (BLANK_JPEG from bridge-core is used; setVirtualArt with null triggers it)
        if(!d._artRawB64 && window.bridge?.setVirtualArt){
          window.bridge.setVirtualArt(slot, null);
        }
      }
      // Defer analysis so audio is playable immediately
      setTimeout(async()=>{
        // Try Rekordbox ANLZ PWV7 data first (pixel-perfect 3-band)
        let usedPWV7=false;
        if(window.bridge?.findRekordboxWaveform){
          try{
            const pwv7=await window.bridge.findRekordboxWaveform(d._fileName||f.name);
            if(pwv7&&pwv7.length>100){
              // Convert PWV7 raw bytes to our format
              // PWV7: {low,mid,hi} each 0-255
              // Store as normalized values for buildWaveformCache
              d.rgbWf=pwv7.map(p=>({
                h:Math.max(p.low,p.mid,p.hi)/255,mn:0,mx:0,
                r:p.low/255, g:p.mid/255, b:p.hi/255
              }));
              d._pwv7=true; // flag: using PWV7 data (different weight scheme)
              d._wfCache=null;
              buildWaveformCache(slot);
              // Upload data + ensure GL contexts exist, then draw immediately
              const wfD2=d.rgbWfDetail||d.rgbWf;
              if(wfD2){
                if(!d.wgl){const _wzc=document.getElementById('wzc'+slot);if(_wzc){const _pp=_wzc.parentElement;const _w2=_pp?.offsetWidth||0,_h2=_pp?.offsetHeight||64;if(_w2>0){_wzc.width=_w2;_wzc.height=_h2;try{d.wgl=new WaveformGL(_wzc);d.wzCtx=null;}catch(_e){d.wzCtx=_wzc.getContext('2d');}}}}
                if(d.wgl)d.wgl.setData(wfD2,(wfD2.length/150*1000)||1);
                const _wov=document.getElementById('wov'+slot);
                if(_wov&&!d.ovgl){const _p=_wov.parentElement;const _w=_p?.offsetWidth||0,_h=_p?.offsetHeight||14;if(_w>0){_wov.width=_w;_wov.height=_h;try{d.ovgl=new OverviewGL(_wov);d.wovCtx=null;}catch(_e){d.wovCtx=_wov.getContext('2d');}}}
                if(d.ovgl)d.ovgl.setData(wfD2);
                drawOverview(slot,0);drawZoomWaveform(slot,0);
              }
              usedPWV7=true;
              console.log(`[WF] slot${slot} using Rekordbox PWV7: ${pwv7.length} entries`);
            }
          }catch(e){console.warn('[PWV7]',e);}
        }
        if(!usedPWV7){
          d._pwv7=false;
          buildRGBWaveform(audioBlob,(done,partial)=>{
            d.rgbWf=partial.slice(0,done);
            d.rgbWfPts=d.rgbWfPts||done*30;
            const prog2=document.getElementById('dwov-prog'+slot);
            if(prog2)prog2.style.width=(done/(d.rgbWfPts||8000)*100).toFixed(1)+'%';
          }).then(wf=>{
            d.rgbWf=wf;
            d._wfCache=null;
            const prog2=document.getElementById('dwov-prog'+slot);
            if(prog2)prog2.style.width='0';
            if(wf){
              buildWaveformCache(slot);
              // Upload data + ensure GL contexts exist, then draw immediately
              const wfD=d.rgbWfDetail||d.rgbWf;
              if(wfD){
                if(!d.wgl){const _wzc=document.getElementById('wzc'+slot);if(_wzc){const _pp=_wzc.parentElement;const _w2=_pp?.offsetWidth||0,_h2=_pp?.offsetHeight||64;if(_w2>0){_wzc.width=_w2;_wzc.height=_h2;try{d.wgl=new WaveformGL(_wzc);d.wzCtx=null;}catch(_e){d.wzCtx=_wzc.getContext('2d');}}}}
                if(d.wgl)d.wgl.setData(wfD,(wfD.length/150*1000)||1);
                const _wov=document.getElementById('wov'+slot);
                if(_wov&&!d.ovgl){const _p=_wov.parentElement;const _w=_p?.offsetWidth||0,_h=_p?.offsetHeight||14;if(_w>0){_wov.width=_w;_wov.height=_h;try{d.ovgl=new OverviewGL(_wov);d.wovCtx=null;}catch(_e){d.wovCtx=_wov.getContext('2d');}}}
                if(d.ovgl)d.ovgl.setData(wfD);
                drawOverview(slot,0);drawZoomWaveform(slot,0);
              }
            }
          });
        }
        analyzeBPM(audioBlob).then(result=>{
          const analyzedBpm=result.bpm||0, startMs=result.startMs||0;
          // ID3 TBPM tag takes priority over analysis
          const finalBpm=d._id3Bpm||analyzedBpm;
          if(finalBpm>0){d.bpm=finalBpm;d.baseBpm=finalBpm;}
          else{d.bpm=128;d.baseBpm=128;}
          // Generate beat grid anchored at -69dB audio start point
          if(d.dur>0&&d.bpm>0){

            const beats=[];
            for(let t=anchor;t<d.dur;t+=beatMs){
              beats.push({beatInBar:((beats.length%4)+1), bpm:d.bpm, timeMs:Math.round(t)});
            }
            d._beatGrid=beats;
            d._barAnchorMs=anchor;
            console.log(`[BPM] slot=${slot} id3Bpm=${d._id3Bpm||'-'} analyzed=${analyzedBpm} final=${d.bpm} startMs=${startMs.toFixed(1)} beats=${beats.length}`);
          }
          // Update BPM display in-place — avoids DOM rebuild / canvas context reset
          const _bpmEl=document.getElementById('wfbpm'+slot);
          if(_bpmEl&&d.bpm>0){const _b=d.baseBpm||d.bpm;const _bf=(v)=>{const int=Math.floor(v),dec=((v-int)*10+0.5|0)%10;return`${int}<span style="font-size:0.7em;opacity:0.7">.${dec}</span>`;};_bpmEl.innerHTML=`<span style="font:600 14px var(--mn);color:var(--tx2);font-variant-numeric:tabular-nums">${_bf(_b)}</span><span style="font:500 11px var(--mn);color:var(--tx3)">±0.00%</span><span class="dk-bpm-cur">${_bf(d.bpm)}<span style="font:400 9px var(--mn);color:var(--tx3);margin-left:2px">BPM</span></span>`;}else if(_bpmEl)_bpmEl.innerHTML='';
        });
      },100); // 100ms delay — let audio element finish loading
    });
    d.au.addEventListener('ended',()=>{
      if(d.scratch)return; // ignore during scrub/drag
      d.pl=false;d.pos=d.dur||0; // stay at end, don't jump to start
    });
    // VU meter: 멀티채널 지원 — ChannelSplitter로 실제 채널 수 감지
    try{
      if(d.vuSrc){try{d.vuSrc.disconnect();}catch(_){}}
      const ac=_getAuCtx();
      const src=ac.createMediaElementSource(d.au);
      // 실제 채널 수는 src.channelCount (오디오 로드 후 알 수 있음)
      // 일단 최대 8채널까지 ChannelSplitter 생성
      const numCh=Math.min(Math.max(src.channelCount||2,2),8);
      const split=ac.createChannelSplitter(numCh);
      const ans=[],bufs=[];
      for(let i=0;i<numCh;i++){
        const an=ac.createAnalyser();an.fftSize=256;an.smoothingTimeConstant=0.65;
        split.connect(an,i);ans.push(an);bufs.push(new Uint8Array(an.fftSize));
      }
      const merge=ac.createChannelMerger(numCh);
      ans.forEach((an,i)=>an.connect(merge,0,Math.min(i,numCh-1)));
      // Route through master GainNode (post-analyser: VU meters independent of master vol)
      merge.connect(_getMasterGain());
      src.connect(split);
      d.vuSrc=src;d.vuChs=ans;d.vuBufs=bufs;d.vuChCount=numCh;
      d.audioChs=numCh; // store for multi-channel auto-routing
      // Rebuild routing — auto-detects multi-channel and configures destination
      _rebuildAuRoutingAuto();
      d.vuAnL=ans[0];d.vuAnR=ans[1]||ans[0];d.vuBufL=bufs[0];d.vuBufR=bufs[1]||bufs[0];
      d.vuAn=ans[0];d.vuBuf=bufs[0];
      // VU strip에 채널 수에 맞는 바 생성
      _buildVuStrip(slot,numCh);
    }catch(e){console.warn('[VU]',e);}
  };
  // Formats needing FFmpeg decode (not natively supported in Chromium)
  const _needsFFmpeg=/\.(mkv|mka|dts|dtshd|truehd|thd|eac3|ac3)$/i.test(f.name);
  if(_needsFFmpeg){
    // Check FFmpeg availability first
    window.bridge.checkFFmpeg().then(async({available})=>{
      if(!available){
        // Show non-blocking info in deck area instead of blocking alert
        const _stEl=document.getElementById('did'+slot);
        if(_stEl)_stEl.innerHTML=`<div style="font:400 9px var(--sn);color:var(--ylw);line-height:1.4">
          <b>${f.name.split('.').pop().toUpperCase()}</b> 포맷은 FFmpeg 필요<br>
          <span style="color:var(--tx3)">brew install ffmpeg</span></div>`;
        return;
      }
      // Show converting progress in deck
      const _stEl=document.getElementById('did'+slot);
      if(_stEl)_stEl.innerHTML='<span style="color:var(--ylw);font:600 9px var(--mn)">변환 중…</span>';
      const _progUnsub=window.bridge.onAudioProgress((data)=>{
        if(data.slot!==slot)return;
        const bar=document.getElementById('wovol'+slot);
        if(bar){bar.style.width=data.pct+'%';bar.style.opacity='1';}
      });
      const res=await window.bridge.decodeAudio(f.path||f.name,slot).catch(e=>({ok:false,err:e.message}));
      if(!res.ok){
        const stEl=document.getElementById('did'+slot);
        if(stEl)stEl.innerHTML=`<span style="color:var(--red);font:600 9px var(--mn)">변환 실패: ${res.err.slice(0,60)}</span>`;
        return;
      }
      if(d._tempPath){window.bridge.cleanupTemp(d._tempPath);}
      d._tempPath=res.tempPath;
      // Fetch decoded WAV as Blob via bridge-audio:// protocol
      const blob=await fetch('bridge-audio://'+encodeURIComponent(res.tempPath)).then(r=>r.blob()).catch(()=>null);
      if(blob){_initAudio(blob);}
    });
    return;
  }
  if(/\.aiff?$/i.test(f.name)){
    f.arrayBuffer().then(ab=>{
      try{_initAudio(_aiffToWav(ab));console.log('[AIFF] converted to WAV');}
      catch(e){console.error('[AIFF→WAV] failed, using original:',e);_initAudio(f);}
    });
  }else{_initAudio(f);}
}

// ── Multi-channel audio auto-routing ─────────────────────────────────
// When any deck has > 2 channels, configure destination for N-channel 1:1 routing
let _autoChMode=false; // true = N-channel 1:1, false = manual pair selection
function _getMaxDeckChs(){
  return Math.max(2,...Object.values(DECKS).filter(d=>d.ld&&d.audioChs>0).map(d=>d.audioChs));
}
async function _rebuildAuRoutingAuto(){
  const ac=_getAuCtx();
  const mg=_getMasterGain();
  const maxCh=_getMaxDeckChs();
  _autoChMode=(maxCh>2);
  // Update AUTO label in Settings if open
  const _autoLbl=document.getElementById('aoChAutoLbl');
  if(_autoLbl){_autoLbl.style.display=_autoChMode?'':'none';if(_autoLbl.parentElement?.previousSibling)_autoLbl.title=_autoChMode?`${maxCh}ch 자동 매핑`:'수동 채널 쌍';}
  // Set output device
  if(cfg.aoId&&ac.setSinkId){try{await ac.setSinkId(cfg.aoId);}catch(e){console.warn('[AuCtx] setSinkId:',e);}}
  try{mg.disconnect();}catch(_){}
  if(!_autoChMode){
    // Stereo pair routing (manual selection)
    const offset=(parseInt(cfg.aoChPair)||0)*2;
    if(offset===0){
      try{ac.destination.channelCount=2;ac.destination.channelCountMode='max';}catch(_){}
      mg.connect(ac.destination);
    }else{
      const totalCh=Math.min(offset+2,ac.destination.maxChannelCount||8);
      try{ac.destination.channelCount=totalCh;ac.destination.channelCountMode='explicit';ac.destination.channelInterpretation='discrete';}catch(_){}
      _auChSplit=ac.createChannelSplitter(2);_auChMerge=ac.createChannelMerger(totalCh);
      mg.connect(_auChSplit);
      _auChSplit.connect(_auChMerge,0,Math.min(offset,totalCh-1));
      _auChSplit.connect(_auChMerge,1,Math.min(offset+1,totalCh-1));
      _auChMerge.connect(ac.destination);
    }
  }else{
    // Multi-channel 1:1 routing
    const ch=Math.min(maxCh,ac.destination.maxChannelCount||maxCh);
    try{ac.destination.channelCount=ch;ac.destination.channelCountMode='explicit';ac.destination.channelInterpretation='discrete';}catch(_){}
    mg.connect(ac.destination); // GainNode passes all channels through
    console.log(`[AuRoute] auto ${ch}ch 1:1`);
  }
}

function _sendTCState(slot){
  const d=DECKS[slot];if(!d||!E||!run||d.type==='hw')return;
  // d.pos는 틱에서 갱신(최대 33ms stale) → 멈출 때 arena seek 오류 유발
  // au.currentTime을 직접 읽어 정확한 위치 전송
  const timecodeMs=d.au?Math.round(d.au.currentTime*1000):Math.round(d.pos);
  window.bridge.updateLayer(slot,{
    state:d.scratch?8:d.pl?3:(d.cu&&d.au&&!d.au.paused)?3:(d.ld?5:0),
    timecodeMs,
    bpm:d.bpm||0,trackId:d.trackId||0,totalLength:Math.round(d.dur)||0,
    trackName:d.tn||'',artistName:d.ar||'',deviceName:'CDJ-3000',
    beatPhase:Math.floor((timecodeMs/(60000/(d.bpm||128)))%4)*64,
  });
}

function doPlay(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  if(d.pl){
    d.au.pause();d.pl=false;
  } else {
    d.au.play().catch(()=>{});d.pl=true;d.cu=false;
  }
  _sendTCState(slot);
}

/**
 * CDJ-style CUE behaviour:
 *
 * While playing: pause (cue point unchanged), enter CUE state.
 * While stopped/paused (down): set cue point to current position, pre-cue play.
 * CUE up: return to cue point and stop.
 */
function doCueDown(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  if(d.pl){
    d.au.pause();d.pl=false;d.cu=true;d.cuw=false;_sendTCState(slot);
  } else {
    d.cp=d.au.currentTime; // current position becomes new cue point
    d.cuw=false;
    // Add to cuePoints list if not already there (virtual deck memory cue)
    if(!d.cuePoints)d.cuePoints=[];
    const cpMs=Math.round(d.cp*1000);
    if(!d.cuePoints.find(c=>Math.abs(c.timeMs-cpMs)<50)){
      d.cuePoints.push({name:'',timeMs:cpMs,hotCueNum:0,colorId:0,type:'memory'});
    }
    d.au.currentTime=d.cp;
    d.au.play().catch(()=>{});
    d.cu=true;d.pl=false;
  }
}

function doCueUp(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  d.au.pause();
  d.au.currentTime=d.cp||0;
  d.pl=false;d.cu=true;
  _sendTCState(slot);
}

function doReturnToStart(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  d.au.pause();d.au.currentTime=0;d.pl=false;d.cu=false;d.cp=0;
  _sendTCState(slot);
}

function _deckLayerAssigned(slot,lyr){

function doExpandDeck(slot){
  const el=document.getElementById('dk'+slot);if(!el)return;
  const wasExpanded=_expandedSlot===slot;
  const prevSlot=_expandedSlot;
  // collapse previously expanded deck
  if(prevSlot!=null){
    const prev=document.getElementById('dk'+prevSlot);
    if(prev)prev.classList.remove('dk-wide');
  }
  _expandedSlot=wasExpanded?null:slot;
  if(!wasExpanded) el.classList.add('dk-wide');
  // Double rAF: first rAF triggers layout reflow, second reads settled dimensions
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(!wasExpanded) _resizeDeckCanvases(slot);
    // Also resize the collapsed deck to prevent stretch artifact
    if(prevSlot!=null&&prevSlot!==slot) _resizeDeckCanvases(prevSlot);
  }));
}

function doEject(slot){
  const d=DECKS[slot];if(!d)return;
  if(d.au){d.au.pause();URL.revokeObjectURL(d.au.src);d.au=null;}
  if(d.artUrl){URL.revokeObjectURL(d.artUrl);d.artUrl=null;}
  if(d._tempPath){window.bridge.cleanupTemp(d._tempPath);d._tempPath=null;}
  d.audioChs=2;
  if(d.vuSrc){try{d.vuSrc.disconnect();}catch(_){}}
  Object.assign(d,{ld:false,pl:false,cu:false,tn:'',ar:'',dur:0,pos:0,bpm:0,cp:0,key:'',wf:null,wfCtx:null,rgbWf:null,wovCtx:null,wzCtx:null,_wfCache:null,artUrl:null,art:null,_artRawB64:null,beatInBar:1,vuSrc:null,vuAn:null,vuBuf:null,vuAnL:null,vuAnR:null,vuBufL:null,vuBufR:null,vuL:0,vuR:0});
  if(E&&run)window.bridge.removeLayer(slot);
  patchDeck(slot);
}

function doSeek(slot,r){
  const d=DECKS[slot];if(!d?.au||!d.dur||d.type==='hw')return;
  const t=(r*d.dur)/1000;d.au.currentTime=t;
  if(!d.pl)d.cp=t; // update cue point when seeking while stopped
}

async function doToggleHW(slot){
  const d=DECKS[slot];if(!d)return;
  const goingHW=d.type!=='hw';

  if(goingHW){
    // Virtual → HW: stop playback, remove layer, then enable HW mode
    if(d.au)d.au.pause();
    d.pl=false;d.cu=false;
    if(E&&run)await window.bridge.updateLayer(slot,{state:0,timecodeMs:0,bpm:0,trackId:0,totalLength:0,beatPhase:0});
    await new Promise(r=>setTimeout(r,66));
    if(E&&run)await window.bridge.removeLayer(slot);
    await new Promise(r=>setTimeout(r,66));
    d.type='hw';
    d.ld=false;d.tn='';d.ar='';d.dur=0;d.pos=0;d.bpm=0;d.cp=0;d.wf=null;
    if(d.au){URL.revokeObjectURL(d.au.src);d.au=null;}
    if(E)window.bridge.setHWMode(slot,true);

  }else{
    // HW → Virtual 전환
    // 1) CDJ 신호 수신 중단
    if(E)window.bridge.setHWMode(slot,false);
    await new Promise(r=>setTimeout(r,66));

    // 2) 레이어 초기화
    if(E&&run)await window.bridge.removeLayer(slot);
    await new Promise(r=>setTimeout(r,66));

    // 3) Virtual 모드 (빈 상태)
    d.type='virtual';
    d.pl=false;d.cu=false;d.ld=false;
    d.tn='';d.ar='';d.dur=0;d.pos=0;d.bpm=0;d.cp=0;d.wf=null;
  }

  patchDeck(slot);
}

// ════ 33ms tick loop ═════════════════════════════════
let _wfF=0;
function tick(){
  _wfF++;
  tcTick();
  _updateOutTcDisplay();

  if(run){up=Math.floor((Date.now()-t0)/1000);pk++;}

  // Faders (only when running with bridge)
  if(run){
    faders.forEach((v,i)=>{
      const pct=Math.round(v/255*100);
      const fb=document.getElementById('fb'+i);if(fb)fb.style.height=pct+'%';
      const fv=document.getElementById('fv'+i);if(fv)fv.textContent=pct+'%';
      const fa=document.getElementById('fair'+i);if(fa)fa.classList.toggle('hide',!onAirCh[i]);
    });
  }

  Object.values(DECKS).forEach(d=>{
    const slot=d.slot;
    const el=document.getElementById('dk'+slot);if(!el)return;
    // update virtual deck playback position — ALWAYS (not gated by run)
    // Skip during scratch/drag: pos is controlled by pointermove, not audio element
    if(d.type!=='hw'&&d.au&&d.ld&&!d.scratch){
      d.pos=d.au.currentTime*1000;
      // Virtual loop: seek back to loop start when reaching loop end
      if(d._isLooping&&d._loopStartMs!=null&&d._loopEndMs!=null&&d.pl){
        if(d.pos>=d._loopEndMs){
          d.au.currentTime=d._loopStartMs/1000;
          d.pos=d._loopStartMs;
        }
      }
    }

    // Smooth interpolated position for HW decks
    // Strategy: linear extrapolation from last known position + elapsed time
    // CDJ-3000: frequent 0x0b updates (~30Hz) keep position accurate
    // NXS2: status ~5Hz — linear extrapolation between updates, snap on new data
    let displayPos=d.pos||0;
    if(d.type==='hw'&&d._posTime){
      const now=Date.now();
      const elapsed=now-d._posTime;
      if(d.pl){
        // Playing: linear extrapolation from last known position
        // pitch-corrected speed (pitch is percentage: +6% = 1.06x)
        const speed=d.pitch!=null?(1+d.pitch/100):1.0;
        const target=d.pos+elapsed*speed;
        if(d._stateChanged){
          d._smoothPos=d.pos;d._stateChanged=false;
        }else if(d._smoothPos==null){
          d._smoothPos=target;
        }else{
          const diff=target-d._smoothPos;
          if(Math.abs(diff)>3000){
            // Large jump (seek/track change): snap immediately
            d._smoothPos=target;
          }else if(d._hasPrecisePos&&elapsed<200){
            // CDJ-3000: fast convergence
            d._smoothPos+=(target-d._smoothPos)*0.7;
          }else{
            // NXS2/other: smooth linear tracking
            d._smoothPos+=(target-d._smoothPos)*0.3;
          }
        }
        displayPos=d._smoothPos;
      }else{
        // Not playing: show exact position, no interpolation
        displayPos=d.pos;
        d._smoothPos=null;
        d._stateChanged=false;
      }
      if(d.dur>0&&displayPos>d.dur) displayPos=d.dur;
    }else if(d.type==='hw'){
      d._smoothPos=null;
    }
    const prog=d.dur>0?(displayPos/d.dur):0;

    // UI updates — ALWAYS
    // Sync data-type attribute for CSS-based HW/Virtual element visibility
    el.setAttribute('data-type', d.type==='hw'?'hw':'virtual');
    // HW/Virtual 동일한 상태 표시 — 루프 중이면 play와 동일하게 처리
    el.setAttribute('data-st',d._isLooping?'play':d.pl?'play':d.scratch?'play':d.cu?'cue':'stop');
    // USB media color — deck border + glow via inline style (overrides data-st CSS)
    {
      const _MCOL={1:'#ff6b9d',2:'#ff4444',3:'#ff8c00',4:'#ffd700',5:'#44cc44',6:'#00cccc',7:'#4488ff',8:'#aa44ff'};
      const _mc=d.type==='hw'&&d._mediaColor>0?(_MCOL[d._mediaColor]||''):'';
      if(_mc){
        el.style.borderColor=_mc;el.style.borderWidth='2px';
        el.style.boxShadow=`0 0 14px ${_mc}55,0 0 4px ${_mc}88,0 2px 12px rgba(0,0,0,.4)`;
      }else{
        el.style.borderColor='';el.style.borderWidth='';el.style.boxShadow='';
      }
    }
    const tc=document.getElementById('dtc'+slot);
    if(tc)tc.textContent=fTC(displayPos);
    const timeEl=document.getElementById('dtime'+slot);
    if(timeEl)timeEl.textContent=fTmMs(displayPos)+' / '+(d.dur>0?fTmMs(d.dur):'--:--.---');
    const dtnEl=document.getElementById('dtn'+slot);
    if(dtnEl){
      const txt=d.tn||'—';
      const curTxt=dtnEl.querySelector('.mq-inner')?.textContent||dtnEl.textContent;
      if(curTxt!==txt){
        dtnEl.classList.remove('scrolling');
        dtnEl.textContent=txt;
        // Measure overflow after layout settles
        requestAnimationFrame(()=>{
          if(!dtnEl.parentElement) return;
          const cw=dtnEl.clientWidth, sw=dtnEl.scrollWidth;
          if(sw>cw+5){
            const inner=document.createElement('span');
            inner.className='mq-inner';
            inner.textContent=txt;
            dtnEl.textContent='';
            dtnEl.appendChild(inner);
            const overflow=sw-cw;
            dtnEl.style.setProperty('--scroll-dist','-'+overflow+'px');
            dtnEl.style.setProperty('--scroll-dur',Math.max(5,overflow/25)+'s');
            dtnEl.classList.add('scrolling');
          }
        });
      }
    }
    const dtaEl=document.getElementById('dta'+slot);if(dtaEl)dtaEl.textContent=d.ar||'';
    const dtsepEl=document.getElementById('dtsep'+slot);if(dtsepEl)dtsepEl.style.display=d.ar?'':'none';
    // Waveform key + BPM — 2-line display in TC info section
    const wfkEl=document.getElementById('wfkey'+slot);
    if(wfkEl){
      const raw=d.key||'';
      const cam=raw.split(' / ')[0]||'';
      if(cam){wfkEl.textContent=cam;wfkEl.style.display='';}
      else{wfkEl.textContent='';wfkEl.style.display='none';}
    }
    const wfbEl=document.getElementById('wfbpm'+slot);
    if(wfbEl&&d.bpm>0){
      const pitchPct=d.pitch!==undefined?d.pitch:((d.baseBpm&&d.baseBpm>0)?((d.bpm-d.baseBpm)/d.baseBpm*100):0);
      const ps=Math.abs(pitchPct)<0.05?'±0.00%':(pitchPct>0?'+':'')+pitchPct.toFixed(2)+'%';
      const _bpmFmt=(v)=>{const int=Math.floor(v),dec=((v-int)*10+0.5|0)%10;return`${int}<span style="font-size:0.7em;opacity:0.7">.${dec}</span>`;};
      const baseVal=(d.baseBpm&&d.baseBpm>0)?d.baseBpm:d.bpm;
      const baseStr=_bpmFmt(baseVal);
      const curStr=_bpmFmt(d.bpm);
      wfbEl.innerHTML=`<span style="font:600 14px var(--mn);color:var(--tx2);font-variant-numeric:tabular-nums;white-space:nowrap">${baseStr}</span><span style="font:500 11px var(--mn);color:var(--tx3);white-space:nowrap">${ps}</span><span class="dk-bpm-cur">${curStr}<span style="font:400 9px var(--mn);color:var(--tx3);margin-left:2px">BPM</span></span>`;
    }else if(wfbEl)wfbEl.innerHTML='';
    const dhwlEl=document.getElementById('dhwl'+slot);
    if(dhwlEl)dhwlEl.textContent=d.type==='hw'?(d.model?'⬡ '+d.model:'⬡ HW'):'◎ VIRTUAL';

    // VU meter — ALWAYS for virtual, only run-gated for HW
    // Peak meter: returns instantaneous peak (0-1) from time domain buffer
    const _getPeak=(an,buf)=>{if(!an||!buf)return 0;an.getByteTimeDomainData(buf);let pk=0;for(let i=0;i<buf.length;i++){const v=Math.abs((buf[i]-128)/128);if(v>pk)pk=v;}return pk;};
    if(d.type==='hw'){
      // HW: DJM on-air 미터 → VU, 페이더 값 → F
      if(run){
        const meterVal=d._djmMeter||0;
        const target=meterVal/255;
        d.vuL=target>d.vuL?target:target*0.4+(d.vuL||0)*0.6;
        d.vu=d.vuL;
        d._djmMeter=Math.max(0,(d._djmMeter||0)*0.92);
        // Fader bar
        const fv=faders[slot]||0;
        const ft=fv/255;
        d._faderSmooth=ft>(d._faderSmooth||0)?ft:ft*0.3+(d._faderSmooth||0)*0.7;
      }
    } else {
      // Virtual: L/R 스테레오
      const active=d.pl||d.cu;
      let peakL=0,peakR=0;
      if(d.vuChs&&d.vuBufs){
        d.vuChs.forEach((an,i)=>{const v=_getPeak(an,d.vuBufs[i]);const p=d.vuChs[i]._lvl||0;d.vuChs[i]._lvl=active?(v>p?v:v*0.4+p*0.6):Math.max(0,p-0.025);});
        peakL=d.vuChs[0]._lvl||0;peakR=(d.vuChs[1]?._lvl)||0;
      } else {
        if(d.vuAnL&&d.vuBufL){const v=_getPeak(d.vuAnL,d.vuBufL);const p=d.vuL||0;peakL=active?(v>p?v:v*0.4+p*0.6):Math.max(0,p-0.025);}
        if(d.vuAnR&&d.vuBufR){const v=_getPeak(d.vuAnR,d.vuBufR);const p=d.vuR||0;peakR=active?(v>p?v:v*0.4+p*0.6):Math.max(0,p-0.025);}
      }
      d.vuL=peakL; d.vuR=peakR;
      d.vu=Math.max(peakL,peakR);
    }
    // dB scale: peak 1.0 → 0dB, -60dB floor, +6dB headroom so loud music fills to top
    const _vuBar=(id,v)=>{const el2=document.getElementById(id);if(!el2)return;const db=v>0.0001?20*Math.log10(v):-60;const h=Math.min(100,Math.max(0,(db+60)*100/60));el2.style.height=h+'%';el2.style.background=h>90?'var(--red)':h>70?'var(--ylw)':'var(--grn)';};
    if(d.type==='hw'){
      _vuBar('dvuL'+slot,d.vuL||0);
      // Fader bar (linear, not dB)
      const fEl=document.getElementById('dvuF'+slot);
      if(fEl){const h=Math.round((d._faderSmooth||0)*100);fEl.style.height=h+'%';fEl.style.background='var(--pur)';}
      // EQ knobs: rotate indicator tick + draw arc based on DJM EQ values
      // Range: 0x00(min=-135°) → 0x40(center=0°) → 0x7F(max=+135°), total sweep=270°
      const eq=eqBands[slot]||[0x40,0x40,0x40];
      const _knobIDs=['deqH','deqM','deqL'];
      _knobIDs.forEach((pfx,i)=>{
        const raw=eq[i]??0x40;
        const norm=(raw-0x40)/0x40; // -1 to +1
        const deg=norm*135;          // -135° to +135°
        const tickEl=document.getElementById(pfx+slot+'tick');
        if(tickEl)tickEl.setAttribute('transform',`rotate(${deg})`);
        // Arc: circumference=2π×10≈62.83, draw portion proportional to |norm|
        const arcEl=document.getElementById(pfx+slot+'arc');
        if(arcEl){
          const arc=Math.abs(norm)*62.83*0.75; // max arc = 270°/360° of circumference
          const offset=norm>=0?0:-arc;
          arcEl.setAttribute('stroke-dasharray',`${arc} ${62.83-arc}`);
          arcEl.setAttribute('stroke-dashoffset',`${-62.83*(-135/360)+offset}`);
          arcEl.setAttribute('stroke',norm>0.05?'rgba(124,111,205,.9)':norm<-0.05?'rgba(255,100,100,.8)':'rgba(100,200,100,.7)');
        }
      });
    } else if(d.vuChs&&d.vuChs.length>2){
      const CH_IDS=['L','R','3','4','5','6','7','8'];
      d.vuChs.forEach((an,i)=>_vuBar('dvu'+(CH_IDS[i]||String(i+1))+slot, an._lvl||0));
    } else {
      _vuBar('dvuL'+slot,d.vuL||0);_vuBar('dvuR'+slot,d.vuR||0);
    }

    const bg=document.getElementById('dbg'+slot);
    if(bg){
      // HW/Virtual 동일한 상태 배지
      bg.textContent=d._isLooping?'LOOP':d.pl?'PLAY':d.scratch?'HANDLING':d.cu?'CUE':'STOP';
      bg.className='dbadge '+(d._isLooping?'bg':d.pl?'bg':d.scratch?'bb':d.cu?'by':'bm');
    }
    // ON AIR badge
    const bAir=document.getElementById('dair'+slot);
    if(bAir)bAir.classList.toggle('hide',!d.onAir);
    // SYNC / MASTER LED buttons
    const bSync=document.getElementById('dsync'+slot);
    if(bSync)bSync.classList.toggle('on',!!d.sync);
    // ddmst = deck sync MASTER (sec2), dmst = MTC MASTER out (sec4)
    const bMst2=document.getElementById('ddmst'+slot);
    if(bMst2)bMst2.classList.toggle('on',!!d.master);
    const bMst=document.getElementById('dmst'+slot);
    if(bMst)bMst.classList.toggle('on',!!d.mtcMaster);
    const did=document.getElementById('did'+slot);
    if(did){
      // HW: USB media color → player number + text-shadow glow
      const _MCOL2={1:'#ff6b9d',2:'#ff4444',3:'#ff8c00',4:'#ffd700',5:'#44cc44',6:'#00cccc',7:'#4488ff',8:'#aa44ff'};
      const usbC=d.type==='hw'&&d._mediaColor>0?(_MCOL2[d._mediaColor]||''):'';
      did.style.color=usbC||(d.type==='hw'?'var(--pur)':d.scratch?'var(--org)':d.pl?'var(--grn)':d.cu?'var(--ylw)':'var(--tx3)');
      did.style.textShadow=usbC?`0 0 8px ${usbC}cc,0 0 20px ${usbC}66`:'';
    }
    // CUE/PLAY button states — CDJ-3000 style
    const pb=el.querySelector('[data-a="play"]');
    if(pb){
      pb.textContent=d.pl?'⏸':'▶';
      pb.classList.toggle('ac',d.pl);
      pb.classList.toggle('blink',d.cu&&!d.pl); // blink in CUE state
      pb.classList.remove('blink');
      if(d.cu&&!d.pl) pb.classList.add('blink');
    }
    const cub=el.querySelector('[data-a="cue"]');
    if(cub){
      cub.classList.remove('ac','medium');
      if(d.cu&&!d.pl) cub.classList.add('ac');       // CUE active: bright
      else if(d.pl) cub.classList.add('medium');       // Playing: medium
    }


    // Overview GL recovery — runs even without waveform data (ensures canvas is initialized)
    const wov=document.getElementById('wov'+slot);
    if(wov){
      const op=wov.parentElement;
      const opW=op?.offsetWidth||0, opH=op?.offsetHeight||14;
      const ovStale=d.ovgl&&d.ovgl.gl.canvas!==wov;
      const ovCtxLost=d.ovgl&&(!d.ovgl._prog||(d.ovgl.gl.isContextLost&&d.ovgl.gl.isContextLost()));
      const ovMissing=!d.ovgl&&!d.wovCtx;
      const dimBad=opW>0&&(wov.width<2||wov.width!==opW||wov.height!==opH);
      if(ovStale||ovCtxLost||ovMissing||dimBad){
        if(d.ovgl){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}
        if(opW>0){
          wov.width=opW; wov.height=opH;
          try{d.ovgl=new OverviewGL(wov);d.wovCtx=null;}catch(e){d.wovCtx=wov.getContext('2d');}
          const wovol=document.getElementById('wovol'+slot);
          if(wovol){wovol.width=opW;wovol.height=opH;d._wovOlCtx=wovol.getContext('2d');}
          const wfD=d.rgbWfDetail||d.rgbWf;
          if(wfD&&d.ovgl)d.ovgl.setData(wfD);
        }
      } else if(d.ovgl&&!d.ovgl._wfTex){
        const wfD=d.rgbWfDetail||d.rgbWf;
        if(wfD)d.ovgl.setData(wfD);
      }
    }
    // Waveform drawing — requires data (either preview or detail waveform)
    if(d.rgbWf||d.rgbWfDetail){
      // Canvas stale-ref recovery: if WGL/2D ctx refers to a detached canvas, reinit
      const wzc=document.getElementById('wzc'+slot);
      if(wzc){
        const wglStale=d.wgl&&d.wgl.gl.canvas!==wzc;
        const ctx2Stale=!d.wgl&&d.wzCtx&&d.wzCtx.canvas!==wzc;
        // Context reset: canvas.width assignment nukes GPU objects; _prog becomes invalid
        const wglCtxLost=d.wgl&&!d.wgl._prog;
        // Never initialized (e.g. bindDeck timeout raced with another renderDecks)
        const wglMissing=!d.wgl&&!d.wzCtx&&wzc.width>0;
        if(wglStale||ctx2Stale||(wzc.width===0)||wglCtxLost||wglMissing){
          // Reinit WGL on live canvas
          if(d.wgl){try{d.wgl.destroy();}catch(_){}d.wgl=null;}
          const p=wzc.parentElement;
          if(p&&p.offsetWidth>0){
            wzc.width=p.offsetWidth; wzc.height=p.offsetHeight;
            try{
              d.wgl=new WaveformGL(wzc); d.wzCtx=null;
              const wzov=document.getElementById('wzov'+slot);
              if(wzov){wzov.width=wzc.width;wzov.height=wzc.height;d.wovCtx2=wzov.getContext('2d');}
            }catch(e){d.wzCtx=wzc.getContext('2d');}
          }
        }
        // Re-upload texture if WGL exists but texture is missing
        if(d.wgl&&!d.wgl._wfTex){
          const wfD=d.rgbWfDetail||d.rgbWf;
          if(wfD){const wfDMs=(wfD.length/150*1000)||1;d.wgl.setData(wfD,wfDMs);}
        }
      }
      if(wov&&wov.width>0)drawOverview(slot,prog);
      const wzc2=document.getElementById('wzc'+slot);
      if(wzc2&&wzc2.width>0)drawZoomWaveform(slot,prog);
    }

    // Beat phasor — use beat grid lookup when available
    if(d.ld&&d.bpm>0){
      const beatMs=60000/(d.baseBpm||d.bpm);
      let beatInBar=0, phaseInBeat=0, shouldShow=true;
      if(d._beatGrid&&d._beatGrid.length>0){
        // Beat grid lookup: binary search for current beat
        const bg=d._beatGrid;
        const pos=displayPos;
        // If past last beat, freeze at last beat
        if(pos>=bg[bg.length-1].timeMs){
          beatInBar=bg[bg.length-1].beatInBar;
          phaseInBeat=0;
          if(d.dur>0&&pos>=d.dur-100) shouldShow=false; // track ended
        }else{
          // Binary search: find last beat <= pos
          let lo=0, hi=bg.length-1;
          while(lo<hi){const mid=(lo+hi+1)>>1;if(bg[mid].timeMs<=pos)lo=mid;else hi=mid-1;}
          const curBeat=bg[lo];
          const nextBeat=bg[lo+1]||null;
          beatInBar=curBeat.beatInBar;
          if(nextBeat){
            const span=nextBeat.timeMs-curBeat.timeMs;
            phaseInBeat=span>0?Math.min(0.99,(pos-curBeat.timeMs)/span):0;
          }else{
            phaseInBeat=0;
          }
        }
      }else if(d.type==='hw'&&d.beatInBar>0&&d._beatTime){
        if(!d.pl){
          beatInBar=d.beatInBar; phaseInBeat=0;
        }else{
          beatInBar=d.beatInBar;
          const elapsed=Date.now()-d._beatTime;
          phaseInBeat=Math.min(0.99,elapsed/beatMs);
          if(elapsed>beatMs){
            const extra=Math.floor(elapsed/beatMs);
            beatInBar=((beatInBar-1+extra)%4)+1;
            phaseInBeat=Math.min(0.99,(elapsed-extra*beatMs)/beatMs);
          }
        }
        if(d.dur>0&&displayPos>=d.dur-100) shouldShow=false;
      }else{
        const barMs=beatMs*4;
        const posInBar=displayPos%barMs;
        beatInBar=Math.floor(posInBar/beatMs)+1;
        phaseInBeat=(posInBar%beatMs)/beatMs;
        if(d.dur>0&&displayPos>=d.dur-100) shouldShow=false;
      }
      // Clockwise visual mapping: TL(1)→TR(2)→BR(3)→BL(4)
      // DOM segments: _1=TL, _2=TR, _3=BL, _4=BR → remap beat3→_4, beat4→_3
      const _cwMap=[null,1,2,4,3];
      for(let b=1;b<=4;b++){
        const si=_cwMap[b];
        const seg=document.getElementById('dphs'+slot+'_'+si);
        const fill=document.getElementById('dphsf'+slot+'_'+si);
        if(!seg||!fill)continue;
        if(!shouldShow){seg.classList.remove('on');fill.style.opacity='0';continue;}
        const active=b===beatInBar;
        seg.classList.toggle('on',active);
        fill.style.opacity=active?'1':'0';
      }
    }

    // TCNet transmission — GATED by run AND E
    if(!E||!run)return;
    if(d.type==='hw'){
      // HW deck: forward CDJ state/position to TCNet layer
      if(d.ld){
        const hwState=d._isLooping?4:d.pl?3:d.cu?7:5;
        window.bridge.updateLayer(slot,{
          state:hwState,
          timecodeMs:Math.round(d.pos),
          bpm:d.bpm||0,trackId:d._trackId||0,totalLength:Math.round(d.dur)||0,
          trackName:d.tn||'',artistName:d.ar||'',deviceName:d.model||'CDJ',
          beatPhase:d.beatInBar>0?((d.beatInBar-1)*64):0,
        });
      }
    } else if(d.ld){
      const isActive=d.scratch||d.pl||(d.cu&&d.au&&!d.au.paused);
      // 멈춰있을 때: 30fps 연속 seek 명령이 Arena 영상 jitter 유발 → 1Hz로 줄임
      // 재생/스크래치 중: 30fps 풀속도 전송
      const now=Date.now();
      if(!isActive){
        if(d._lastTCStop&&(now-d._lastTCStop)<950)return; // 1Hz keepalive
        d._lastTCStop=now;
        d._frozenPosMs=Math.round(d.pos); // 위치 고정
      } else {
        d._lastTCStop=0; // 재생 시작하면 리셋
      }
      const timecodeMs=isActive?Math.round(d.pos):(d._frozenPosMs??Math.round(d.pos));
      const beatPhase=Math.floor((timecodeMs/(60000/(d.bpm||128)))%4)*64;
      window.bridge.updateLayer(slot,{
        state:d.scratch?8:d.pl?3:(d.cu&&d.au&&!d.au.paused)?3:5,
        timecodeMs,
        bpm:d.bpm||0,
        trackId:d.trackId||0,
        totalLength:Math.round(d.dur)||0,
        trackName:d.tn||'',
        artistName:d.ar||'',
        deviceName:'CDJ-3000',
        beatPhase,
      });
    }
  });

  updateHeader();
  const slots=Object.keys(DECKS).map(Number).sort();
  document.getElementById('bDots').innerHTML=slots.map(s=>{
    const d=DECKS[s],c=d.type==='hw'?'var(--pur)':d.pl?'var(--grn)':d.cu?'var(--ylw)':d.ld?'rgba(52,211,153,.4)':'var(--tx4)';
    return`<div style="display:flex;align-items:center;gap:4px"><span class="dot${d.pl?' dpu':''}" style="background:${c}"></span><span style="font:400 9px var(--mn);color:var(--tx3)">${s+1}</span></div>`;
  }).join('');
  if(run)document.getElementById('bPk').textContent='TX: '+pk.toLocaleString();
}
setInterval(tick,33);

function updateHeader(){
  const arenas=Object.values(tcNodes).filter(n=>Date.now()-n.lastSeen<10000).length;
  const active=Object.values(DECKS).filter(d=>d.ld).length;
  document.getElementById('stBadge').className='bd '+(run?'bg':'br');
  document.getElementById('stBadge').textContent=run?'ONLINE':'OFFLINE';
  document.getElementById('stArena').textContent=arenas;
  document.getElementById('stDecks').textContent=active;
  document.getElementById('stUp').textContent=run?Math.floor(up/60)+'m '+(up%60)+'s':'—';
  const artActive=run&&Object.values(OUT).some(o=>o.art);
  const stAn=document.getElementById('stArtnet');
  if(stAn){stAn.className='bd '+(artActive?'bg':'br');stAn.textContent=artActive?'ACTIVE':'OFF';}
  document.getElementById('stAlert').classList.toggle('hide',run);
}

  el.querySelectorAll('[data-cfg]').forEach(inp=>{

          if(ltcChSel){

            _fillChSelMono(ltcChSel,max,cur<max?cur:0);
            cfg[`tcLtc${layer}Ch`]=parseInt(ltcChSel.value)||0;
            ltcChSel.disabled=false;
          }
          _ltcSetDevice(layer,e.target.value,cfg[`tcLtc${layer}Ch`]);
          _saveCfg();
        });
        return;
      }
      else if(/^tcLtc[ABM]Ch$/.test(k)){
        const layer=k.slice(5,6); // 'A','B','M'
        _ltcSetDevice(layer,cfg[`tcLtc${layer}`],parseInt(e.target.value)||0);
      }
      else if(k==='tcArtnetIp'||k==='tcArtnetPort'){cfg[k]=e.target.value;}
      else if(k==='tcnetIface'){cfg[k]=e.target.value;_saveCfg();if(E&&run)window.bridge.rebindTCNet(e.target.value||null);return;}
      else if(k==='pdjlIface'){cfg[k]=e.target.value;_saveCfg();if(E&&run)window.bridge.rebindPDJL(e.target.value||null);return;}
      else if(k==='tcnetMode'){cfg[k]=e.target.value;_saveCfg();if(E&&run)window.bridge.setTCNetMode(e.target.value||'auto');return;}
      else cfg[k]=e.target.value;
      _saveCfg();
    });
  });
  // Probe audio devices and fill channel selectors (async — updates after render)
  _probeAndFillChSels(el);
  // Waveform settings
  const wfCenterSel=el.querySelector('#wfCenterSel');
  if(wfCenterSel){wfCenterSel.value=cfg.wfCenter||'left';wfCenterSel.onchange=e=>{cfg.wfCenter=e.target.value;_saveCfg();};}
  // MIDI output device list

    for(const [id,o] of _midiAccess.outputs){

  } else if(midiSel){
    _mtcInit().then(()=>{if(_midiAccess)renderSettings();});
  }
  // sync selected values
  el.querySelector('[data-cfg="tcnetIface"]').value=cfg.tcnetIface||'';
  el.querySelector('[data-cfg="pdjlIface"]').value=cfg.pdjlIface||'';
  el.querySelector('[data-cfg="tcnetMode"]').value=cfg.tcnetMode||'auto';
  // TCNet unicast checkbox handlers
  const chkUni=el.querySelector('#chkTcUnicast');
  const chkAll=el.querySelector('#chkTcAllIfaces');
  const rowAll=el.querySelector('#rowTcAllIfaces');
  if(chkUni){chkUni.onchange=e=>{
    cfg.tcnetUnicast=e.target.checked;_saveCfg();
    if(rowAll)rowAll.style.display=e.target.checked?'':'none';

<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>BRIDGE+ | Professional DJ Bridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap');
@font-face{font-family:'Noto Sans KR';src:url('./fonts/NotoSansKR-VariableFont_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'DSEG7';src:url('./fonts/DSEG7Classic-Regular.woff2') format('woff2');font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111318;--bg2:#1a1c20;--bg3:#1e2024;--bg4:#282a2e;
  --bg-lowest:#0c0e12;--bg-highest:#333539;
  --bdr:rgba(60,60,80,.15);--bdr2:rgba(60,60,80,.3);
  --tx:#e2e2e8;--tx2:#c0c0cc;--tx3:#8b8b98;--tx4:#42424e;
  --key:#8787ff;--key2:#6a6adf;--key-dim:#7575ef;--grn:#5af0b3;--grn2:#34d399;--blu:#a4c9ff;--blu2:#0267b8;--ylw:#ffd16d;--ylw2:#ecb210;--red:#ffb4ab;--pur:#a78bfa;--org:#fb923c;
  --mn:'DM Mono',monospace;--sn:'Noto Sans KR',-apple-system,sans-serif;--lb:'Space Grotesk','Noto Sans KR',sans-serif;--seg:'DSEG7',monospace
}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.active-glow{box-shadow:0 0 20px rgba(52,211,153,.15)}
.glass-panel{background:rgba(51,53,57,.6);backdrop-filter:blur(12px)}
body{background:var(--bg);color:var(--tx);font-family:var(--sn);-webkit-app-region:drag;user-select:none;overflow:hidden;font-weight:400}
button,select,input,canvas{-webkit-app-region:no-drag;font-family:var(--sn)}
.font-mono{font-family:var(--mn)}.font-label{font-family:var(--lb)}
.hdr{height:52px;padding:0 20px 0 80px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0;z-index:50}
.hdr .btn,.hdr select,.hdr input,.hdr span[id]{-webkit-app-region:no-drag}
.logo{display:flex;align-items:center;gap:10px}
.li{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--key2),var(--key));display:flex;align-items:center;justify-content:center;font:800 11px var(--mn);color:#1a1a3d}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--bdr);background:var(--bg-lowest);flex-shrink:0;height:36px}
.tab{padding:0 14px;font:600 10px var(--lb);letter-spacing:.1em;cursor:pointer;border:none;background:0;color:rgba(226,226,232,.4);position:relative;transition:color .15s;text-transform:uppercase;height:100%;display:flex;align-items:center}
.tab:hover{color:var(--tx2)}.tab.on{color:var(--key)}
.tab.on::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:var(--key);border-radius:2px 2px 0 0}
.pg{padding:16px 20px 56px;overflow-y:auto;height:calc(100vh - 88px);scroll-behavior:smooth;-webkit-overflow-scrolling:touch;-webkit-app-region:no-drag}
.pg::-webkit-scrollbar{width:5px}.pg::-webkit-scrollbar-track{background:transparent}.pg::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}.pg::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
.hide{display:none!important}
.sbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.sc{background:var(--bg4);border:none;border-radius:999px;padding:5px 14px;display:flex;align-items:center;gap:6px}
.scl{font:500 9px var(--lb);color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:0}
.bd{padding:0;border-radius:0;font:600 10px var(--mn);display:inline-block;background:none}
.bg{color:var(--key)}.br{color:var(--red)}
.bb{color:var(--blu)}.by{color:var(--ylw)}
.bm{color:var(--tx2)}.bp{color:var(--pur)}
.sc-online{background:rgba(0,86,59,.15);border:1px solid rgba(52,211,153,.2)}
.al{padding:10px 16px;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.als{background:rgba(0,86,59,.08);border:1px solid rgba(52,211,153,.15)}
.alw{background:rgba(92,67,0,.08);border:1px solid rgba(255,209,109,.15)}
.aler{background:rgba(147,0,10,.08);border:1px solid rgba(255,180,171,.15)}
.fstrip{display:flex;gap:5px;padding:6px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;margin-bottom:8px;align-items:flex-end}
.fch{flex:1;text-align:center}
.fchl{font:600 9px var(--sn);color:var(--tx3);letter-spacing:.05em;margin-bottom:3px}
.fbar{height:32px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;display:flex;align-items:flex-end}
.fbarf{width:100%;border-radius:3px;transition:height .08s}
.fval{font:600 10px var(--mn);color:var(--tx2);margin-top:2px;font-variant-numeric:tabular-nums}
.fair{font:700 8px var(--mn);color:var(--red);text-align:center;margin-top:2px;letter-spacing:.04em;animation:pulse-air 1s ease-in-out infinite}
@keyframes pulse-air{0%,100%{opacity:1}50%{opacity:.4}}
.fsep{width:1px;background:var(--bdr);height:50px;align-self:center;margin:0 2px}
.sl{font:700 9px var(--lb);color:var(--tx3);letter-spacing:.12em;margin:0 0 8px;text-transform:uppercase}.sl.mt{margin-top:16px}
.deck-area{display:flex;flex-direction:column;gap:8px}
.deck-row{display:flex;flex-direction:column;gap:6px}
.deck-row.compact{gap:4px}
.deck-row.compact .dk-hdr{padding:3px 8px 2px}
.dk{background:#0d0f12;border:1px solid rgba(113,255,232,.1);border-radius:10px;overflow:hidden;transition:box-shadow .2s,border-color .2s;min-width:0;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.dk[data-st="play"]{box-shadow:0 0 18px rgba(52,211,153,.12),0 2px 12px rgba(0,0,0,.4);border-color:rgba(52,211,153,.2)}.dk[data-st="cue"]{box-shadow:0 0 14px rgba(255,209,109,.1),0 2px 12px rgba(0,0,0,.4);border-color:rgba(255,209,109,.18)}.dk.dov{box-shadow:0 0 14px rgba(164,201,255,.12),0 2px 12px rgba(0,0,0,.4)!important;border-color:rgba(164,201,255,.25)!important}
.dshim{height:2px;opacity:0;transition:opacity .3s;background:linear-gradient(90deg,transparent,var(--grn),transparent)}
.dk[data-st="play"] .dshim{opacity:1;animation:shimmer 2s ease-in-out infinite}
.dk[data-st="cue"] .dshim{opacity:.6;background:linear-gradient(90deg,transparent,var(--ylw),transparent)}
.dtop{padding:8px 13px 8px}
.dhd{display:flex;align-items:center;margin-bottom:5px;gap:4px;justify-content:space-between}
.dhd-l{display:flex;align-items:center;gap:4px;min-width:0;overflow:hidden}
.dhd-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.did{font:400 10px var(--sn);letter-spacing:.05em;transition:color .15s;white-space:nowrap;display:flex;align-items:baseline;gap:2px}
.did-n{font:700 18px var(--mn);letter-spacing:-.02em;line-height:1}
.dbadge{font:600 9px var(--mn);padding:2px 5px;border-radius:3px;letter-spacing:.05em}
.dtc{font:normal 31px var(--seg);color:var(--tx4);letter-spacing:.04em;transition:color .15s;white-space:nowrap}
.dk[data-st="play"] .dtc,.dk[data-st="scratch"] .dtc{color:var(--tx)}
/* Overview: slim full-track waveform bar */
.dwov{height:14px;margin:0 0 3px;background:var(--bg-lowest);border-radius:3px;overflow:hidden;cursor:pointer;position:relative}
.dwov canvas{width:100%;height:100%;display:block}
/* waveform analysis progress bar (shown while buildRGBWaveform runs) */
.dwov-prog{position:absolute;bottom:0;left:0;height:2px;width:0;background:rgba(96,165,250,.7);border-radius:1px;pointer-events:none;transition:width .1s linear}
/* Zoom: scrolling RGB waveform + beat grid */
.dwz{height:64px;margin:0 0 4px;background:var(--bg-lowest);border-radius:6px;overflow:hidden;cursor:pointer;position:relative;border:1px solid var(--bdr)}
.dwz canvas{flex:1;height:100%;display:block;min-width:0}
.wf-key{position:absolute;top:4px;right:8px;font:700 14px var(--mn);color:var(--key);pointer-events:none;z-index:2;background:rgba(12,14,18,.75);padding:2px 8px;border-radius:4px}
.wf-bpm{position:absolute;bottom:4px;right:8px;font:600 12px var(--mn);color:var(--tx2);pointer-events:none;z-index:2;background:rgba(12,14,18,.75);padding:2px 8px;border-radius:4px}
.wf-key:empty,.wf-bpm:empty{display:none}
/* Expanded full-width deck — only widens, no height change */
.dk.dk-wide{grid-column:1/-1}
/* ======= DECK STRIP — HEADER + TITLE + BODY ======= */
/* Header row 1: player number + state + SYNC/MASTER + delete */
.dk-hdr{display:flex;align-items:baseline;gap:6px;padding:5px 8px 2px;overflow:hidden;white-space:nowrap}
.dk-num{font:800 26px var(--lb);color:var(--tx);line-height:1;flex-shrink:0}
.dk-player-lbl{font:600 10px var(--lb);color:var(--tx2);letter-spacing:.07em;flex-shrink:0}
.dk-hdr-r{display:flex;align-items:center;gap:3px;flex-shrink:0;margin-left:auto}
.dk-hdr-r .dhtb{padding:3px 8px;font-size:11px;border-radius:4px}
/* Header row 2: artist — title */
.dk-title-row{display:flex;align-items:center;gap:5px;padding:2px 8px 6px;overflow:hidden;white-space:nowrap;min-width:0}
.dk-title-sep{color:var(--tx3);flex-shrink:0;font-size:12px}

/* Body: WF+VU | TC | Transport | SMPTE — all top-aligned */
.dk-body{display:flex;flex-direction:row;align-items:stretch;padding:0 8px 10px;gap:8px}

/* SECTION 1 — Waveform panel + VU (cyan bordered) */
.dk-wf-wrap{display:flex;flex-direction:row;flex:1;min-width:0;height:96px;gap:0}
.dk-wf-area{display:flex;flex-direction:row;flex:1;min-width:0;border:1px solid rgba(135,135,255,.2);border-radius:4px 0 0 4px;overflow:hidden;border-right:none}
.dk-wf-area .dkart{border-radius:0;border:none;border-right:1px solid rgba(135,135,255,.1);width:96px;min-height:96px;aspect-ratio:1;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg-lowest)}
.dk-wf-col{display:flex;flex-direction:column;flex:1;min-width:0}
.dk-wf-col .dwov{height:16px;margin:0;border-radius:0;border-bottom:1px solid rgba(135,135,255,.1);background:rgba(5,8,12,.8);position:relative}
.dk-wf-col .dwov canvas{display:block;width:100%;height:100%;background:#000}
.dk-wf-col .dwov canvas.dwov-overlay{background:transparent!important}
.dk-wf-col .dwz-row{flex:1;margin:0;height:auto}
.dk-wf-col .dwz-row .dwz{border-radius:0;border:none;height:100%;margin:0}

/* SECTION 2 — TC: display + BPM/KEY/phasor + time */
.dk-tc{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:2px;flex-shrink:0;padding:0 2px}
.dk-tc-hdrs{display:grid;grid-template-columns:2fr .5fr 2fr .5fr 2fr .5fr 2fr;width:100%;font:600 8px var(--mn);color:var(--tx3);letter-spacing:.07em;text-align:center}
.dk-tc-info-row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;margin-top:auto}
.dk-bpm-cur,.dk-key-box{font:700 15px/1 var(--mn);border-radius:3px;padding:2px 6px;white-space:nowrap;display:inline-flex;align-items:center;height:24px;box-sizing:border-box;vertical-align:middle}
.dk-bpm-cur{color:var(--tx);font-variant-numeric:tabular-nums;letter-spacing:-.01em;border:1px solid rgba(135,135,255,.35)}
.dk-key-box{color:var(--key);letter-spacing:.04em;border:1px solid rgba(135,135,255,.35)}
.dk-tc-time{font:500 10px var(--mn);color:var(--tx3);font-variant-numeric:tabular-nums;white-space:nowrap;margin-top:2px}

/* SECTION 3 — Transport: CUE|PLAY row + STOP below */
.dk-transport{display:flex;flex-direction:column;gap:4px;flex-shrink:0;width:96px}
.dk-tp-top{display:flex;gap:4px;flex:1}
.dk-tp-top .dkbtn{flex:1;height:auto;border-radius:8px}
.dk-transport .dkbtn.dkcue{font:700 13px var(--mn)}
.dk-transport .dkbtn.dkplay{font-size:20px}
.dk-transport .dkbtn.dkstop{flex:none;border-radius:6px;height:28px}

/* SECTION 4 — Layer/SMPTE — CUE/PLAY 행에 맞춤 */
.dk-layer{display:flex;flex-direction:column;gap:4px;width:80px;flex-shrink:0;align-items:stretch}
.dk-layer-lbl{font:700 9px var(--lb);color:var(--tx3);letter-spacing:.1em;text-align:center;flex-shrink:0}
.dk-layer .dksm-btn{flex:none;height:28px;display:flex;align-items:center;justify-content:center;min-height:0}
.dk-layer-ab{display:flex;gap:4px;flex:1}
.dk-layer-ab .dkbtn.dklyr{flex:1;height:auto;border-radius:8px;font-size:11px;letter-spacing:.08em}
.dkctrl-btns{display:flex;gap:3px}
.dkbtn{flex:1;height:30px;min-height:0;border-radius:6px;display:flex;align-items:center;justify-content:center;font:700 9px var(--mn);cursor:pointer;border:2px solid;background:var(--bg-highest);transition:all .14s;letter-spacing:.03em;flex-shrink:0}
.dkbtn:disabled{opacity:.25;cursor:not-allowed}
/* CUE button states: dim → medium (playing) → bright (cue active) → pressed (extra bright) */
.dkbtn.dkcue{border-color:rgba(249,189,34,.2);color:rgba(255,209,109,.5);text-shadow:0 0 4px rgba(255,209,109,.15)}
.dkbtn.dkcue.medium{border-color:rgba(249,189,34,.5);color:#ffd16d;background:rgba(249,189,34,.1);text-shadow:0 0 6px rgba(255,209,109,.3)}
.dkbtn.dkcue.ac{border-color:#ecb210;color:#ffd16d;background:linear-gradient(180deg,rgba(249,189,34,.2),rgba(236,178,16,.3));box-shadow:0 0 20px rgba(236,178,16,.5),inset 0 0 10px rgba(255,209,109,.15);text-shadow:0 0 8px rgba(255,209,109,.6)}
/* PLAY button states: dim → blink (cue state) → bright (playing) */
.dkbtn.dkplay{border-color:rgba(52,211,153,.2);color:rgba(90,240,179,.5);text-shadow:0 0 4px rgba(52,211,153,.15)}
.dkbtn.dkplay.ac{border-color:var(--grn2);color:var(--grn);background:linear-gradient(180deg,rgba(52,211,153,.15),rgba(52,211,153,.25));box-shadow:0 0 20px rgba(52,211,153,.5),inset 0 0 10px rgba(90,240,179,.15);text-shadow:0 0 8px rgba(90,240,179,.6)}
.dkbtn.dkplay.blink{animation:play-blink 1s ease-in-out infinite}
@keyframes play-blink{0%,100%{border-color:rgba(52,211,153,.25);color:rgba(52,211,153,.35);background:transparent;box-shadow:none}50%{border-color:var(--grn);color:var(--grn);background:rgba(52,211,153,.15);box-shadow:0 0 8px rgba(52,211,153,.3)}}
/* STOP (return to start) button */
.dkbtn.dkstop{border-color:rgba(255,180,171,.18);color:rgba(255,180,171,.45);font-size:12px}
.dkbtn.dkstop:not(:disabled):hover{border-color:rgba(255,180,171,.5);color:var(--red)}
/* Layer A/B assign buttons + stop row */
.dklyr-btns{display:flex;gap:3px;width:100%}
.dk-stop-lyr-row .dkbtn{height:22px;font-size:11px}
.dk-stop-lyr-row .dkbtn.dklyr{height:22px;font-size:7px}
.dkbtn.dklyr{height:18px;font-size:7px;letter-spacing:.06em;border-radius:4px}
.dkbtn.dklyr-a{border-color:rgba(77,212,230,.2);color:rgba(77,212,230,.4)}
.dkbtn.dklyr-a.ac{border-color:#4dd4e6;color:#4dd4e6;background:rgba(77,212,230,.18);box-shadow:0 0 6px rgba(77,212,230,.3)}
.dkbtn.dklyr-b{border-color:rgba(255,126,179,.2);color:rgba(255,126,179,.4)}
.dkbtn.dklyr-b.ac{border-color:#ff7eb3;color:#ff7eb3;background:rgba(255,126,179,.12);box-shadow:0 0 6px rgba(255,126,179,.25)}
/* Waveform + VU side-by-side row */
.dwz-row{display:flex;flex-direction:row;gap:0;margin:0;height:68px}
.dwz-row .dwz{flex:1;min-width:0;margin:0;height:100%;border-radius:6px 0 0 6px}
/* VU strip: right side of waveform, channels side-by-side, bars vertical */
.dvu-strip{display:flex;flex-direction:row;gap:2px;align-items:stretch;width:28px;flex-shrink:0;background:var(--bg-lowest);border:1px solid rgba(135,135,255,.2);border-left:none;border-radius:0 4px 4px 0;padding:3px 3px 3px 2px}
.dvu-strip.dvu-mono{width:18px}
.dvu-ch{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;height:100%}
.dvu-lbl{font:700 6px var(--mn);color:#fff;height:7px;line-height:7px;flex-shrink:0}
.dvu-hbar{flex:1;width:100%;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;position:relative}
.dvu-hfill{position:absolute;bottom:0;left:0;right:0;height:0%;border-radius:2px;transition:height .05s}
.dvu-fader{cursor:ns-resize}.dvu-fader .dvu-hbar{cursor:ns-resize}
/* EQ knob strip: HW mode only, right of VU strip */
.deq-strip{display:flex;flex-direction:column;justify-content:space-around;align-items:center;width:34px;flex-shrink:0;background:var(--bg-lowest);border:1px solid rgba(124,111,205,.2);border-left:none;border-radius:0 4px 4px 0;padding:4px 2px}
.deq-knob{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:default}
.deq-knob svg{display:block;overflow:visible}
.deq-lbl{font:700 5px var(--mn);color:var(--tx4);line-height:1;letter-spacing:.03em}
/* Beat phasor: 2×2 square grid — row-major = TL→TR→BL→BR (clockwise) */
.dphs{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);grid-auto-flow:row;gap:2px;width:22px;height:22px;flex-shrink:0}
.dphs-seg{border-radius:3px;background:rgba(255,255,255,.1);position:relative;overflow:hidden}
.dphs-seg.on{background:rgba(255,255,255,.18)}
.dphs-fill{position:absolute;inset:0;border-radius:3px;background:rgba(160,160,255,.7);opacity:0;transition:opacity .05s}
.dphs-seg.on .dphs-fill{background:rgba(160,160,255,1);box-shadow:0 0 6px rgba(160,160,255,.8)}
/* Beat 1 (TL) gets bright white accent on downbeat */
.dphs-seg:nth-child(1).on .dphs-fill{background:#fff;box-shadow:0 0 8px rgba(255,255,255,.9)}
/* Beat phasor: right-aligned flex-shrink block */
.dktn-phs{display:flex;flex-direction:row;align-items:center;gap:3px;flex-shrink:0}
/* Zoom overlay buttons on waveform — left side, vertically centered */
.dzoom-btns{position:absolute;top:50%;left:4px;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;z-index:2;pointer-events:none}
.dzb{pointer-events:auto;padding:0;width:18px;height:14px;border-radius:2px;font:600 10px var(--mn);cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.55);color:rgba(255,255,255,.65);transition:all .1s;display:flex;align-items:center;justify-content:center;line-height:1}
.dzb:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.35)}
/* Eject button — separate, full-width */
.dje{padding:5px 13px;border-top:1px solid var(--bg3)}
.djebtn{width:100%;padding:5px 0;border-radius:5px;font:600 9px var(--mn);cursor:pointer;border:1px solid rgba(248,113,113,.2);background:0;color:rgba(248,113,113,.6);transition:all .12s;letter-spacing:.06em}
.djebtn:hover:not(:disabled){background:rgba(248,113,113,.08);color:rgba(248,113,113,.9);border-color:rgba(248,113,113,.4)}.djebtn:active{transform:scale(.98)}
/* Header transport buttons */
.dht{display:flex;align-items:center;gap:2px;flex-shrink:0}
.dhtb{padding:3px 6px;border-radius:4px;font:600 9px var(--mn);cursor:pointer;border:1px solid var(--bdr2);background:0;color:var(--tx2);transition:all .12s;letter-spacing:.04em;white-space:nowrap}
.dhtb:hover:not(:disabled){background:var(--bg4);color:var(--tx)}.dhtb:active:not(:disabled){transform:scale(.97)}.dhtb:disabled{opacity:.3;cursor:not-allowed}
.dhtb.cc{color:var(--ylw);border-color:rgba(251,191,36,.3)}.dhtb.cc:hover:not(:disabled){background:rgba(251,191,36,.08)}.dhtb.cc.ac{background:rgba(251,191,36,.2);border-color:var(--ylw)}
.dhtb.cp{color:var(--key);border-color:rgba(135,135,255,.3)}.dhtb.cp:hover:not(:disabled){background:rgba(135,135,255,.08)}.dhtb.cp.ac{background:rgba(135,135,255,.15);border-color:var(--key)}
.dhtb.cdl{color:var(--red);border-color:rgba(239,68,68,.25)}.dhtb.cdl:hover{background:rgba(239,68,68,.08)}
.din{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:7px}
.dil{font:400 9px var(--sn);color:var(--tx3);letter-spacing:.04em}
.div{font:600 11px var(--mn);color:var(--tx4);transition:color .15s;font-variant-numeric:tabular-nums}
.dk[data-st="play"] .div,.dk[data-st="cue"] .div{color:var(--tx)}
.dtr{padding:5px 13px;border-top:1px solid var(--bg3);display:flex;align-items:center;gap:8px}
.dart{width:44px;height:44px;border-radius:5px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid var(--bdr)}
.dartp{display:flex;align-items:center;justify-content:center}

<script>

  'Fm':'4A','E#m':'4A',
  'Cm':'5A','Gm':'6A','Dm':'7A',
};
function _toCamelot(k){
  if(!k)return '';
  const t=k.trim();
  // 이미 카멜롯 형식이면 역변환해서 둘 다 표시
  if(/^([1-9]|1[0-2])[AB]$/i.test(t)){
    const cam=t.toUpperCase();
    // Reverse lookup: find original key from camelot
    const orig=Object.entries(_CAMELOT).find(([_,v])=>v===cam);
    return orig ? cam+' / '+orig[0] : cam;
  }
  // 표준 → 카멜롯 변환
  const norm=t.replace(/\s*(minor|maj)\s*/i,(m,p)=>p.toLowerCase()==='minor'?'m':'')
              .replace(/\s+/g,'');
  const cam=_CAMELOT[norm]||_CAMELOT[norm.replace('♭','b').replace('♯','#')]||'';
  return cam ? cam+' / '+t : t;
}



// ════ SMPTE Timecode Engine — Output Layer routing ══════════════════
// Input Layer (decks 1-6) → Output Layer (A/B/M) → LTC / MTC / Art-Net

const TC_FPS_TYPE = {'24':0,'25':1,'29.97':2,'30':3};

// Output Layer 상태
const OUT = {
  A: {src:null, ltc:false, mtc:false, art:false, offset:0, _qf:0},
  B: {src:null, ltc:false, mtc:false, art:false, offset:0, _qf:0},
  M: {src:null, ltc:false, mtc:false, art:false, offset:0, _qf:0},
};
// M의 src는 'A'|'B'|slot(number)|null

// ── LTC (AudioWorklet) — independent instance per output layer ──────
const _ltc = {
  A:{ctx:null,node:null,out:null,ready:false},
  B:{ctx:null,node:null,out:null,ready:false},
  M:{ctx:null,node:null,out:null,ready:false},
};

function _ltcTeardown(layer){
  const L=_ltc[layer];
  try{if(L.node)L.node.disconnect();}catch(_){}
  try{if(L.out){L.out.pause();L.out.srcObject=null;}}catch(_){}
  try{if(L.ctx)L.ctx.close();}catch(_){}
  L.ctx=null;L.node=null;L.out=null;L.ready=false;
}

async function _ltcInit(layer){
  const L=_ltc[layer];
  if(L.ready)return true;
  const devId=cfg[`tcLtc${layer}`]||'';
  const ch=parseInt(cfg[`tcLtc${layer}Ch`])||0; // 0-indexed output channel
  try{
    L.ctx=new AudioContext({sampleRate:48000});
    await L.ctx.audioWorklet.addModule('./ltc-processor.js');
    L.node=new AudioWorkletNode(L.ctx,'ltc-processor',{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[1]});
    if(ch===0){
      // Default: mono → channel 1 via MediaStream (broadest compat)
      const dest=L.ctx.createMediaStreamDestination();
      L.node.connect(dest);
      L.out=new Audio();L.out.srcObject=dest.stream;
      if(devId){try{await L.out.setSinkId(devId);}catch(_){}}
      await L.out.play();
    }else{
      // Route mono LTC to specific channel via AudioContext destination
      if(L.ctx.setSinkId&&devId){try{await L.ctx.setSinkId(devId);}catch(_){}}
      const totalCh=ch+1;
      try{
        L.ctx.destination.channelCount=Math.min(totalCh,L.ctx.destination.maxChannelCount);
        L.ctx.destination.channelCountMode='explicit';
        L.ctx.destination.channelInterpretation='discrete';
      }catch(_){}
      const merger=L.ctx.createChannelMerger(totalCh);
      L.node.connect(merger,0,ch);
      merger.connect(L.ctx.destination);
    }
    L.ready=true;
    console.log(`[LTC-${layer}] ready device="${devId||'default'}" ch=${ch+1}`);
    return true;
  }catch(e){console.error(`[LTC-${layer}] init failed:`,e);return false;}
}

async function _ltcSetDevice(layer,devId,ch){
  cfg[`tcLtc${layer}`]=devId;
  if(ch!==undefined)cfg[`tcLtc${layer}Ch`]=ch;
  _ltcTeardown(layer);
  if(OUT[layer].ltc)await _ltcInit(layer);
}

function _ltcSend(layer, ms, playing){
  const L=_ltc[layer];
  if(!L.ready||!L.node)return;
  const fps=parseFloat(cfg.tcFps)||25, ri=Math.round(fps);
  const totalF=Math.floor(ms/1000*fps);
  const ff=totalF%ri, ss=Math.floor(totalF/ri)%60, mm=Math.floor(totalF/ri/60)%60, hh=Math.floor(totalF/ri/3600)%24;
  L.node.port.postMessage({cmd:'setPos',ch:0,fps,hh,mm,ss,ff,running:playing});
}

function _ltcStop(layer){
  const L=_ltc[layer];
  if(!L.node)return;
  L.node.port.postMessage({cmd:'setPos',ch:0,running:false});
}

// ── MTC (Master Timecode) ────────────────────────────
let _midiAccess=null, _mtcOut=null;
async function _mtcInit(){
  if(_midiAccess)return true;
  try{
    _midiAccess=await navigator.requestMIDIAccess({sysex:false});
    _mtcSelectOutput(cfg.tcMidiOutId);
    return true;
  }catch(e){console.warn('[MTC] MIDI access failed:',e);return false;}
}
function _mtcSelectOutput(id){
  _mtcOut=null;if(!_midiAccess)return;
  if(id)_mtcOut=_midiAccess.outputs.get(id);
  if(!_mtcOut)for(const o of _midiAccess.outputs.values()){_mtcOut=o;break;}
}
function _mtcSend(layer, ms, playing){
  if(!_mtcOut||!playing)return;
  const fps=parseFloat(cfg.tcFps)||25, ri=Math.round(fps);
  const totalF=Math.floor(ms/1000*fps);
  const ff=totalF%ri, ss=Math.floor(totalF/ri)%60, mm=Math.floor(totalF/ri/60)%60, hh=Math.floor(totalF/ri/3600)%24;
  const type=TC_FPS_TYPE[cfg.tcFps]??1;
  const qf=OUT[layer]._qf;
  let d;
  switch(qf%8){
    case 0:d=0x00|(ff&0x0F);break; case 1:d=0x10|((ff>>4)&1);break;
    case 2:d=0x20|(ss&0x0F);break; case 3:d=0x30|((ss>>4)&3);break;
    case 4:d=0x40|(mm&0x0F);break; case 5:d=0x50|((mm>>4)&3);break;
    case 6:d=0x60|(hh&0x0F);break; case 7:d=0x70|((hh>>4)&1)|(type<<1);break;
  }
  try{_mtcOut.send([0xF1,d]);}catch(_){}
  OUT[layer]._qf=(qf+1)&0xFF;
}

// ── Artnet Timecode ──────────────────────────────────
function _artSend(ms, playing){
  if(!E)return;
  const fps=parseFloat(cfg.tcFps)||25, ri=Math.round(fps);
  const totalF=Math.floor(ms/1000*fps);

// ── Get source deck position / playing state for an output layer ────
function _outSrcMs(key){
  const o=OUT[key];
  if(o.src==null)return null;
  if(key==='M'&&(o.src==='A'||o.src==='B'))return _outSrcMs(o.src);
  const d=DECKS[o.src];
  if(!d||!d.ld)return null;
  return Math.round(d.pos)+o.offset;
}
function _outPlaying(key){
  const o=OUT[key];
  if(o.src==null)return false;
  if(key==='M'&&(o.src==='A'||o.src==='B'))return _outPlaying(o.src);
  const d=DECKS[o.src];
  return !!(d&&d.pl);
}

// ── Timecode tick — called every ~33ms from tick() ──────────────────
async function tcTick(){
  for(const [key,o] of Object.entries(OUT)){
    const ms=_outSrcMs(key);
    const playing=_outPlaying(key);
    if(o.ltc){
      if(!_ltc[key].ready)await _ltcInit(key);
      if(ms!=null)_ltcSend(key,ms,playing);
      else _ltcStop(key);
    }
    if(o.mtc){
      if(!_midiAccess)await _mtcInit();
      if(ms!=null)_mtcSend(key,ms,playing);
    }
    // Art-Net: send whenever source has a position (not just when playing)
    if(o.art&&ms!=null)_artSend(ms,playing);
  }
}

// ── Enable / disable an output layer mode ────────────────────────────
function _outSetMode(key,mode,val){
  OUT[key][mode]=val;
  if(!val){
    if(mode==='ltc')_ltcStop(key);
  } else {
    if(mode==='ltc'&&!_ltc[key].ready)_ltcInit(key);
    if(mode==='mtc'&&!_midiAccess)_mtcInit();
  }
  renderOutLayers();
}

// 80-bit IEEE 754 extended → JS number (AIFF sampleRate parsing)
function _read80BitFloat(v,off){
  const exp=(v.getUint16(off,false)&0x7FFF)-16383-63;
  const hi=v.getUint32(off+2,false),lo=v.getUint32(off+6,false);
  return(hi*4294967296+lo)*Math.pow(2,exp);
}

// AIFF/AIFC(PCM) → WAV Blob — Chromium does not support AIFF natively
function _aiffToWav(ab){
  const v=new DataView(ab);
  if(v.getUint32(0,false)!==0x464F524D)throw new Error('Not FORM');
  const ft=String.fromCharCode(v.getUint8(8),v.getUint8(9),v.getUint8(10),v.getUint8(11));
  if(ft!=='AIFF'&&ft!=='AIFC')throw new Error('Not AIFF');
  let ch=0,nf=0,ss=0,sr=0,ssndOff=-1,ssndDataOff=0,comp='NONE';
  let pos=12;
  while(pos+8<=ab.byteLength){
    const id=String.fromCharCode(v.getUint8(pos),v.getUint8(pos+1),v.getUint8(pos+2),v.getUint8(pos+3));
    const sz=v.getUint32(pos+4,false);
    if(id==='COMM'){ch=v.getInt16(pos+8,false);nf=v.getUint32(pos+10,false);ss=v.getInt16(pos+14,false);sr=Math.round(_read80BitFloat(v,pos+16));if(ft==='AIFC'&&sz>=22)comp=String.fromCharCode(v.getUint8(pos+26),v.getUint8(pos+27),v.getUint8(pos+28),v.getUint8(pos+29));}
    else if(id==='SSND'){ssndOff=pos+8;ssndDataOff=v.getUint32(pos+8,false);}
    pos+=8+sz+(sz&1);if(sz===0)break;
  }
  if(ssndOff<0||ch===0)throw new Error('Missing COMM/SSND');
  if(comp!=='NONE'&&comp!=='sowt')throw new Error('Compressed AIFC not supported: '+comp);
  const bps=Math.ceil(ss/8),le=(comp==='sowt');
  const dataStart=ssndOff+8+ssndDataOff,numBytes=nf*ch*bps;
  const wav=new ArrayBuffer(44+numBytes),w=new DataView(wav);
  w.setUint32(0,0x52494646,false);w.setUint32(4,36+numBytes,true);w.setUint32(8,0x57415645,false);
  w.setUint32(12,0x666D7420,false);w.setUint32(16,16,true);w.setUint16(20,1,true);
  w.setUint16(22,ch,true);w.setUint32(24,sr,true);w.setUint32(28,sr*ch*bps,true);w.setUint16(32,ch*bps,true);w.setUint16(34,ss,true);
  w.setUint32(36,0x64617461,false);w.setUint32(40,numBytes,true);
  const src=new Uint8Array(ab,dataStart,Math.min(numBytes,ab.byteLength-dataStart)),dst=new Uint8Array(wav,44);
  if(le||ss<=8){dst.set(src);}
  else if(ss===16){for(let i=0;i+1<src.length;i+=2){dst[i]=src[i+1];dst[i+1]=src[i];}}
  else if(ss===24){for(let i=0;i+2<src.length;i+=3){dst[i]=src[i+2];dst[i+1]=src[i+1];dst[i+2]=src[i];}}
  else if(ss===32){for(let i=0;i+3<src.length;i+=4){dst[i]=src[i+3];dst[i+1]=src[i+2];dst[i+2]=src[i+1];dst[i+3]=src[i];}}
  return new Blob([wav],{type:'audio/wav'});
}

// Scan AIFF chunks for an ID3 tag (may appear after large SSND chunk)
async function _findAIFFId3(file){
  const hdr=new DataView(await file.slice(0,12).arrayBuffer());
  if(hdr.getUint32(0,false)!==0x464F524D)return -1;
  const ft=String.fromCharCode(hdr.getUint8(8),hdr.getUint8(9),hdr.getUint8(10),hdr.getUint8(11));
  if(ft!=='AIFF'&&ft!=='AIFC')return -1;
  let pos=12;
  while(pos+8<=file.size){
    const h=new DataView(await file.slice(pos,pos+8).arrayBuffer());
    const id=String.fromCharCode(h.getUint8(0),h.getUint8(1),h.getUint8(2),h.getUint8(3));
    const sz=h.getUint32(4,false);
    if(!id.trim()||sz>file.size)break;
    if(id==='ID3 '||id==='id3 ')return pos+8;
    pos+=8+sz+(sz&1);if(sz===0)break;
  }
  return -1;
}

// onChunk(doneCount, partialWf) called every 400 pts for progressive display
async function buildRGBWaveform(blob, onChunk){
  try{
    const _ac=new(window.AudioContext||window.webkitAudioContext)();
    const ab=await blob.arrayBuffer();
    const buf=await _ac.decodeAudioData(ab);
    _ac.close();
    const ch=buf.getChannelData(0),sr=buf.sampleRate;
    // CDJ uses ~150 entries/sec; cap at 50000 for full resolution (5.5min @ 150/s)
    const pts=Math.min(50000,Math.max(6000,Math.floor(buf.duration*150)));
    const step=Math.max(1,Math.floor(ch.length/pts));
    // 4th-order Butterworth biquad lowpass filters (-24dB/oct)
    // Crossover: 600Hz / 4000Hz (Mixxx standard for 3-band waveform)
    // PEAK values per band (not RMS) — matches Mixxx's AnalyzerWaveform approach
    function _mkBQ(fc,sr2,Q){
      const w=2*Math.PI*fc/sr2,sn=Math.sin(w),cs=Math.cos(w),al=sn/(2*Q),a0=1+al;
      return{b0:((1-cs)/2)/a0,b1:(1-cs)/a0,b2:((1-cs)/2)/a0,a1:(-2*cs)/a0,a2:(1-al)/a0,w1:0,w2:0};
    }
    function _bq(f,x){const y=f.b0*x+f.w1;f.w1=f.b1*x-f.a1*y+f.w2;f.w2=f.b2*x-f.a2*y;return y;}
    const _Q1=0.5412,_Q2=1.3066;
    const _lpB1=_mkBQ(600,sr,_Q1),_lpB2=_mkBQ(600,sr,_Q2);
    const _lpM1=_mkBQ(4000,sr,_Q1),_lpM2=_mkBQ(4000,sr,_Q2);
    const wf=new Array(pts);
    const CHUNK=Math.max(200,Math.floor(pts/30));
    for(let i=0;i<pts;i++){
      const s0=i*step;let pl=0,pm=0,ph=0,pk=0,mn=0,mx=0,sumSq=0;
      for(let j=0;j<step;j++){
        const s=ch[s0+j]||0;
        sumSq+=s*s; // RMS accumulator
        const bassLP=_bq(_lpB2,_bq(_lpB1,s));
        const midLP=_bq(_lpM2,_bq(_lpM1,s));
        const bass=bassLP, mid2=midLP-bassLP, tre=s-midLP;
        // PEAK per band (for color), RMS for height
        const ab=Math.abs(bass),am=Math.abs(mid2),at=Math.abs(tre);
        if(ab>pl)pl=ab; if(am>pm)pm=am; if(at>ph)ph=at;
        const a=Math.abs(s);if(a>pk)pk=a;
        if(s<mn)mn=s;if(s>mx)mx=s;
      }
      const rms=Math.sqrt(sumSq/step);
      wf[i]={h:pk,mn,mx,r:pl,g:pm,b:ph,rms};
      if(onChunk&&(i+1)%CHUNK===0){
        onChunk(i+1,wf);
        await new Promise(r=>setTimeout(r,0)); // yield to UI
      }
    }
    return wf;
  }catch(e){console.warn('[rgbWf]',e);return null;}
}

// CDJ-3000 color waveform: nibble → RGB
// Rekordbox color encoding from CDJ extended status packets
function _cdjColorToRGB(c){
  const map=[
    [0,0,0],[1,.12,.12],[1,.5,.05],[1,.95,.05],[.1,1,.1],[.1,1,1],
    [.15,.35,1],[.65,.1,1],[.55,.55,.55],[.85,.05,.05],[.95,.5,.05],[.85,.85,.05],
    [.05,.65,.05],[.05,.65,.65],[.3,.05,1],[.75,.05,.75]
  ];
  return map[c&0xF]||[0,0,0];
}
// CDJ color index → smooth bass/mid/treble via HSL-like frequency mapping
// Each color gets a blended ratio instead of hard single-band dominance
function _cdjColorTo3Band(c){
  // CDJ colors map to a frequency "angle" — smooth sine-based blending
  // 0=silent, 1=deep bass, 2=bass, 3=low-mid, 4=mid, 5=hi-mid, 6=treble, 7=sub+treble
  const idx = c & 7;
  if(idx===0) return [.15,.15,.15]; // gray = low energy across all bands
  // Map color index to frequency angle (0=bass, π/2=mid, π=treble)
  const angles = [0, 0, .25, .55, .75, 1.05, 1.35, 1.55]; // radians × π
  const a = angles[idx] * Math.PI;
  // Smooth cosine-bell overlap: each band peaks at its center angle
  const bass   = Math.max(0, Math.cos(a) * 0.5 + 0.5);           // peaks at 0
  const mid    = Math.max(0, Math.cos(a - Math.PI*0.5) * 0.5 + 0.5); // peaks at π/2
  const treble = Math.max(0, Math.cos(a - Math.PI) * 0.5 + 0.5);     // peaks at π
  // Purple (7) has sub-bass + treble
  if(idx===7) return [.35, .1, .7];
  return [bass, mid, treble];
}

// Waveform color: 3 presets — 'blue', 'rgb', '3band'
// Source: Rekordbox ANLZ PWV4/PWV5/PWV6 + Deep-Symmetry/dysentery #9/#33
function _wfBlend(r,g,b2,dimF){
  const mode=cfg.wfColor||'rgb';
  if(mode==='blue'){
    // Rekordbox BLUE: #0055B0 (deep) → #AADDFF (bright), hue shifts blue→cyan-white with treble
    const e=Math.min(1,Math.sqrt(r*r+g*g+b2*b2));
    const w=b2/(r+g+b2||1); // whiteness = treble share (0-1)
    const br=Math.pow(e,0.55);
    const R=Math.round((br*0  +w*170)*dimF);
    const G=Math.round((br*85 +w*135)*dimF);
    const B=Math.round((br*176+w*79 )*dimF);
    return[Math.min(255,R),Math.min(255,G),Math.min(255,B)];
  }
  if(mode==='3band'){
    // 3BAND stacked: bass=#0055E1(blue), mid=#FFA600(amber), treble=#FFFFFF(white)
    // Return per-band data for stacked rendering in draw functions
    // For non-stacked contexts, blend with dominance
    const tot=r+g+b2||0.001;
    const rn=r/tot,gn=g/tot,bn=b2/tot;
    // Bass=#0055E1, Mid=#FFA600, Treble=#FFFFFF — weighted blend
    const R=Math.min(255,Math.round((rn*0x00+gn*0xFF+bn*0xFF)*dimF));
    const G=Math.min(255,Math.round((rn*0x55+gn*0xA6+bn*0xFF)*dimF));
    const B=Math.min(255,Math.round((rn*0xE1+gn*0x00+bn*0xFF)*dimF));
    return[R,G,B];
  }
  // RGB (default): Rekordbox RGB — dominant band at max, others suppressed
  // Bass→Red, Mid→Green, Treble→Blue; power curve for vivid color separation
  const mx=Math.max(r,g,b2)||0.001;
  const R=Math.min(255,Math.round(Math.pow(r/mx,1.5)*255*dimF));
  const G=Math.min(255,Math.round(Math.pow(g/mx,1.5)*255*dimF));
  const B=Math.min(255,Math.round(Math.pow(b2/mx,1.5)*255*dimF));
  return[R,G,B];
}
// 3BAND stacked rendering helper: returns [{color,h},...] from bottom to top
function _wf3BandStack(r,g,b2,totalH,dimF){
  // Perceptual gain: bass sqrt+boost, treble 0.5x — matches WebGL shader correction
  const bH=Math.round(Math.sqrt(r)*1.4*totalH),mH=Math.round(g*totalH),tH=Math.round(b2*0.5*totalH);
  return[
    {R:Math.round(0x00*dimF),G:Math.round(0x55*dimF),B:Math.round(0xE1*dimF),h:bH},   // bass=blue
    {R:Math.round(0xFF*dimF),G:Math.round(0xA6*dimF),B:Math.round(0x00*dimF),h:mH},   // mid=amber
    {R:Math.round(0xFF*dimF),G:Math.round(0xFF*dimF),B:Math.round(0xFF*dimF),h:tH},   // treble=white
  ];
}

// ═══ Waveform Bitmap Cache (OffscreenCanvas) ═══
// Rekordbox-style: ImageData pixel control — vertical gradient per column
// Center=bright, edges=fade, adjacent columns blend via imageSmoothingEnabled
function buildWaveformCache(slot){
  const d=DECKS[slot];if(!d)return;
  const wfData=d.rgbWfDetail||d.rgbWf;
  if(!wfData||wfData.length<2)return;
  const cv=document.getElementById('wzc'+slot);
  const H=cv?cv.height:100;
  const pts=wfData.length;
  const cacheKey=pts+'_'+H+'_grad1';
  if(d._wfCache&&d._wfCacheKey===cacheKey)return;
  const oc=new OffscreenCanvas(pts,H);
  const ctx=oc.getContext('2d',{alpha:false});
  const imgData=ctx.createImageData(pts,H);
  const buf=imgData.data;
  const mid=H>>1;
  for(let x=0;x<pts;x++){
    const p=wfData[x];
    if(p.h<0.01)continue;
    const h=Math.max(1,Math.round(p.h*mid*0.95));
    let R,G,B;
    if(d.type==='hw'&&!d._pwv7){
      // HW native CDJ colors — display as-is, normalize brightness
      const mx=Math.max(p.r,p.g,p.b,0.001);const sc=255/mx;
      R=Math.min(255,Math.round(p.r*sc))|0; G=Math.min(255,Math.round(p.g*sc))|0; B=Math.min(255,Math.round(p.b*sc))|0;
    }else{
      // Virtual or HW PWV7 — apply color mode blend
      [R,G,B]=_wfBlend(p.r,p.g,p.b,1);
    }
    // Vertical gradient: center=100% bright → edge=25% bright
    const invH=1/h;
    for(let dy=-h;dy<=h;dy++){
      const y=mid+dy;
      if(y<0||y>=H)continue;
      const dist=Math.abs(dy)*invH; // 0=center, 1=edge
      const br=1.0-dist*0.75; // 100%→25%
      const off=(y*pts+x)<<2;
      buf[off]  =R*br|0;
      buf[off+1]=G*br|0;
      buf[off+2]=B*br|0;
      buf[off+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
  d._wfCache=oc;
  d._wfCacheH=H;
  d._wfCacheKey=cacheKey;
  console.log(`[WFC] slot${slot} gradient cache: ${pts}×${H}px`);
}

function drawOverview(slot,prog){
  const d=DECKS[slot];if(!d)return;
  const pos=Math.max(0,Math.min(1,prog||0));
  if(d.ovgl&&(d.rgbWfDetail||d.rgbWf)){
    // Auto-upload texture if missing — mirrors drawZoomWaveform's self-healing pattern
    if(!d.ovgl._wfTex){const _wd=d.rgbWfDetail||d.rgbWf;if(_wd)d.ovgl.setData(_wd);}
    if(!d.ovgl._wfTex)return;
    // HW decks → mode 3 (CDJ native colors), blue config → mode 2, default → mode 1
    d.ovgl.draw(pos, d.type==='hw' ? 3 : (cfg.wfColor==='blue' ? 2 : 1));
    // Continue to draw overlay markers on separate canvas
  } else {
    if(!d.wovCtx)return;
    const wfOv=d.rgbWfDetail||d.rgbWf;
    if(!wfOv)return;
    const cv=document.getElementById('wov'+slot);if(!cv||!cv.width)return;
    const W=cv.width,H=cv.height,ctx=d.wovCtx;
    const pts=wfOv.length,mid=H/2;
    const ovImg=ctx.createImageData(W,H);
    const ovBuf=ovImg.data;
    for(let px=0;px<W;px++){
      const i0=Math.floor(px*pts/W),i1=Math.min(pts-1,Math.floor((px+1)*pts/W));
      let r=0,g=0,b=0,pk=0;const cnt=Math.max(1,i1-i0+1);
      for(let i=i0;i<=i1;i++){const p=wfOv[i];r+=p.r;g+=p.g;b+=p.b;if(p.h>pk)pk=p.h;}
      r/=cnt;g/=cnt;b/=cnt;
      const h=Math.max(1,Math.round(pk*mid*0.95));
      if(h<1)continue;
      let R,G,B;
      if(d.type==='hw'&&!d._pwv7){
        const mx2=Math.max(r,g,b,0.001);const sc2=255/mx2;
        R=Math.min(255,r*sc2)|0; G=Math.min(255,g*sc2)|0; B=Math.min(255,b*sc2)|0;
      }else{
        [R,G,B]=_wfBlend(r,g,b,1);
      }
      const invH=1/h;
      for(let dy=-h;dy<=h;dy++){
        const y=mid+dy;if(y<0||y>=H)continue;
        const br=1.0-Math.abs(dy)*invH*0.75;
        const off=(y*W+px)<<2;
        ovBuf[off]=R*br|0;ovBuf[off+1]=G*br|0;ovBuf[off+2]=B*br|0;ovBuf[off+3]=255;
      }
    }
    ctx.putImageData(ovImg,0,0);
  }

  // Overview overlay — cue points, loops, playhead (works for both WebGL and 2D modes)
  const olCv=document.getElementById('wovol'+slot)||document.getElementById('wov'+slot);
  if(!olCv)return;
  // For WebGL mode: use separate overlay canvas; for 2D mode: draw on same canvas
  let olCtx;
  if(d.ovgl){
    if(!d._wovOlCtx){
      const olEl=document.getElementById('wovol'+slot);
      if(!olEl)return;
      olEl.width=olCv.width||olEl.parentElement.clientWidth;
      olEl.height=olCv.height||olEl.parentElement.clientHeight;
      d._wovOlCtx=olEl.getContext('2d');
    }
    olCtx=d._wovOlCtx;
  } else {
    olCtx=d.wovCtx;
  }
  if(!olCtx)return;
  const W2=olCtx.canvas.width,H2=olCtx.canvas.height;
  if(W2<2||H2<2)return;
  if(d.ovgl) olCtx.clearRect(0,0,W2,H2); // clear overlay for WebGL mode

  const _cueColors={0:'#ff1744',1:'#ff9100',2:'#ffd600',3:'#00e676',4:'#00b0ff',5:'#d500f9',6:'#ff4081',7:'#e0e0e0'};
  function _ovCueCol(cue){
    if(cue.colorR||cue.colorG||cue.colorB) return`rgb(${cue.colorR},${cue.colorG},${cue.colorB})`;
    if(cue.type==='hot')return _cueColors[cue.colorId]||'#00e676';
    if(cue.type==='loop')return '#ff8800';
    return '#fff';
  }
  if(d.cuePoints&&d.dur>0){
    olCtx.font='bold 8px "DM Mono",monospace';
    for(const cue of d.cuePoints){
      const cx=Math.round(cue.timeMs/d.dur*W2);
      if(cx<0||cx>=W2)continue;
      const col=_ovCueCol(cue);
      // Loop range — yellow overlay
      if(cue.type==='loop'&&cue.loopEndMs>0){
        const ex=Math.round(cue.loopEndMs/d.dur*W2);
        if(ex>cx){
          const isActive=d._isLooping&&d.pos>=cue.timeMs-50&&d.pos<=cue.loopEndMs+50;
          olCtx.fillStyle=isActive?'rgba(255,200,0,.25)':'rgba(255,180,0,.12)';
          olCtx.fillRect(cx,0,ex-cx,H2);
        }
      }
      // Vertical line
      olCtx.strokeStyle=col;olCtx.lineWidth=1;
      olCtx.beginPath();olCtx.moveTo(cx,0);olCtx.lineTo(cx,H2);olCtx.stroke();
      // Triangle marker at top
      olCtx.fillStyle=col;
      olCtx.beginPath();olCtx.moveTo(cx-4,0);olCtx.lineTo(cx+4,0);olCtx.lineTo(cx,6);olCtx.closePath();olCtx.fill();
      // Label
      if(cue.type==='hot'&&cue.hotCueNum>0){
        const label=cue.hotCueNum<=26?String.fromCharCode(64+cue.hotCueNum):String(cue.hotCueNum);
        olCtx.fillStyle='rgba(0,0,0,.7)';olCtx.fillRect(cx+1,0,9,10);
        olCtx.fillStyle=col;olCtx.fillText(label,cx+2,9);
      }else if(cue.type==='loop'){
        const label=cue.hotCueNum>0?String.fromCharCode(64+cue.hotCueNum):'L';
        olCtx.fillStyle='rgba(0,0,0,.7)';olCtx.fillRect(cx+1,0,9,10);
        olCtx.fillStyle=col;olCtx.fillText(label,cx+2,9);
      }else if(cue.type==='memory'){
        olCtx.fillStyle='rgba(0,0,0,.5)';olCtx.fillRect(cx+1,0,9,10);
        olCtx.fillStyle='rgba(255,255,255,.8)';olCtx.fillText('M',cx+2,9);
      }
    }
  }
  if(d.cp>0&&d.dur>0){
    const cx=Math.round(d.cp*1000/d.dur*W2);
    olCtx.fillStyle='rgba(251,191,36,.9)';olCtx.fillRect(cx-.5,0,1,H2);
    olCtx.beginPath();olCtx.moveTo(cx-3,0);olCtx.lineTo(cx+3,0);olCtx.lineTo(cx,4);olCtx.closePath();
    olCtx.fillStyle='rgba(251,191,36,1)';olCtx.fill();
  }
  olCtx.fillStyle='rgba(255,255,255,.92)';olCtx.fillRect(Math.round(pos*W2)-.5,0,1,H2);
}

// Zoom waveform — GPU path (WebGL) + CPU fallback (2D Canvas)
function drawZoomWaveform(slot,prog){
  const d=DECKS[slot];
  const wfData=d?.rgbWfDetail||d?.rgbWf;
  if(!d||!wfData)return;
  const pos=Math.max(0,Math.min(1,prog||0));

  // Store bar.beat for overlay use
  if(d.bpm>0){
    // HW deck: use beatNum from CDJ directly for accurate bar counting
    if(d.type==='hw'&&d._beatNum>0){
      const barNum=Math.floor((d._beatNum-1)/4)+1;
      const beatInBar=d.beatInBar||((d._beatNum-1)%4+1);
      d._barBeat=barNum+'.'+beatInBar+'Bars';
    } else if(d.dur>0){
      const dur=d.dur,posMs=pos*dur;
      if(d._beatGrid&&d._beatGrid.length>0){
        const bg=d._beatGrid;
        let lo=0, hi=bg.length-1;
        while(lo<hi){const mid2=(lo+hi+1)>>1;if(bg[mid2].timeMs<=posMs)lo=mid2;else hi=mid2-1;}
        if(bg[lo].timeMs<=posMs){
          const barNum=Math.floor(lo/4)+1;
          const beatInBar=bg[lo].beatInBar||((lo%4)+1);
          d._barBeat=barNum+'.'+beatInBar+'Bars';
        }else{
          const beatMs=60000/(bg[0].bpm||d.bpm);
          const beatsBack=Math.ceil((bg[0].timeMs-posMs)/beatMs);
          const beatIdx=-beatsBack;
          const barNum=Math.floor(beatIdx/4);
          const beatInBar=((beatIdx%4)+4)%4+1;
          d._barBeat=barNum+'.'+beatInBar+'Bars';
        }
      }else{
        const beatMs=60000/(d.baseBpm||d.bpm),anchor=d._barAnchorMs||0;
        const beatIdx=Math.floor((posMs-anchor)/beatMs);
        const barNum=beatIdx>=0?Math.floor(beatIdx/4)+1:Math.floor(beatIdx/4);
        const beatInBar=((beatIdx%4)+4)%4+1;
        d._barBeat=barNum+'.'+beatInBar+'Bars';
      }
    }
  }

  if(d.wgl){
    // Always derive duration from waveform length (150pts/sec) — avoids d.dur=0 race
    const wfDurMs=(wfData.length/150*1000)||1;
    // Upload texture if missing OR if duration stored differs significantly (dur was 0 at init)
    if(!d.wgl._wfTex||Math.abs(d.wgl._wfDurMs-wfDurMs)>500){
      d.wgl.setData(wfData, wfDurMs);
    }
    if(!d.wgl._wfTex){drawZoomOverlay(slot,prog);return;} // no data yet
    const modeMap={'rgb':0,'3band':1,'blue':2};
    const mode=d.type==='hw'?3:(modeMap[cfg.wfColor]??1);
    const cX=cfg.wfCenter==='left'?0.25:0.5;
    d.wgl.draw(pos*d.dur, d.zoomMs||8000, cX, mode);
    drawZoomOverlay(slot,prog);
    return;
  }

  // CPU 2D canvas fallback
  if(!d.wzCtx)return;
  const cv=document.getElementById('wzc'+slot);if(!cv||!cv.width)return;
  const W=cv.width,H=cv.height,ctx=d.wzCtx;
  const dur=d.dur,posMs=pos*dur;
  const pts=wfData.length;
  const wfDur=(pts/150*1000)||1;
  const cX=Math.round(cfg.wfCenter==='left'?W*0.25:W/2);
  const viewMs=d.zoomMs||8000,msPerPx=viewMs/W;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const pxPerMs=pts/wfDur;
  const mid=H/2;
  const hs=new Float32Array(W);
  const _gc=[];
  const step=Math.max(1,W>>8);
  for(let px=0;px<W;px++){
    const ms=posMs+(px-cX)*msPerPx;
    const di=ms*pxPerMs;
    const i0=Math.max(0,Math.min(pts-1,di|0));
    const i1=Math.min(pts-1,i0+1);
    const f=di-i0;
    const p0=wfData[i0],p1=wfData[i1];
    if(!p0){hs[px]=0;continue;}
    hs[px]=((p0.h||0)+(((p1?.h||0)-(p0.h||0))*f))*mid*0.95;
    if(px%step===0||px===W-1){
      const r=p0.r+((p1?.r||0)-p0.r)*f;
      const g=p0.g+((p1?.g||0)-p0.g)*f;
      const b=p0.b+((p1?.b||0)-p0.b)*f;
      let R,G,B;
      if(d.type==='hw'&&!d._pwv7){
        // HW native CDJ colors — display as-is
        const mx2=Math.max(r,g,b,0.001); const sc2=255/mx2;
        R=Math.min(255,r*sc2)|0; G=Math.min(255,g*sc2)|0; B=Math.min(255,b*sc2)|0;
      }else{
        // Virtual or HW PWV7 — use _wfBlend with user color mode
        [R,G,B]=d.type==='hw'?_wfBlend(r,g,b,1):_wfBlend(r,g,b,1);
      }
      _gc.push({t:px/(W-1),c:`rgb(${R},${G},${B})`});
    }
  }
  ctx.beginPath();ctx.moveTo(0,mid-hs[0]);
  for(let px=1;px<W;px++) ctx.lineTo(px,mid-hs[px]);
  for(let px=W-1;px>=0;px--) ctx.lineTo(px,mid+hs[px]);
  ctx.closePath();ctx.save();ctx.clip();
  const grad=ctx.createLinearGradient(0,0,W,0);
  for(const s of _gc) grad.addColorStop(s.t,s.c);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);ctx.restore();
  // beat grid + cues + cursor (2D fallback)
  if(d.bpm>0&&dur>0){
    const viewL=posMs-cX*msPerPx,viewR=posMs+(W-cX)*msPerPx;
    if(d._beatGrid&&d._beatGrid.length>0){
      const bg=d._beatGrid;let lo=0,hi=bg.length-1;
      while(lo<hi){const mid2=(lo+hi)>>1;if(bg[mid2].timeMs<viewL)lo=mid2+1;else hi=mid2;}
      for(let i=Math.max(0,lo-1);i<bg.length;i++){
        const bt=bg[i];if(bt.timeMs>viewR)break;
        const bpx=Math.round((bt.timeMs-posMs)/msPerPx+cX);
        if(bpx<1||bpx>=W-1)continue;
        if(bt.beatInBar===1){
          ctx.fillStyle='rgba(255,0,0,.25)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,32,32,.8)';ctx.fillRect(bpx-1,0,3,5);ctx.fillRect(bpx-1,H-5,3,5);
        }else{
          ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(bpx-1,0,3,3);ctx.fillRect(bpx-1,H-3,3,3);
        }
      }
    }else{
      const beatMs=60000/(d.baseBpm||d.bpm);const anchor=d._barAnchorMs||0;
      const firstB=Math.ceil((posMs-cX*msPerPx-anchor)/beatMs),lastB=Math.floor((posMs+(W-cX)*msPerPx-anchor)/beatMs);
      for(let b=firstB;b<=lastB;b++){
        const bMs=anchor+b*beatMs;const bpx=Math.round((bMs-posMs)/msPerPx+cX);
        if(bpx<1||bpx>=W-1)continue;
        const barNum=((b%4)+4)%4+1;
        if(barNum===1){
          ctx.fillStyle='rgba(255,0,0,.25)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,32,32,.8)';ctx.fillRect(bpx-1,0,3,5);ctx.fillRect(bpx-1,H-5,3,5);
        }else{
          ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(bpx-1,0,3,3);ctx.fillRect(bpx-1,H-3,3,3);
        }
      }
    }
  }
  const _cueColorsZ={0:'#ff1744',1:'#ff9100',2:'#ffd600',3:'#00e676',4:'#00b0ff',5:'#d500f9',6:'#ff4081',7:'#e0e0e0'};
  if(d.cuePoints&&dur>0){
    ctx.font='bold 8px "DM Mono",monospace';
    for(const cue of d.cuePoints){
      const cpx=Math.round((cue.timeMs-posMs)/msPerPx+cX);if(cpx<0||cpx>=W)continue;
      const col=cue.type==='hot'?(_cueColorsZ[cue.colorId]||'#00e676'):'#fff';
      ctx.fillStyle=col+'99';ctx.fillRect(cpx-.5,0,1,H);
      ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cpx-3,0);ctx.lineTo(cpx+3,0);ctx.lineTo(cpx,5);ctx.closePath();ctx.fill();
    }
  }
  if(d.cp>0&&dur>0){const cpx=Math.round((d.cp*1000-posMs)/msPerPx+cX);if(cpx>=0&&cpx<W){ctx.fillStyle='rgba(251,191,36,.9)';ctx.fillRect(cpx-.5,0,1,H);}}
  const phGrd=ctx.createLinearGradient(cX-8,0,cX+8,0);
  phGrd.addColorStop(0,'rgba(255,255,255,0)');phGrd.addColorStop(.5,'rgba(255,255,255,.18)');phGrd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=phGrd;ctx.fillRect(cX-8,0,16,H);
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillRect(cX-.5,0,1,H);
  // BAR.BEAT counter — left of playhead, Rekordbox cyan
  if(d._barBeat){
    ctx.font='bold 10px "DM Mono",monospace';
    const bw=ctx.measureText(d._barBeat).width;
    const bx=cX-bw-8;
    if(bx>=2){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(bx-2,2,bw+4,14);ctx.fillStyle='#00BFFF';ctx.fillText(d._barBeat,bx,13);}
    else{ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(2,2,bw+4,14);ctx.fillStyle='#00BFFF';ctx.fillText(d._barBeat,4,13);}
  }
}

// Zoom overlay — beat grid, cue points, position cursor (transparent 2D canvas on top of WebGL)
function drawZoomOverlay(slot, prog){
  const d=DECKS[slot];if(!d||!d.wovCtx2)return;
  const wzov=document.getElementById('wzov'+slot);if(!wzov||!wzov.width)return;
  const W=wzov.width,H=wzov.height,ctx=d.wovCtx2;
  const pos=Math.max(0,Math.min(1,prog||0));
  const dur=d.dur,posMs=pos*dur;
  const wfData=d?.rgbWfDetail||d?.rgbWf;
  const wfDur=((wfData?.length||0)/150*1000)||1;
  const cX=Math.round(cfg.wfCenter==='left'?W*0.25:W/2);
  const viewMs=d.zoomMs||8000,msPerPx=viewMs/W;

  ctx.clearRect(0,0,W,H);

  // Beat grid
  if(d.bpm>0&&dur>0){
    const viewL=posMs-cX*msPerPx,viewR=posMs+(W-cX)*msPerPx;
    if(d._beatGrid&&d._beatGrid.length>0){
      const bg=d._beatGrid;
      let lo=0,hi=bg.length-1;
      while(lo<hi){const mid2=(lo+hi)>>1;if(bg[mid2].timeMs<viewL)lo=mid2+1;else hi=mid2;}
      for(let i=Math.max(0,lo-1);i<bg.length;i++){
        const bt=bg[i];if(bt.timeMs>viewR)break;
        const bpx=Math.round((bt.timeMs-posMs)/msPerPx+cX);
        if(bpx<1||bpx>=W-1)continue;
        if(bt.beatInBar===1){
          // CDJ-3000 style: red downbeat line
          ctx.fillStyle='rgba(255,0,0,.25)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,32,32,.8)';ctx.fillRect(bpx-1,0,3,5);ctx.fillRect(bpx-1,H-5,3,5);
        }else{
          ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(bpx-1,0,3,3);ctx.fillRect(bpx-1,H-3,3,3);
        }
      }
    }else if(d.bpm>0){
      const beatMs=60000/(d.baseBpm||d.bpm);
      const anchor=d._barAnchorMs||0;
      const firstB=Math.ceil((posMs-cX*msPerPx-anchor)/beatMs);
      const lastB=Math.floor((posMs+(W-cX)*msPerPx-anchor)/beatMs);
      for(let b=firstB;b<=lastB;b++){
        const bMs=anchor+b*beatMs;
        const bpx=Math.round((bMs-posMs)/msPerPx+cX);
        if(bpx<1||bpx>=W-1)continue;
        const barNum=((b%4)+4)%4+1;
        if(barNum===1){
          ctx.fillStyle='rgba(255,0,0,.25)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,32,32,.8)';ctx.fillRect(bpx-1,0,3,5);ctx.fillRect(bpx-1,H-5,3,5);
        }else{
          ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bpx-.5,0,1,H);
          ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(bpx-1,0,3,3);ctx.fillRect(bpx-1,H-3,3,3);
        }
      }
    }
  }

  // Cue points (PCO2 RGB colors + loop overlay)
  const _cueColorsZ={0:'#ff1744',1:'#ff9100',2:'#ffd600',3:'#00e676',4:'#00b0ff',5:'#d500f9',6:'#ff4081',7:'#e0e0e0'};
  function _cueCol(cue){
    // Use PCO2 RGB if available (non-zero), else fall back to colorId palette
    if(cue.colorR||cue.colorG||cue.colorB){
      return`rgb(${cue.colorR},${cue.colorG},${cue.colorB})`;
    }
    if(cue.type==='hot')return _cueColorsZ[cue.colorId]||'#00e676';
    if(cue.type==='loop')return '#ff8800';
    return '#fff';
  }
  if(d.cuePoints&&dur>0){
    ctx.font='bold 8px "DM Mono",monospace';
    // Check if CDJ is currently looping — find active loop cue
    const isLooping=d._isLooping;
    let activeLoop=null;
    if(isLooping&&d.cuePoints){
      for(const c of d.cuePoints){
        if(c.type==='loop'&&c.loopEndMs>0&&posMs>=c.timeMs-50&&posMs<=c.loopEndMs+50){
          activeLoop=c;break;
        }
      }
    }
    for(const cue of d.cuePoints){
      const cpx=Math.round((cue.timeMs-posMs)/msPerPx+cX);
      const col=_cueCol(cue);
      // Loop body overlay
      if(cue.type==='loop'&&cue.loopEndMs>0){
        const epx=Math.round((cue.loopEndMs-posMs)/msPerPx+cX);
        const isActive=(cue===activeLoop);
        if(epx>Math.max(cpx,0)&&cpx<W){
          const lx=Math.max(0,cpx),rx=Math.min(W,epx);
          if(isActive){
            // Active loop: yellow overlay (Rekordbox style)
            ctx.fillStyle='rgba(255,200,0,.15)';ctx.fillRect(lx,0,rx-lx,H);
            ctx.fillStyle='rgba(255,200,0,.6)';ctx.fillRect(lx,0,1,H);ctx.fillRect(rx-1,0,1,H);
            ctx.fillStyle='rgba(255,200,0,.35)';ctx.fillRect(lx,0,rx-lx,2);ctx.fillRect(lx,H-2,rx-lx,2);
          }else{
            // Inactive loop: subtle overlay
            ctx.fillStyle=col.startsWith('rgb')?col.replace(')',',0.08)').replace('rgb(','rgba('):col+'14';
            ctx.fillRect(lx,0,rx-lx,H);
          }
        }
      }
      if(cpx<-10||cpx>=W+10)continue;
      // Vertical line
      ctx.fillStyle=col.startsWith('rgb')?col.replace(')',',0.6)').replace('rgb(','rgba('):col+'99';
      ctx.fillRect(cpx-.5,0,1,H);
      if(cue.type==='hot'){
        // Hot cue: triangle marker + letter label (A-H)
        ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cpx-4,0);ctx.lineTo(cpx+4,0);ctx.lineTo(cpx,5);ctx.closePath();ctx.fill();
        if(cue.hotCueNum>0){
          const lbl=cue.hotCueNum<=26?String.fromCharCode(64+cue.hotCueNum):String(cue.hotCueNum);
          ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(cpx+2,0,10,11);
          ctx.fillStyle=col;ctx.fillText(lbl,cpx+3,9);
        }
      }else if(cue.type==='loop'){
        // Loop cue: bracket marker + 'L' label (or hot cue letter if hot-loop)
        ctx.fillStyle=col;
        ctx.fillRect(cpx-1,0,2,6);ctx.fillRect(cpx-1,0,5,2); // ┌ bracket
        const lbl=cue.hotCueNum>0?String.fromCharCode(64+cue.hotCueNum):'L';
        ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(cpx+2,0,10,11);
        ctx.fillStyle=col;ctx.fillText(lbl,cpx+3,9);
        // End bracket
        if(cue.loopEndMs>0){
          const epx=Math.round((cue.loopEndMs-posMs)/msPerPx+cX);
          if(epx>0&&epx<W){
            ctx.fillStyle=col;
            ctx.fillRect(epx-1,0,2,6);ctx.fillRect(epx-5,0,5,2); // ┐ bracket
          }
        }
      }else{
        // Memory cue: diamond marker + 'M' label
        ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cpx,0);ctx.lineTo(cpx+3,3);ctx.lineTo(cpx,6);ctx.lineTo(cpx-3,3);ctx.closePath();ctx.fill();
        ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(cpx+2,0,10,11);
        ctx.fillStyle=col;ctx.fillText('M',cpx+3,9);
      }
    }
  }

  // Main cue point
  if(d.cp>0&&dur>0){
    const cpx=Math.round((d.cp*1000-posMs)/msPerPx+cX);
    if(cpx>=0&&cpx<W){
      ctx.fillStyle='rgba(251,191,36,.9)';ctx.fillRect(cpx-.5,0,1,H);
      ctx.beginPath();ctx.moveTo(cpx-3,0);ctx.lineTo(cpx+3,0);ctx.lineTo(cpx,4);ctx.closePath();ctx.fillStyle='rgba(251,191,36,1)';ctx.fill();
    }
  }

  // Position cursor + glow
  const phGrd=ctx.createLinearGradient(cX-8,0,cX+8,0);
  phGrd.addColorStop(0,'rgba(255,255,255,0)');
  phGrd.addColorStop(.5,'rgba(255,255,255,.18)');
  phGrd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=phGrd;ctx.fillRect(cX-8,0,16,H);
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillRect(cX-.5,0,1,H);

  // bar.beat overlay — left of playhead, Rekordbox cyan
  if(d._barBeat){
    ctx.font='bold 10px "DM Mono",monospace';
    const bw=ctx.measureText(d._barBeat).width;
    const bx=cX-bw-8;
    if(bx>=2){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(bx-2,2,bw+4,14);ctx.fillStyle='#00BFFF';ctx.fillText(d._barBeat,bx,13);}
    else{ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(2,2,bw+4,14);ctx.fillStyle='#00BFFF';ctx.fillText(d._barBeat,4,13);}
  }
}

// ════ Deck management ════════════════════════════════
function getUsedSlots(){return Object.keys(DECKS).map(Number).sort((a,b)=>a-b);}
// Virtual mode: slots 0-7 free (HW slots 0-3 reserved if hwMode)
// HW mode: virtual decks cannot be added; slots are CDJ playerNum-1
function nextFreeSlot(){
  const hwReserved=glMode==='hw'?new Set([0,1,2,3]):new Set();
  const u=new Set(getUsedSlots());
  for(let i=0;i<MAX_DECKS;i++)if(!u.has(i)&&!hwReserved.has(i))return i;
  return -1;
}

function switchMode(mode){
  if(glMode===mode)return;
  glMode=mode;
  if(mode==='hw'){
    // Stop & remove all virtual decks
    Object.keys(DECKS).forEach(s=>{
      const d=DECKS[+s];
      if(d.type!=='hw'){
        if(d.au){d.au.pause();try{URL.revokeObjectURL(d.au.src);}catch(_){} d.au=null;}
        if(E&&run){window.bridge.removeLayer(+s);window.bridge.unregisterVirtualDeck(+s);}
        delete DECKS[+s];
      }
    });
    // Enable HW mode on bridge for CDJ slots 0-3
    if(E&&run)for(let i=0;i<4;i++)window.bridge.setHWMode(i,true);
    document.getElementById('modeVt').classList.remove('ac');
    document.getElementById('modeHW').classList.add('ac');
    document.getElementById('modeHint').textContent='CDJ 연결 시 자동 감지됩니다';
  }else{
    // Clear HW decks & disable HW mode
    if(E&&run)for(let i=0;i<4;i++)window.bridge.setHWMode(i,false);
    Object.keys(DECKS).forEach(s=>{
      const d=DECKS[+s];
      if(d.type==='hw')delete DECKS[+s];
    });
    document.getElementById('modeHW').classList.remove('ac');
    document.getElementById('modeVt').classList.add('ac');
    document.getElementById('modeHint').textContent='파일 드래그로 덱 추가';
  }
  renderDecks();
}

function addVirtualDeck(){
  if(glMode==='hw'){alert('HW 모드에서는 버츄얼 덱을 추가할 수 없습니다.');return;}
  const slot=nextFreeSlot();
  if(slot<0){alert('최대 6개');return;}
  DECKS[slot]=createDeck(slot,'virtual');
  if(E&&run) window.bridge.registerVirtualDeck(slot,'CDJ-3000');
  renderDecks();
}

function removeVirtualDeck(slot){
  const d=DECKS[slot];
  if(d?.au){d.au.pause();URL.revokeObjectURL(d.au.src);}
  delete DECKS[slot];
  if(E&&run){
    window.bridge.removeLayer(slot);
    window.bridge.unregisterVirtualDeck(slot);
  }
  renderDecks();
}

function ensureHWDeck(playerNum){
  if(glMode!=='hw')return; // virtual 모드에선 HW 덱 생성 안 함
  const slot=playerNum-1;
  if(slot<0||slot>3)return;
  if(!DECKS[slot]){DECKS[slot]=createDeck(slot,'hw');if(E&&run)window.bridge.setHWMode(slot,true);renderDecks();}
  else if(DECKS[slot].type!=='hw'){DECKS[slot]=createDeck(slot,'hw');if(E&&run)window.bridge.setHWMode(slot,true);renderDecks();}
}

// ════ Deck rendering ═════════════════════════════════
function renderDecks(){
  const slots=getUsedSlots();
  const hwS=slots.filter(s=>DECKS[s].type==='hw');
  const vtS=slots.filter(s=>DECKS[s].type==='virtual');
  const totalDecks=slots.length;
  const isCompact=totalDecks>=4; // compact layout when 4+ decks (2 rows × 3 cols)

  const hwSec=document.getElementById('hwSection');
  const hwRow=document.getElementById('hwRow');
  // HW 모드: hw 섹션만 표시, virtual 섹션 숨김
  // Virtual 모드: virtual 섹션만 표시, hw 섹션 숨김
  const isHWMode=glMode==='hw';
  if(isHWMode&&hwS.length){
    hwSec.style.display='';
    hwRow.className='deck-row'+(isCompact?' compact':'');
    // Destroy GL contexts before DOM rebuild to avoid WebGL context limit (16)
    hwS.forEach(s=>{const d=DECKS[s];if(d?.wgl){try{d.wgl.destroy();}catch(_){}d.wgl=null;}if(d?.ovgl){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}});
    hwRow.innerHTML=hwS.map(s=>deckHTML(s)).join('');hwS.forEach(bindDeck);
  }else{hwSec.style.display='none';hwRow.innerHTML='';}

  const vtSec=document.getElementById('vtSection');
  const vtRow=document.getElementById('vtRow');
  if(!isHWMode){
    vtSec.style.display='';
    vtRow.className='deck-row'+(isCompact?' compact':'');
    // Destroy GL contexts before DOM rebuild to avoid WebGL context limit (16)
    vtS.forEach(s=>{const d=DECKS[s];if(d?.wgl){try{d.wgl.destroy();}catch(_){}d.wgl=null;}if(d?.ovgl){try{d.ovgl.destroy();}catch(_){}d.ovgl=null;}});
    vtRow.innerHTML=vtS.map(s=>deckHTML(s)).join('');
    vtS.forEach(bindDeck);
  }else{
    vtSec.style.display='none';
    vtRow.innerHTML='';
  }
  // Restore expanded state after DOM rebuild
  if(_expandedSlot!=null){
    const exEl=document.getElementById('dk'+_expandedSlot);
    if(exEl)exEl.classList.add('dk-wide');
  }

  document.getElementById('addDeckBtn').style.display=(!isHWMode&&slots.length<MAX_DECKS)?'':'none';
  document.getElementById('vtLabel').textContent=vtS.length?'VIRTUAL DECKS':'VIRTUAL DECKS — 덱 추가 버튼을 눌러 추가하세요';

  // DJM 연결 상태를 mode-bar에 표시
  const djmDevs=pdjlDevices.filter(d=>d.type==='DJM');
  const djmHint=document.getElementById('djmHint');
  if(djmHint){
    if(djmDevs.length){djmHint.style.display='';djmHint.textContent='♪ '+djmDevs.map(d=>d.name).join(', ')+' CONNECTED';}
    else djmHint.style.display='none';
  }

  // HW device list hidden in pure virtual mode
  const hwSecLabel=document.getElementById('hwSection');
  if(hwS.length===0&&hwSecLabel)hwSecLabel.style.display='none';
  renderOutLayers();
  updateHeader();
}

  // VU strip — Virtual: L/R 스테레오, HW: VU(DJM 미터) + Fader 별도

      <div class="ddz" data-a="open" data-i="${slot}"><div class="ddzi">+</div><div style="font:400 11px var(--sn);color:var(--tx3)">드래그 또는 클릭하여 열기</div><div style="font:400 9px var(--mn);color:var(--tx4)">MP3 · WAV · FLAC · AIFF · AAC · OGG · M4A</div></div>
    </div>`;
  }

  const artSrc=d.ld?(d.art||d.artUrl||''):'';
  const isLoaded=d.ld;
  const tcStr=isLoaded?'00:00:00:00':'--:--:--:--';
  const tcDim=isLoaded?'':'style="color:var(--tx4)"';

  /* HEADER — HW와 Virtual 완전 동일 디자인 */

  <div class="dk-title-row">

    <span class="dk-title-sep" id="dtsep${slot}" ${(isLoaded&&d.ar)?'':'style="display:none"'}>—</span>

  /* SECTION 1: waveform panel + VU strip (right side, full height) */

      <div class="dk-wf-col">
        <div class="dwov" id="dwov${slot}" style="${isLoaded?'':'display:flex;align-items:center;justify-content:center'}">

        </div>

  /* SECTION 2: timecode — H/M/S/FRAMES + large TC + key/bpm/phasor row + time */
  const sec2=`<div class="dk-tc">
    <div class="dk-tc-hdrs"><span class="h-h">H</span><span class="h-sep"></span><span class="h-m">M</span><span class="h-sep"></span><span class="h-s">S</span><span class="h-sep"></span><span class="h-f">FRAMES</span></div>
    <span class="dtc" id="dtc${slot}" ${tcDim}>${tcStr}</span>

  /* SECTION 3: transport — CUE|PLAY top + STOP bottom */
  const cueAc=isLoaded?`data-a="cue" data-i="${slot}"`:' disabled';
  const playAc=isLoaded?`data-a="play" data-i="${slot}"`:' disabled';
  const stopAc=isLoaded?`data-a="stop" data-i="${slot}"`:' disabled';
  const sec3=`<div class="dk-transport">

      <button class="dkbtn dkplay" ${playAc}>${isLoaded&&d.pl?'⏸':'▶'}</button>
    </div>
    <button class="dkbtn dkstop" ${stopAc}>⏮</button>
  </div>`;
  /* SECTION 4: SMPTE layer — MASTER small + A/B large */

  /* SECTION 4: layer/SMPTE + expand/close + STOP */
  const aAc=isLoaded?`data-a="layer" data-i="${slot}" data-lyr="A"`:' disabled';
  const bAc=isLoaded?`data-a="layer" data-i="${slot}" data-lyr="B"`:' disabled';
  const sec4=`<div class="dk-layer">
    <div class="dk-layer-lbl">SMPTE</div>
    <span class="dksm-btn dksm-master${d.mtcMaster?' on':''}" id="dmst${slot}" style="width:100%;text-align:center;min-width:0" data-a="mtc-master" data-i="${slot}">MASTER</span>

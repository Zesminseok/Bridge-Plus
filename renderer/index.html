<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>Bridge Clone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c10;--bg2:rgba(255,255,255,.03);--bg3:rgba(255,255,255,.05);--bg4:rgba(255,255,255,.08);
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.15);
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#475569;--tx4:#2d3748;
  --grn:#34d399;--blu:#60a5fa;--ylw:#fbbf24;--red:#f87171;--pur:#a78bfa;--org:#fb923c;
  --mn:'DM Mono',monospace;--sn:'DM Sans',-apple-system,sans-serif
}
body{background:var(--bg);color:var(--tx);font-family:var(--sn);-webkit-app-region:drag;user-select:none;overflow:hidden}
button,select,input,canvas{-webkit-app-region:no-drag;font-family:var(--sn)}
.hdr{height:46px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.35);flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.li{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font:700 10px var(--mn);color:var(--grn)}
.tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.2);flex-shrink:0}
.tab{padding:8px 14px;font:600 11px var(--sn);letter-spacing:.07em;cursor:pointer;border:none;background:0;color:var(--tx3);position:relative;transition:color .15s}
.tab:hover{color:var(--tx2)}.tab.on{color:var(--tx)}
.tab.on::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:var(--grn);border-radius:2px 2px 0 0}
.pg{padding:14px 18px 70px;overflow-y:auto;height:calc(100vh - 84px);scroll-behavior:smooth;-webkit-overflow-scrolling:touch;-webkit-app-region:no-drag}
.pg::-webkit-scrollbar{width:5px}.pg::-webkit-scrollbar-track{background:transparent}.pg::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}.pg::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
.hide{display:none!important}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:7px 11px}
.scl{font:500 10px var(--sn);color:var(--tx3);letter-spacing:.06em;margin-bottom:2px}
.bd{padding:2px 6px;border-radius:3px;font:600 11px var(--mn);display:inline-block}
.bg{background:rgba(52,211,153,.12);color:var(--grn)}.br{background:rgba(248,113,113,.1);color:var(--red)}
.bb{background:rgba(96,165,250,.1);color:var(--blu)}.by{background:rgba(251,191,36,.1);color:var(--ylw)}
.bm{background:var(--bg4);color:var(--tx2)}.bp{background:rgba(167,139,250,.1);color:var(--pur)}
.al{padding:9px 13px;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;gap:9px}
.als{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15)}
.alw{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15)}
.aler{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15)}
.fstrip{display:flex;gap:5px;padding:6px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;margin-bottom:8px;align-items:flex-end}
.fch{flex:1;text-align:center}
.fchl{font:600 9px var(--sn);color:var(--tx3);letter-spacing:.05em;margin-bottom:3px}
.fbar{height:32px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;display:flex;align-items:flex-end}
.fbarf{width:100%;border-radius:3px;transition:height .08s}
.fval{font:600 10px var(--mn);color:var(--tx2);margin-top:2px;font-variant-numeric:tabular-nums}
.fair{font:700 8px var(--mn);color:var(--red);text-align:center;margin-top:2px;letter-spacing:.04em;animation:pulse-air 1s ease-in-out infinite}
@keyframes pulse-air{0%,100%{opacity:1}50%{opacity:.4}}
.fsep{width:1px;background:var(--bdr);height:50px;align-self:center;margin:0 2px}
.sl{font:500 11px var(--sn);color:var(--tx3);letter-spacing:.06em;margin:0 0 7px}.sl.mt{margin-top:14px}
.deck-area{display:flex;flex-direction:column;gap:8px}
.deck-row{display:grid;gap:8px;grid-template-columns:repeat(2,1fr)}
.deck-row.compact{gap:5px;grid-template-columns:repeat(3,1fr)}
.deck-row.compact .dk{font-size:0.95em}
.deck-row.compact .dtop{padding:6px 10px 0}
.deck-row.compact .din{margin-bottom:3px}
.deck-row.compact .dtr{padding:3px 10px}
.deck-row.compact .dwov{height:12px;margin-bottom:1px}
.deck-row.compact .dwz{height:48px;margin-bottom:4px}
.deck-row.compact .ddz{padding:16px 10px;min-height:100px}
.dk{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;transition:border-color .2s;min-width:0}
.dk[data-st="play"]{border-color:rgba(52,211,153,.4)}.dk[data-st="cue"]{border-color:rgba(251,191,36,.45)}.dk[data-st="hw"]{border-color:rgba(167,139,250,.25)}.dk[data-st="hwplay"]{border-color:rgba(52,211,153,.4)}.dk.dov{border-color:rgba(96,165,250,.5)!important}
.dshim{height:2px;opacity:0;transition:opacity .3s;background:linear-gradient(90deg,transparent,var(--grn),transparent)}
.dk[data-st="play"] .dshim,.dk[data-st="hwplay"] .dshim{opacity:1;animation:shimmer 2s ease-in-out infinite}
.dk[data-st="cue"] .dshim{opacity:.6;background:linear-gradient(90deg,transparent,var(--ylw),transparent)}
.dtop{padding:10px 13px 0}
.dhd{display:flex;align-items:center;margin-bottom:5px;gap:4px}
.did{font:400 10px var(--sn);letter-spacing:.05em;transition:color .15s;white-space:nowrap;display:flex;align-items:baseline;gap:2px}
.did-n{font:700 18px var(--mn);letter-spacing:-.02em;line-height:1}
.dbadge{font:600 9px var(--mn);padding:2px 5px;border-radius:3px;letter-spacing:.05em}
.dtc{font:600 14px var(--mn);color:var(--tx4);letter-spacing:-.01em;font-variant-numeric:tabular-nums;transition:color .15s;flex:1;text-align:right;white-space:nowrap}
.dk[data-st="play"] .dtc,.dk[data-st="hwplay"] .dtc,.dk[data-st="cue"] .dtc{color:var(--tx)}
/* Overview: slim full-track waveform bar */
.dwov{height:18px;margin:0 0 2px;background:rgba(0,0,0,.45);border-radius:2px;overflow:hidden;cursor:pointer;position:relative}
.dwov canvas{width:100%;height:100%;display:block}
/* waveform analysis progress bar (shown while buildRGBWaveform runs) */
.dwov-prog{position:absolute;bottom:0;left:0;height:2px;width:0;background:rgba(96,165,250,.7);border-radius:1px;pointer-events:none;transition:width .1s linear}
/* Zoom: scrolling RGB waveform + beat grid */
.dwz{height:80px;margin:0 0 4px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;cursor:pointer;display:flex;position:relative}
.dwz canvas{flex:1;height:100%;display:block;min-width:0}
.wf-key{position:absolute;top:3px;right:8px;font:700 13px var(--mn);color:var(--grn);pointer-events:none;z-index:2;background:rgba(0,0,0,.65);padding:1px 5px;border-radius:3px}
.wf-bpm{position:absolute;bottom:3px;right:8px;font:600 11px var(--mn);color:rgba(255,255,255,.7);pointer-events:none;z-index:2;background:rgba(0,0,0,.65);padding:1px 5px;border-radius:3px}
.wf-key:empty,.wf-bpm:empty{display:none}
/* Expanded full-width deck — only widens, no height change */
.dk.dk-wide{grid-column:1/-1}
/* Left control column: album art on top, CUE+PLAY row below */
.dtbody{display:flex;gap:6px;padding:0}
.dkctrl{display:flex;flex-direction:column;align-items:center;gap:4px;width:70px;flex-shrink:0}
.dkctrl-btns{display:flex;gap:4px;width:100%;justify-content:center}
.dkwaves{flex:1;min-width:0}
.dkbtn{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 9px var(--mn);cursor:pointer;border:2px solid;background:transparent;transition:all .14s;letter-spacing:.03em;flex-shrink:0}
.dkbtn:disabled{opacity:.3;cursor:not-allowed}
.dkbtn.dkcue{border-color:rgba(251,191,36,.45);color:var(--ylw)}
.dkbtn.dkcue:hover:not(:disabled){background:rgba(251,191,36,.1)}
.dkbtn.dkcue.ac{background:rgba(251,191,36,.18);border-color:var(--ylw);box-shadow:0 0 8px rgba(251,191,36,.35)}
.dkbtn.dkplay{border-color:rgba(52,211,153,.4);color:var(--grn)}
.dkbtn.dkplay:hover:not(:disabled){background:rgba(52,211,153,.1)}
.dkbtn.dkplay.ac{background:rgba(52,211,153,.15);border-color:var(--grn)}
.deck-row.compact .dkbtn{width:24px;height:24px}
.deck-row.compact .dkctrl{width:56px;gap:3px}
.deck-row.compact .dwov{height:14px;margin-bottom:1px}
.deck-row.compact .dwz{height:52px;margin-bottom:3px}
.dvm{width:5px;flex-shrink:0;background:rgba(0,0,0,.5);border-radius:0 2px 2px 0;position:relative;overflow:hidden}
.dvmf{position:absolute;bottom:0;left:0;right:0;height:0%;border-radius:2px 2px 0 0;transition:height .04s}
/* Beat phasor: 4-segment bar below zoom waveform */
.dphs{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;height:7px;margin:0 0 4px}
.dphs-seg{border-radius:1px;background:rgba(255,255,255,.07);position:relative;overflow:hidden}
.dphs-seg.on{background:rgba(255,255,255,.18)}
.dphs-fill{position:absolute;top:0;left:0;height:100%;border-radius:1px;background:rgba(52,211,153,.7);width:0}
.dphs-seg.on .dphs-fill{background:rgba(52,211,153,.95)}
.deck-row.compact .dphs{height:5px;margin-bottom:3px}
/* Zoom overlay buttons on waveform — left side to avoid VU meter */
.dzoom-btns{position:absolute;top:3px;left:4px;display:flex;flex-direction:column;gap:2px;z-index:2;pointer-events:none}
.dzb{pointer-events:auto;padding:0;width:18px;height:14px;border-radius:2px;font:600 10px var(--mn);cursor:pointer;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.55);color:rgba(255,255,255,.65);transition:all .1s;display:flex;align-items:center;justify-content:center;line-height:1}
.dzb:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.35)}
/* Eject button — separate, full-width */
.dje{padding:5px 13px;border-top:1px solid var(--bg3)}
.djebtn{width:100%;padding:5px 0;border-radius:5px;font:600 9px var(--mn);cursor:pointer;border:1px solid rgba(248,113,113,.2);background:0;color:rgba(248,113,113,.6);transition:all .12s;letter-spacing:.06em}
.djebtn:hover:not(:disabled){background:rgba(248,113,113,.08);color:rgba(248,113,113,.9);border-color:rgba(248,113,113,.4)}.djebtn:active{transform:scale(.98)}
/* Header transport buttons */
.dht{display:flex;align-items:center;gap:2px;flex-shrink:0}
.dhtb{padding:3px 6px;border-radius:4px;font:600 9px var(--mn);cursor:pointer;border:1px solid var(--bdr2);background:0;color:var(--tx2);transition:all .12s;letter-spacing:.04em;white-space:nowrap}
.dhtb:hover:not(:disabled){background:var(--bg4);color:var(--tx)}.dhtb:active:not(:disabled){transform:scale(.97)}.dhtb:disabled{opacity:.3;cursor:not-allowed}
.dhtb.cc{color:var(--ylw);border-color:rgba(251,191,36,.3)}.dhtb.cc:hover:not(:disabled){background:rgba(251,191,36,.08)}.dhtb.cc.ac{background:rgba(251,191,36,.2);border-color:var(--ylw)}
.dhtb.cp{color:var(--grn);border-color:rgba(52,211,153,.3)}.dhtb.cp:hover:not(:disabled){background:rgba(52,211,153,.08)}.dhtb.cp.ac{background:rgba(52,211,153,.15);border-color:var(--grn)}
.dhtb.cdl{color:var(--red);border-color:rgba(239,68,68,.25)}.dhtb.cdl:hover{background:rgba(239,68,68,.08)}
.din{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:7px}
.dil{font:400 9px var(--sn);color:var(--tx3);letter-spacing:.04em}
.div{font:600 11px var(--mn);color:var(--tx4);transition:color .15s;font-variant-numeric:tabular-nums}
.dk[data-st="play"] .div,.dk[data-st="hwplay"] .div,.dk[data-st="cue"] .div{color:var(--tx)}
.dfrow{display:flex;align-items:center;gap:7px;padding:4px 13px;border-top:1px solid var(--bg3)}
.dfbar{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.dfbarf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pur),var(--blu));transition:width .08s}
.dfpct{font:600 9px var(--mn);color:var(--tx3);min-width:28px;text-align:right;font-variant-numeric:tabular-nums}
.dtr{padding:5px 13px;border-top:1px solid var(--bg3);display:flex;align-items:center;gap:8px}
.dart{width:44px;height:44px;border-radius:5px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid var(--bdr)}
.dartp{display:flex;align-items:center;justify-content:center}
.dartp::after{content:'♪';color:var(--tx4);font-size:16px}
.dartej{cursor:pointer;position:relative;transition:opacity .15s}
.dartej:hover{opacity:.7}
.dartej:hover::before{content:'⏏';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;background:rgba(0,0,0,.45);border-radius:4px}
.dtri{min-width:0;flex:1}
.dtn{font:500 11px var(--sn);color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dta{font:400 10px var(--sn);color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Output Layer 카드 */
.out-layers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.olc{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:6px;transition:border-color .2s}
.olc-play{border-color:rgba(52,211,153,.35)}
.olh{display:flex;align-items:center;gap:8px}
.olb{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font:700 11px var(--mn);color:#000;flex-shrink:0}
.oltc{font:600 13px var(--mn);color:var(--tx3);letter-spacing:-.01em;font-variant-numeric:tabular-nums;flex:1;text-align:right}
.olc-play .oltc{color:var(--tx)}
.olsr{display:flex;align-items:center;gap:6px}
.olss{flex:1;min-width:0;font-size:10px}
.olout{display:flex;gap:3px}
.olof{display:flex;align-items:center;gap:5px}
.olofin{width:52px;background:rgba(255,255,255,.06);border:1px solid var(--bdr2);border-radius:4px;padding:2px 5px;color:var(--tx);font:400 10px var(--mn);outline:none;text-align:right}
/* TC 버튼 */
.tcbtn{padding:2px 8px;border-radius:3px;font:600 8px var(--mn);cursor:pointer;border:1px solid var(--bdr2);background:0;color:var(--tx3);transition:all .1s;letter-spacing:.05em}
.tcbtn:hover{color:var(--tx2);background:var(--bg4)}
.tcbtn.ac-ltc{color:var(--ylw);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.12)}
.tcbtn.ac-mtc{color:var(--blu);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.12)}
.tcbtn.ac-art{color:var(--org);border-color:rgba(251,146,60,.4);background:rgba(251,146,60,.12)}
.dhw{padding:4px 13px;border-top:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.dhwl{font:400 10px var(--mn);color:var(--tx3)}
.dhwb{padding:2px 7px;border-radius:3px;font:600 8px var(--mn);cursor:pointer;border:1px solid rgba(167,139,250,.25);background:0;color:var(--pur);transition:all .12s}
.dhwb:hover{background:rgba(167,139,250,.1)}.dhwb.ac{background:rgba(167,139,250,.2);border-color:var(--pur)}
.ddz{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 13px;gap:6px;min-height:140px;color:var(--tx3)}
.ddzi{width:28px;height:28px;border:1.5px dashed var(--tx3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px}
.dk.dov .ddzi{border-color:var(--blu);color:var(--blu)}
.add-deck-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;border:1.5px dashed var(--bdr2);border-radius:9px;cursor:pointer;color:var(--tx3);font:500 11px var(--sn);background:0;transition:all .15s;width:100%}
.add-deck-btn:hover{border-color:var(--grn);color:var(--grn);background:rgba(52,211,153,.05)}
.sgr{background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;padding:2px 13px;margin-bottom:10px}
.srw{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3)}.srw:last-child{border-bottom:none}
.srl{font:400 11px var(--sn);color:var(--tx2)}.srv{font:400 11px var(--mn);color:var(--tx)}
select.ss{background:rgba(255,255,255,.06);border:1px solid var(--bdr2);border-radius:5px;padding:3px 7px;color:var(--tx);font:400 11px var(--mn);outline:none;cursor:pointer;max-width:220px}
.tbl{border:1px solid var(--bdr);border-radius:7px;overflow:hidden;margin-bottom:10px}
.tblh{display:grid;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
.tblr{display:grid;padding:7px 12px;border-bottom:1px solid var(--bg3)}.tblr:last-child{border-bottom:none}
.pgr{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.pgc{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;text-align:center}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;vertical-align:middle}
.dpu{animation:pulse 2s ease-in-out infinite}
.bbar{position:fixed;bottom:0;left:0;right:0;height:38px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,12,16,.97);border-top:1px solid var(--bdr);backdrop-filter:blur(12px);-webkit-app-region:no-drag}
.btn{padding:5px 14px;border-radius:5px;font:500 11px var(--sn);cursor:pointer;border:none;transition:all .12s}.btn:active{transform:scale(.97)}
.btng{background:var(--grn);color:#0a0c10}.btng:hover{background:#4ade80}
.btnr{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.2)}.btnr:hover{background:rgba(248,113,113,.25)}
/* Album art — inside dkctrl column, full width */
.dkart{width:70px;height:70px;border-radius:6px;flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid var(--bdr);cursor:pointer;position:relative;transition:filter .15s}
.dkart:hover{filter:brightness(.6)}
.dkart::after{content:'⏏';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;background:rgba(0,0,0,0);border-radius:5px;transition:opacity .15s,background .15s;pointer-events:none;opacity:0}
.dkart:hover::after{background:rgba(0,0,0,.5);opacity:1}
.dkart img{width:100%;height:100%;object-fit:cover;display:block}
.noart-icon{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--tx4);font-size:18px}
.deck-row.compact .dkart{width:54px;height:54px}
/* Stereo VU — two narrow bars side-by-side */
.dvm-st{display:flex;gap:1px;width:7px;flex-shrink:0;height:100%}
.dvm-st .dvm{flex:1;width:3px;border-radius:0}
.dktn{padding:0 0 3px;display:flex;align-items:baseline;gap:0;min-width:0;overflow:hidden}
.dktn-t{font:600 12px var(--sn);color:#cbd5e1;white-space:nowrap;overflow:hidden;flex:1 1 0;min-width:0;position:relative;text-overflow:ellipsis}
.dktn-t.scrolling .mq-inner{display:inline-block;animation:marquee-scroll var(--scroll-dur,8s) linear infinite}
@keyframes marquee-scroll{0%,10%{transform:translateX(0)}45%,55%{transform:translateX(var(--scroll-dist,-200px))}90%,100%{transform:translateX(0)}}
.dktn-a{font:400 10px var(--sn);color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:2;min-width:0}
.dktn-time{font:500 11px var(--mn);color:var(--tx3);white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.dk[data-st="play"] .dktn-time,.dk[data-st="hwplay"] .dktn-time,.dk[data-st="cue"] .dktn-time{color:var(--tx2)}
.dktn-info{padding:0 0 3px;gap:8px;justify-content:flex-start}
.dbk-hd{font:600 11px var(--mn);color:var(--tx3);letter-spacing:.02em;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}

<script>
// ════════════════════════════════════════════════════
const E=typeof window.bridge!=='undefined';
let run=false,t0=0,up=0,pk=0,curTab='link';
let tcNodes={},pdjlDevices=[],audioDevs=[],allIfaces=[];
let faders=[0,0,0,0],onAirCh=[0,0,0,0],pdjlPort=null;
// 설정 — 인터페이스 포함
let cfg={nm:'BRIDGE29',fps:'30',aoId:'',tcnetIface:'',pdjlIface:'',tcnetMode:'auto',
  tcFps:'25',phasorMode:'scroll',wfColor:'rgb',wfCenter:'center',
  tcLtcA:'',   // Layer A LTC 오디오 장치
  tcLtcB:'',   // Layer B LTC 오디오 장치
  tcLtcM:'',   // Layer M LTC 오디오 장치
  tcMidiOutId:'',
  tcArtnetIp:'255.255.255.255',tcArtnetPort:'6454'};

const MAX_DECKS=8;
const DECKS={};
let glMode='hw'; // 'virtual' | 'hw'

function createDeck(slot,type='virtual'){
  return{slot,type,ld:false,pl:false,cu:false,au:null,tn:'',ar:'',bpm:0,dur:0,pos:0,cp:0,cuw:false,
    wf:null,wfCtx:null,rgbWf:null,wovCtx:null,wzCtx:null,
    key:'',vu:0,vuSrc:null,vuAn:null,vuBuf:null,artUrl:null,hwVu:0,beatInBar:1,
    zoomMs:8000,vuL:0,vuR:0,vuAnL:null,vuAnR:null,vuBufL:null,vuBufR:null};
}

async function getAudioDevs(){try{audioDevs=(await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='audiooutput');}catch(e){audioDevs=[];}}
getAudioDevs();
// Music key → Camelot wheel notation
const _CAMELOT={
  // Major (B column)
  'C':'8B','G':'9B','D':'10B','A':'11B','E':'12B','B':'1B','Cb':'1B',
  'F#':'2B','Gb':'2B','C#':'3B','Db':'3B','G#':'4B','Ab':'4B',
  'D#':'5B','Eb':'5B','A#':'6B','Bb':'6B','F':'7B','E#':'7B',
  // Minor (A column)
  'Am':'8A','Em':'9A','Bm':'10A',
  'F#m':'11A','Gbm':'11A',
  'C#m':'12A','Dbm':'12A',
  'G#m':'1A','Abm':'1A',
  'D#m':'2A','Ebm':'2A',
  'A#m':'3A','Bbm':'3A',
  'Fm':'4A','E#m':'4A',
  'Cm':'5A','Gm':'6A','Dm':'7A',
};
function _toCamelot(k){
  if(!k)return '';
  const t=k.trim();
  // 이미 카멜롯 형식이면 역변환해서 둘 다 표시
  if(/^([1-9]|1[0-2])[AB]$/i.test(t)){
    const cam=t.toUpperCase();
    // Reverse lookup: find original key from camelot
    const orig=Object.entries(_CAMELOT).find(([_,v])=>v===cam);
    return orig ? cam+' / '+orig[0] : cam;
  }
  // 표준 → 카멜롯 변환
  const norm=t.replace(/\s*(minor|maj)\s*/i,(m,p)=>p.toLowerCase()==='minor'?'m':'')
              .replace(/\s+/g,'');
  const cam=_CAMELOT[norm]||_CAMELOT[norm.replace('♭','b').replace('♯','#')]||'';
  return cam ? cam+' / '+t : t;
}



// ════ SMPTE Timecode Engine — Output Layer routing ══════════════════
// Input Layer (decks 1-8) → Output Layer (A/B/M) → LTC / MTC / Art-Net

const TC_FPS_TYPE = {'24':0,'25':1,'29.97':2,'30':3};

// Output Layer 상태
const OUT = {
  A: {src:null, ltc:false, mtc:false, art:false, offset:0, _qf:0},
  B: {src:null, ltc:false, mtc:false, art:false, offset:0, _qf:0},
  M: {src:null, ltc:false, mtc:false, art:false, offset:0, _qf:0},
};
// M의 src는 'A'|'B'|slot(number)|null

// ── LTC (AudioWorklet) — independent instance per output layer ──────
const _ltc = {
  A:{ctx:null,node:null,out:null,ready:false,ch:0},
  B:{ctx:null,node:null,out:null,ready:false,ch:0},
  M:{ctx:null,node:null,out:null,ready:false,ch:0},
};

async function _ltcInit(layer){
  const L=_ltc[layer];
  if(L.ready)return true;
  const devId=cfg[`tcLtc${layer}`]||'';
  try{
    L.ctx=new AudioContext({sampleRate:48000});
    await L.ctx.audioWorklet.addModule('./ltc-processor.js');
    // single channel per layer — each layer routes to its own audio device
    L.node=new AudioWorkletNode(L.ctx,'ltc-processor',{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[1]});
    const dest=L.ctx.createMediaStreamDestination();
    L.node.connect(dest);
    L.out=new Audio();L.out.srcObject=dest.stream;
    if(devId){try{await L.out.setSinkId(devId);}catch(_){}}
    await L.out.play();
    L.ready=true;
    console.log(`[LTC-${layer}] ready device="${devId||'default'}"`);
    return true;
  }catch(e){console.error(`[LTC-${layer}] init failed:`,e);return false;}
}

async function _ltcSetDevice(layer, devId){
  const L=_ltc[layer];
  cfg[`tcLtc${layer}`]=devId;
  if(L.out&&devId){try{await L.out.setSinkId(devId);}catch(_){}}
}

function _ltcSend(layer, ms, playing){
  const L=_ltc[layer];
  if(!L.ready||!L.node)return;
  const fps=parseFloat(cfg.tcFps)||25, ri=Math.round(fps);
  const totalF=Math.floor(ms/1000*fps);
  const ff=totalF%ri, ss=Math.floor(totalF/ri)%60, mm=Math.floor(totalF/ri/60)%60, hh=Math.floor(totalF/ri/3600)%24;
  L.node.port.postMessage({cmd:'setPos',ch:0,fps,hh,mm,ss,ff,running:playing});
}

function _ltcStop(layer){
  const L=_ltc[layer];
  if(!L.node)return;
  L.node.port.postMessage({cmd:'setPos',ch:0,running:false});
  console.log(`[LTC-${layer}] stopped`);
}

// ── MTC (MIDI Timecode) ─────────────────────────────
let _midiAccess=null, _mtcOut=null;
async function _mtcInit(){
  if(_midiAccess)return true;
  try{
    _midiAccess=await navigator.requestMIDIAccess({sysex:false});
    _mtcSelectOutput(cfg.tcMidiOutId);
    return true;
  }catch(e){console.warn('[MTC] MIDI access failed:',e);return false;}
}
function _mtcSelectOutput(id){
  _mtcOut=null;if(!_midiAccess)return;
  if(id)_mtcOut=_midiAccess.outputs.get(id);
  if(!_mtcOut)for(const o of _midiAccess.outputs.values()){_mtcOut=o;break;}
}
function _mtcSend(layer, ms, playing){
  if(!_mtcOut||!playing)return;
  const fps=parseFloat(cfg.tcFps)||25, ri=Math.round(fps);
  const totalF=Math.floor(ms/1000*fps);
  const ff=totalF%ri, ss=Math.floor(totalF/ri)%60, mm=Math.floor(totalF/ri/60)%60, hh=Math.floor(totalF/ri/3600)%24;
  const type=TC_FPS_TYPE[cfg.tcFps]??1;
  const qf=OUT[layer]._qf;
  let d;
  switch(qf%8){
    case 0:d=0x00|(ff&0x0F);break; case 1:d=0x10|((ff>>4)&1);break;
    case 2:d=0x20|(ss&0x0F);break; case 3:d=0x30|((ss>>4)&3);break;
    case 4:d=0x40|(mm&0x0F);break; case 5:d=0x50|((mm>>4)&3);break;
    case 6:d=0x60|(hh&0x0F);break; case 7:d=0x70|((hh>>4)&1)|(type<<1);break;
  }
  try{_mtcOut.send([0xF1,d]);}catch(_){}
  OUT[layer]._qf=(qf+1)&0xFF;
}

// ── Artnet Timecode ──────────────────────────────────
function _artSend(ms, playing){
  if(!E)return;
  const fps=parseFloat(cfg.tcFps)||25, ri=Math.round(fps);
  const totalF=Math.floor(ms/1000*fps);
  const ff=totalF%ri, ss=Math.floor(totalF/ri)%60, mm=Math.floor(totalF/ri/60)%60, hh=Math.floor(totalF/ri/3600)%24;
  const type=TC_FPS_TYPE[cfg.tcFps]??1;
  window.bridge.sendArtnet?.({ip:cfg.tcArtnetIp||'255.255.255.255',port:parseInt(cfg.tcArtnetPort)||6454,ff,ss,mm,hh,type});
}

// ── Get source deck position / playing state for an output layer ────
function _outSrcMs(key){
  const o=OUT[key];
  if(o.src==null)return null;
  if(key==='M'&&(o.src==='A'||o.src==='B'))return _outSrcMs(o.src);
  const d=DECKS[o.src];
  if(!d||!d.ld)return null;
  return Math.round(d.pos)+o.offset;
}
function _outPlaying(key){
  const o=OUT[key];
  if(o.src==null)return false;
  if(key==='M'&&(o.src==='A'||o.src==='B'))return _outPlaying(o.src);
  const d=DECKS[o.src];
  return !!(d&&d.pl);
}

// ── Timecode tick — called every ~33ms from tick() ──────────────────
async function tcTick(){
  for(const [key,o] of Object.entries(OUT)){
    const ms=_outSrcMs(key);
    const playing=_outPlaying(key);
    if(o.ltc){
      if(!_ltc[key].ready)await _ltcInit(key);
      if(ms!=null)_ltcSend(key,ms,playing);
      else _ltcStop(key);
    }
    if(o.mtc){
      if(!_midiAccess)await _mtcInit();
      if(ms!=null)_mtcSend(key,ms,playing);
    }
    // Art-Net: send whenever source has a position (not just when playing)
    if(o.art&&ms!=null)_artSend(ms,playing);
  }
}

// ── Enable / disable an output layer mode ────────────────────────────
function _outSetMode(key,mode,val){
  OUT[key][mode]=val;
  if(!val){
    if(mode==='ltc')_ltcStop(key);
  } else {
    if(mode==='ltc'&&!_ltc[key].ready)_ltcInit(key);
    if(mode==='mtc'&&!_midiAccess)_mtcInit();
  }
  renderOutLayers();
}

// ── Output Layer UI rendering ────────────────────────────────────────
function renderOutLayers(){
  const el=document.getElementById('outLayers');if(!el)return;
  const slots=Object.keys(DECKS).map(Number).sort();
  const mkSrcOpts=(key)=>{
    const cur=OUT[key].src;
    const isM=key==='M';
    let opts=`<option value="" ${cur==null?'selected':''}>—</option>`;
    if(isM){
      opts+=`<option value="A" ${cur==='A'?'selected':''}>Layer A</option>`;
      opts+=`<option value="B" ${cur==='B'?'selected':''}>Layer B</option>`;
    }
    slots.forEach(s=>{
      const d=DECKS[s];const lbl=d.type==='hw'?`CDJ ${s+1}`:`Virtual ${s+1}`;
      opts+=`<option value="${s}" ${cur===s?'selected':''}>${lbl}</option>`;
    });
    return opts;
  };
  const mkOutCard=(key,color)=>{
    const o=OUT[key];
    const ms=_outSrcMs(key);
    const tc=ms!=null?fTC(ms):'--:--:--:--';
    const playing=_outPlaying(key);
    return`<div class="olc ${playing?'olc-play':''}">
      <div class="olh"><span class="olb" style="background:${color}">${key}</span><span class="oltc" id="oltc${key}">${tc}</span></div>
      <div class="olsr">
        <span style="font:400 9px var(--mn);color:var(--tx3)">SOURCE</span>
        <select class="ss olss" data-ol="${key}" style="flex:1;min-width:0">${mkSrcOpts(key)}</select>
      </div>
      <div class="olout">
        <button class="tcbtn${o.ltc?' ac-ltc':''}" data-ol="${key}" data-mode="ltc">LTC</button>
        <button class="tcbtn${o.mtc?' ac-mtc':''}" data-ol="${key}" data-mode="mtc">MTC</button>
        <button class="tcbtn${o.art?' ac-art':''}" data-ol="${key}" data-mode="art">ART</button>
      </div>
      <div class="olof">
        <span style="font:400 9px var(--mn);color:var(--tx3)">OFFSET</span>
        <input type="number" class="olofin" value="${o.offset}" data-ol="${key}" step="10" placeholder="0">
        <span style="font:400 9px var(--mn);color:var(--tx3)">ms</span>
      </div>
    </div>`;
  };
  el.innerHTML=mkOutCard('A','var(--grn)')+mkOutCard('B','var(--blu)')+mkOutCard('M','var(--pur)');
  // event binding
  el.querySelectorAll('.olss').forEach(sel=>{
    sel.onchange=e=>{
      const key=e.target.dataset.ol;
      const v=e.target.value;
      OUT[key].src=v===''?null:/^\d+$/.test(v)?parseInt(v):v;
      renderOutLayers();
    };
  });
  el.querySelectorAll('[data-mode]').forEach(btn=>{
    btn.onclick=e=>{
      const key=btn.dataset.ol, mode=btn.dataset.mode;
      _outSetMode(key,mode,!OUT[key][mode]);
    };
  });
  el.querySelectorAll('.olofin').forEach(inp=>{
    inp.onchange=e=>{OUT[e.target.dataset.ol].offset=parseInt(e.target.value)||0;};
  });
}
// 타임코드 표시 업데이트 (tick에서)
function _updateOutTcDisplay(){
  ['A','B','M'].forEach(k=>{
    const el=document.getElementById('oltc'+k);if(!el)return;
    const ms=_outSrcMs(k);
    el.textContent=ms!=null?fTC(ms):'--:--:--:--';
    const card=el.closest('.olc');
    if(card)card.classList.toggle('olc-play',_outPlaying(k));
  });
}

// Shared AudioContext for VU metering
let _auCtx=null;
function _getAuCtx(){if(!_auCtx||_auCtx.state==='closed')_auCtx=new(window.AudioContext||window.webkitAudioContext)();if(_auCtx.state==='suspended')_auCtx.resume();return _auCtx;}
async function setOut(au,id){if(!au||!id)return;try{if(au.setSinkId)await au.setSinkId(id);}catch(e){}}

// ════ Waveform ════════════════════════════════════════

// 80-bit IEEE 754 extended → JS number (AIFF sampleRate parsing)
function _read80BitFloat(v,off){
  const exp=(v.getUint16(off,false)&0x7FFF)-16383-63;
  const hi=v.getUint32(off+2,false),lo=v.getUint32(off+6,false);
  return(hi*4294967296+lo)*Math.pow(2,exp);
}

// AIFF/AIFC(PCM) → WAV Blob — Chromium does not support AIFF natively
function _aiffToWav(ab){
  const v=new DataView(ab);
  if(v.getUint32(0,false)!==0x464F524D)throw new Error('Not FORM');
  const ft=String.fromCharCode(v.getUint8(8),v.getUint8(9),v.getUint8(10),v.getUint8(11));
  if(ft!=='AIFF'&&ft!=='AIFC')throw new Error('Not AIFF');
  let ch=0,nf=0,ss=0,sr=0,ssndOff=-1,ssndDataOff=0,comp='NONE';
  let pos=12;
  while(pos+8<=ab.byteLength){
    const id=String.fromCharCode(v.getUint8(pos),v.getUint8(pos+1),v.getUint8(pos+2),v.getUint8(pos+3));
    const sz=v.getUint32(pos+4,false);
    if(id==='COMM'){ch=v.getInt16(pos+8,false);nf=v.getUint32(pos+10,false);ss=v.getInt16(pos+14,false);sr=Math.round(_read80BitFloat(v,pos+16));if(ft==='AIFC'&&sz>=22)comp=String.fromCharCode(v.getUint8(pos+26),v.getUint8(pos+27),v.getUint8(pos+28),v.getUint8(pos+29));}
    else if(id==='SSND'){ssndOff=pos+8;ssndDataOff=v.getUint32(pos+8,false);}
    pos+=8+sz+(sz&1);if(sz===0)break;
  }
  if(ssndOff<0||ch===0)throw new Error('Missing COMM/SSND');
  if(comp!=='NONE'&&comp!=='sowt')throw new Error('Compressed AIFC not supported: '+comp);
  const bps=Math.ceil(ss/8),le=(comp==='sowt');
  const dataStart=ssndOff+8+ssndDataOff,numBytes=nf*ch*bps;
  const wav=new ArrayBuffer(44+numBytes),w=new DataView(wav);
  w.setUint32(0,0x52494646,false);w.setUint32(4,36+numBytes,true);w.setUint32(8,0x57415645,false);
  w.setUint32(12,0x666D7420,false);w.setUint32(16,16,true);w.setUint16(20,1,true);
  w.setUint16(22,ch,true);w.setUint32(24,sr,true);w.setUint32(28,sr*ch*bps,true);w.setUint16(32,ch*bps,true);w.setUint16(34,ss,true);
  w.setUint32(36,0x64617461,false);w.setUint32(40,numBytes,true);
  const src=new Uint8Array(ab,dataStart,Math.min(numBytes,ab.byteLength-dataStart)),dst=new Uint8Array(wav,44);
  if(le||ss<=8){dst.set(src);}
  else if(ss===16){for(let i=0;i+1<src.length;i+=2){dst[i]=src[i+1];dst[i+1]=src[i];}}
  else if(ss===24){for(let i=0;i+2<src.length;i+=3){dst[i]=src[i+2];dst[i+1]=src[i+1];dst[i+2]=src[i];}}
  else if(ss===32){for(let i=0;i+3<src.length;i+=4){dst[i]=src[i+3];dst[i+1]=src[i+2];dst[i+2]=src[i+1];dst[i+3]=src[i];}}
  return new Blob([wav],{type:'audio/wav'});
}

// Scan AIFF chunks for an ID3 tag (may appear after large SSND chunk)
async function _findAIFFId3(file){
  const hdr=new DataView(await file.slice(0,12).arrayBuffer());
  if(hdr.getUint32(0,false)!==0x464F524D)return -1;
  const ft=String.fromCharCode(hdr.getUint8(8),hdr.getUint8(9),hdr.getUint8(10),hdr.getUint8(11));
  if(ft!=='AIFF'&&ft!=='AIFC')return -1;
  let pos=12;
  while(pos+8<=file.size){
    const h=new DataView(await file.slice(pos,pos+8).arrayBuffer());
    const id=String.fromCharCode(h.getUint8(0),h.getUint8(1),h.getUint8(2),h.getUint8(3));
    const sz=h.getUint32(4,false);
    if(!id.trim()||sz>file.size)break;
    if(id==='ID3 '||id==='id3 ')return pos+8;
    pos+=8+sz+(sz&1);if(sz===0)break;
  }
  return -1;
}

// onChunk(doneCount, partialWf) called every 400 pts for progressive display
async function buildRGBWaveform(blob, onChunk){
  try{
    const _ac=new(window.AudioContext||window.webkitAudioContext)();
    const ab=await blob.arrayBuffer();
    const buf=await _ac.decodeAudioData(ab);
    _ac.close();
    const ch=buf.getChannelData(0),sr=buf.sampleRate;
    // CDJ uses ~150 entries/sec; cap at 15000 for performance
    const pts=Math.min(15000,Math.max(6000,Math.floor(buf.duration*150)));
    const step=Math.max(1,Math.floor(ch.length/pts));
    // Band splits: 200Hz (bass/mid), 3000Hz (mid/treble) — confirmed Serato~200/1500, Pioneer~200/3000
    const aL=Math.min(1,2*Math.PI*200/sr),aM=Math.min(1,2*Math.PI*3000/sr);
    // Pink-noise bandwidth correction: geometric-center freq per band
    // bass: 20-200Hz (√20*200≈63Hz), mid: 200-3000Hz (√200*3000≈775Hz), hi: 3000-20000Hz (√3000*20000≈7746Hz)
    // Correct = √(refF/centerF), ref=bass; treble gets less raw energy so boosted heavily
    const gBass=5.5,gMid=6,gHi=22; // empirical + bandwidth-normalized
    const wf=new Array(pts);
    const CHUNK=Math.max(200,Math.floor(pts/30)); // ~30 progress updates total
    // carry IIR filter state across all columns for continuity
    let lp1=0,lp2=0;
    for(let i=0;i<pts;i++){
      const s0=i*step;let el=0,em=0,eh=0,pk=0,mn=0,mx=0;
      for(let j=0;j<step;j++){
        const s=ch[s0+j]||0;
        lp1+=aL*(s-lp1);lp2+=aM*(s-lp2);
        const bass=lp1,mid2=lp2-lp1,tre=s-lp2;
        el+=bass*bass;em+=mid2*mid2;eh+=tre*tre;
        const a=Math.abs(s);if(a>pk)pk=a;
        if(s<mn)mn=s;if(s>mx)mx=s;
      }
      const inv=1/step;
      wf[i]={h:pk,mn,mx,r:Math.min(1,Math.sqrt(el*inv)*gBass),g:Math.min(1,Math.sqrt(em*inv)*gMid),b:Math.min(1,Math.sqrt(eh*inv)*gHi)};
      if(onChunk&&(i+1)%CHUNK===0){
        onChunk(i+1,wf);
        await new Promise(r=>setTimeout(r,0)); // yield to UI
      }
    }
    return wf;
  }catch(e){console.warn('[rgbWf]',e);return null;}
}

// CDJ-3000 color waveform: nibble → RGB
// Rekordbox color encoding from CDJ extended status packets
function _cdjColorToRGB(c){
  const map=[
    [0,0,0],[1,.12,.12],[1,.5,.05],[1,.95,.05],[.1,1,.1],[.1,1,1],
    [.15,.35,1],[.65,.1,1],[.55,.55,.55],[.85,.05,.05],[.95,.5,.05],[.85,.85,.05],
    [.05,.65,.05],[.05,.65,.65],[.3,.05,1],[.75,.05,.75]
  ];
  return map[c&0xF]||[0,0,0];
}

// Waveform color: 3 presets — 'blue', 'rgb', '3band'
// Source: Rekordbox ANLZ PWV4/PWV5/PWV6 + Deep-Symmetry/dysentery #9/#33
function _wfBlend(r,g,b2,dimF){
  const mode=cfg.wfColor||'rgb';
  if(mode==='blue'){
    // Rekordbox BLUE: #0055B0 (deep) → #AADDFF (bright), hue shifts blue→cyan-white with treble
    const e=Math.min(1,Math.sqrt(r*r+g*g+b2*b2));
    const w=b2/(r+g+b2||1); // whiteness = treble share (0-1)
    const br=Math.pow(e,0.55);
    const R=Math.round((br*0  +w*170)*dimF);
    const G=Math.round((br*85 +w*135)*dimF);
    const B=Math.round((br*176+w*79 )*dimF);
    return[Math.min(255,R),Math.min(255,G),Math.min(255,B)];
  }
  if(mode==='3band'){
    // 3BAND stacked: bass=#0055E1(blue), mid=#FFA600(amber), treble=#FFFFFF(white)
    // Return per-band data for stacked rendering in draw functions
    // For non-stacked contexts, blend with dominance
    const tot=r+g+b2||0.001;
    const rn=r/tot,gn=g/tot,bn=b2/tot;
    // Bass=#0055E1, Mid=#FFA600, Treble=#FFFFFF — weighted blend
    const R=Math.min(255,Math.round((rn*0x00+gn*0xFF+bn*0xFF)*dimF));
    const G=Math.min(255,Math.round((rn*0x55+gn*0xA6+bn*0xFF)*dimF));
    const B=Math.min(255,Math.round((rn*0xE1+gn*0x00+bn*0xFF)*dimF));
    return[R,G,B];
  }
  // RGB (default): Rekordbox RGB — vivid additive #FF0000/#00FF00/#0000FF
  // Softer contrast curve for brighter, more Rekordbox-like colors
  const mx=Math.max(r,g,b2)||0.001;
  const C=1.5;
  const R=Math.min(255,Math.pow(r/mx,C)*r*255);
  const G=Math.min(255,Math.pow(g/mx,C)*g*255);
  const B=Math.min(255,Math.pow(b2/mx,C)*b2*255);
  return[Math.round(R*dimF),Math.round(G*dimF),Math.round(B*dimF)];
}
// 3BAND stacked rendering helper: returns [{color,h},...] from bottom to top
function _wf3BandStack(r,g,b2,totalH,dimF){
  const bH=Math.round(r*totalH),mH=Math.round(g*totalH),tH=Math.round(b2*totalH);
  return[
    {R:Math.round(0x00*dimF),G:Math.round(0x55*dimF),B:Math.round(0xE1*dimF),h:bH},   // bass=blue
    {R:Math.round(0xFF*dimF),G:Math.round(0xA6*dimF),B:Math.round(0x00*dimF),h:mH},   // mid=amber
    {R:Math.round(0xFF*dimF),G:Math.round(0xFF*dimF),B:Math.round(0xFF*dimF),h:tH},   // treble=white
  ];
}

function drawOverview(slot,prog){
  const d=DECKS[slot];if(!d||!d.wovCtx)return;
  // Use preview waveform for overview, fallback to detail
  if(!d.rgbWf&&d.rgbWfDetail) d.rgbWf=d.rgbWfDetail;
  if(!d.rgbWf)return;
  const cv=document.getElementById('wov'+slot);if(!cv||!cv.width)return;
  const W=cv.width,H=cv.height,ctx=d.wovCtx;
  const pos=Math.max(0,Math.min(1,prog||0));
  const pts=d.rgbWf.length,mid=H/2;
  const img=ctx.createImageData(W,H);const px4=img.data;
  for(let px=0;px<W;px++){
    const i0=Math.floor(px*pts/W),i1=Math.min(pts-1,Math.floor((px+1)*pts/W));
    let r=0,g=0,b=0,mxMax=0;const cnt=Math.max(1,i1-i0+1);
    for(let i=i0;i<=i1;i++){const p=d.rgbWf[i];r+=p.r;g+=p.g;b+=p.b;if(p.mx>mxMax)mxMax=p.mx;}
    r/=cnt;g/=cnt;b/=cnt;
    const past=px/W<pos;
    const dimF=past?1.0:.6;
    const alpha=past?240:160;
    const h=Math.max(1,Math.round(mxMax*mid*.92));
    const y0=Math.max(0,mid-h),y1=Math.min(H-1,mid+h);
    if((cfg.wfColor||'rgb')==='3band'){
      const bands=_wf3BandStack(r,g,b,y1-y0,dimF);
      let cy=y1;
      for(const band of bands){
        const by0=Math.max(y0,cy-band.h);
        for(let y=by0;y<cy;y++){const idx=(y*W+px)*4;px4[idx]=band.R;px4[idx+1]=band.G;px4[idx+2]=band.B;px4[idx+3]=alpha;}
        cy=by0;
      }
    }else{
      const [R,G,B]=_wfBlend(r,g,b,dimF);
      for(let y=y0;y<=y1;y++){
        const idx=(y*W+px)*4;px4[idx]=R;px4[idx+1]=G;px4[idx+2]=B;px4[idx+3]=alpha;
      }
    }
  }
  ctx.putImageData(img,0,0);
  // Draw cue points (memory=white triangle, hot=colored triangle with letter)
  const _cueColors={0:'#ff1744',1:'#ff9100',2:'#ffd600',3:'#00e676',4:'#00b0ff',5:'#d500f9',6:'#ff4081',7:'#e0e0e0'};
  if(d.cuePoints&&d.dur>0){
    for(const cue of d.cuePoints){
      const cx=Math.round(cue.timeMs/d.dur*W);
      if(cx<0||cx>=W)continue;
      const col=cue.type==='hot'?(_cueColors[cue.colorId]||'#00e676'):'rgba(255,255,255,.8)';
      ctx.fillStyle=col;ctx.fillRect(cx-.5,0,1,H);
      ctx.beginPath();ctx.moveTo(cx-3,0);ctx.lineTo(cx+3,0);ctx.lineTo(cx,4);ctx.closePath();
      ctx.fill();
    }
  }
  if(d.cp>0&&d.dur>0){
    const cx=Math.round(d.cp*1000/d.dur*W);
    ctx.fillStyle='rgba(251,191,36,.9)';ctx.fillRect(cx-.5,0,1,H);
    ctx.beginPath();ctx.moveTo(cx-3,0);ctx.lineTo(cx+3,0);ctx.lineTo(cx,4);ctx.closePath();
    ctx.fillStyle='rgba(251,191,36,1)';ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.92)';ctx.fillRect(Math.round(pos*W)-.5,0,1,H);
}

// Continuous oscilloscope zoom waveform — one blended color per column
// Shape: actual waveform min/max (organic flowing look like image #3)
// Color: additive blend of bass(red/pink)+mid(green)+treble(purple)
function drawZoomWaveform(slot,prog){
  const d=DECKS[slot];
  // Use detail waveform if available, fallback to preview
  const isDetail=!!d?.rgbWfDetail;
  const wfData=d?.rgbWfDetail||d?.rgbWf;
  if(!d||!wfData||!d.wzCtx)return;
  const cv=document.getElementById('wzc'+slot);if(!cv||!cv.width)return;
  const W=cv.width,H=cv.height,ctx=d.wzCtx;
  const pos=Math.max(0,Math.min(1,prog||0));
  // Use waveform data's own duration for accurate index mapping
  // Detail waveform: 150 pts/sec; Preview waveform: use deck duration
  const pts=wfData.length,mid=H/2;
  const wfDur=isDetail?(pts/150*1000):d.dur;
  const dur=d.dur,posMs=pos*dur;
  const cX=Math.round(cfg.wfCenter==='left'?W*0.25:W/2);
  const viewMs=d.zoomMs||8000,msPerPx=viewMs/W;
  const img=ctx.createImageData(W,H);const px4=img.data;
  for(let px=0;px<W;px++){
    const pxMs=posMs+(px-cX)*msPerPx;
    if(pxMs<0||pxMs>dur)continue;
    // Map time position to waveform array index using wfDur (not dur)
    const i0=Math.max(0,Math.floor((pxMs-msPerPx*.5)/wfDur*pts));
    const i1=Math.min(pts-1,Math.ceil((pxMs+msPerPx*.5)/wfDur*pts));
    let r=0,g=0,b2=0,mn=0,mx=0;const cnt=Math.max(1,i1-i0+1);
    for(let i=i0;i<=i1;i++){const p=wfData[i];r+=p.r;g+=p.g;b2+=p.b;if(p.mn<mn)mn=p.mn;if(p.mx>mx)mx=p.mx;}
    r/=cnt;g/=cnt;b2/=cnt;
    const past=pxMs<posMs;
    const dimF=past?.55:1.0;
    const alpha=past?200:255;
    const h=Math.max(2,Math.round(mx*mid*0.93));
    const asymShift=Math.round((mx+mn)*0.5*mid*0.3);
    const y0=Math.max(0,Math.min(H-1,mid-h+asymShift));
    const y1=Math.max(0,Math.min(H-1,mid+h+asymShift));
    if((cfg.wfColor||'rgb')==='3band'){
      // 3BAND: vertically stacked bass(blue)/mid(amber)/treble(white)
      const bands=_wf3BandStack(r,g,b2,y1-y0,dimF);
      let cy=y1; // draw from bottom up (bass→mid→treble)
      for(const band of bands){
        const by0=Math.max(y0,cy-band.h);
        for(let y=by0;y<cy;y++){const idx=(y*W+px)*4;px4[idx]=band.R;px4[idx+1]=band.G;px4[idx+2]=band.B;px4[idx+3]=alpha;}
        cy=by0;
      }
    }else{
      const [R,G,B]=_wfBlend(r,g,b2,dimF);
      for(let y=y0;y<=y1;y++){
        const idx=(y*W+px)*4;px4[idx]=R;px4[idx+1]=G;px4[idx+2]=B;px4[idx+3]=alpha;
      }
    }
  }
  ctx.putImageData(img,0,0);
  // Beat grid overlaid — aligned to CDJ's beatInBar
  if(d.bpm>0&&dur>0){
    const beatMs=60000/d.bpm;
    // Align grid phase using CDJ's beatInBar (1-4)
    // Current beat index at posMs
    const curBeatIdx=Math.round(posMs/beatMs);
    // CDJ says we're on beatInBar (1=downbeat). Offset so barNum matches.
    const bib=d.beatInBar||1;
    const phaseOff=((curBeatIdx-(bib-1))%4+4)%4; // how many beats to shift
    const firstBeat=Math.ceil((posMs-cX*msPerPx)/beatMs),lastBeat=Math.floor((posMs+(W-cX)*msPerPx)/beatMs);
    ctx.font='bold 9px "DM Mono",monospace';
    for(let b=firstBeat;b<=lastBeat;b++){
      const bpx=Math.round((b*beatMs-posMs)/msPerPx+cX);
      if(bpx<1||bpx>=W-1)continue;
      const barNum=(((b-phaseOff)%4)+4)%4+1;
      if(barNum===1){
        ctx.fillStyle='rgba(255,140,0,.55)';ctx.fillRect(bpx-.5,0,1,H);
        ctx.fillStyle='rgba(255,165,0,.95)';ctx.fillText('1',bpx+2,H-2);
      }else{
        ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(bpx-.5,H*.25,1,H*.75);
        ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText(barNum,bpx+2,H-2);
      }
    }
  }
  // Cue points from dbserver (memory + hot cues)
  const _cueColorsZ={0:'#ff1744',1:'#ff9100',2:'#ffd600',3:'#00e676',4:'#00b0ff',5:'#d500f9',6:'#ff4081',7:'#e0e0e0'};
  if(d.cuePoints&&dur>0){
    ctx.font='bold 8px "DM Mono",monospace';
    for(const cue of d.cuePoints){
      const cpx=Math.round((cue.timeMs-posMs)/msPerPx+cX);
      if(cpx<0||cpx>=W)continue;
      const col=cue.type==='hot'?(_cueColorsZ[cue.colorId]||'#00e676'):'rgba(255,255,255,.7)';
      ctx.fillStyle=col;ctx.fillRect(cpx-.5,0,1,H);
      ctx.beginPath();ctx.moveTo(cpx-4,H);ctx.lineTo(cpx+4,H);ctx.lineTo(cpx,H-6);ctx.closePath();
      ctx.fill();
      if(cue.type==='hot'&&cue.hotCueNum>0){
        const label=String.fromCharCode(64+cue.hotCueNum); // 1→A, 2→B...
        ctx.fillStyle=col;ctx.fillText(label,cpx+2,H-2);
      }
    }
  }
  // Active cue point: yellow marker
  if(d.cp>0&&dur>0){
    const cpPx=Math.round((d.cp*1000-posMs)/msPerPx+cX);
    if(cpPx>0&&cpPx<W){
      ctx.fillStyle='rgba(251,191,36,.9)';ctx.fillRect(cpPx-.5,0,1,H);
      ctx.beginPath();ctx.moveTo(cpPx-6,0);ctx.lineTo(cpPx+6,0);ctx.lineTo(cpPx,8);ctx.closePath();
      ctx.fillStyle='rgba(251,191,36,1)';ctx.fill();
    }
  }
  // Center playhead
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillRect(cX-.5,0,1,H);
  const grd=ctx.createLinearGradient(cX-8,0,cX+8,0);
  grd.addColorStop(0,'rgba(255,255,255,0)');grd.addColorStop(.5,'rgba(255,255,255,.08)');grd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=grd;ctx.fillRect(cX-8,0,16,H);
  // BAR.BEAT counter — centered on playhead line, top
  if(d.bpm>0&&dur>0){
    ctx.font='bold 11px "DM Mono",monospace';
    const bars=fBars(posMs,d.bpm);
    const bw=ctx.measureText(bars).width;
    const bx=cX-bw/2;
    ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(bx-4,1,bw+8,15);
    ctx.fillStyle='#90d4ff';ctx.fillText(bars,bx,13);
  }
  // KEY + BPM/pitch rendered via HTML overlay (wf-key, wf-bpm spans) — not canvas
}

// ════ Deck management ════════════════════════════════
function getUsedSlots(){return Object.keys(DECKS).map(Number).sort((a,b)=>a-b);}
// Virtual mode: slots 0-7 free (HW slots 0-3 reserved if hwMode)
// HW mode: virtual decks cannot be added; slots are CDJ playerNum-1
function nextFreeSlot(){
  const hwReserved=glMode==='hw'?new Set([0,1,2,3]):new Set();
  const u=new Set(getUsedSlots());
  for(let i=0;i<MAX_DECKS;i++)if(!u.has(i)&&!hwReserved.has(i))return i;
  return -1;
}

function switchMode(mode){
  if(glMode===mode)return;
  glMode=mode;
  if(mode==='hw'){
    // Stop & remove all virtual decks
    Object.keys(DECKS).forEach(s=>{
      const d=DECKS[+s];
      if(d.type!=='hw'){
        if(d.au){d.au.pause();try{URL.revokeObjectURL(d.au.src);}catch(_){} d.au=null;}
        if(E&&run){window.bridge.removeLayer(+s);window.bridge.unregisterVirtualDeck(+s);}
        delete DECKS[+s];
      }
    });
    // Enable HW mode on bridge for CDJ slots 0-3
    if(E&&run)for(let i=0;i<4;i++)window.bridge.setHWMode(i,true);
    document.getElementById('modeVt').classList.remove('ac');
    document.getElementById('modeHW').classList.add('ac');
    document.getElementById('modeHint').textContent='CDJ 연결 시 자동 감지됩니다';
  }else{
    // Clear HW decks & disable HW mode
    if(E&&run)for(let i=0;i<4;i++)window.bridge.setHWMode(i,false);
    Object.keys(DECKS).forEach(s=>{
      const d=DECKS[+s];
      if(d.type==='hw')delete DECKS[+s];
    });
    document.getElementById('modeHW').classList.remove('ac');
    document.getElementById('modeVt').classList.add('ac');
    document.getElementById('modeHint').textContent='파일 드래그로 덱 추가';
  }
  renderDecks();
}

function addVirtualDeck(){
  if(glMode==='hw'){alert('HW 모드에서는 버츄얼 덱을 추가할 수 없습니다.');return;}
  const slot=nextFreeSlot();
  if(slot<0){alert('최대 8개');return;}
  DECKS[slot]=createDeck(slot,'virtual');
  if(E&&run) window.bridge.registerVirtualDeck(slot,'CDJ-3000');
  renderDecks();
}

function removeVirtualDeck(slot){
  const d=DECKS[slot];
  if(d?.au){d.au.pause();URL.revokeObjectURL(d.au.src);}
  delete DECKS[slot];
  if(E&&run){
    window.bridge.removeLayer(slot);
    window.bridge.unregisterVirtualDeck(slot);
  }
  renderDecks();
}

function ensureHWDeck(playerNum){
  if(glMode!=='hw')return; // virtual 모드에선 HW 덱 생성 안 함
  const slot=playerNum-1;
  if(slot<0||slot>3)return;
  if(!DECKS[slot]){DECKS[slot]=createDeck(slot,'hw');if(E&&run)window.bridge.setHWMode(slot,true);renderDecks();}
  else if(DECKS[slot].type!=='hw'){DECKS[slot]=createDeck(slot,'hw');if(E&&run)window.bridge.setHWMode(slot,true);renderDecks();}
}

// ════ Deck rendering ═════════════════════════════════
function renderDecks(){
  const slots=getUsedSlots();
  const hwS=slots.filter(s=>DECKS[s].type==='hw');
  const vtS=slots.filter(s=>DECKS[s].type==='virtual');
  const totalDecks=slots.length;
  const isCompact=totalDecks>=5; // compact layout when 5 or more decks

  const hwSec=document.getElementById('hwSection');
  const hwRow=document.getElementById('hwRow');
  // HW 모드: hw 섹션만 표시, virtual 섹션 숨김
  // Virtual 모드: virtual 섹션만 표시, hw 섹션 숨김
  const isHWMode=glMode==='hw';
  if(isHWMode&&hwS.length){
    hwSec.style.display='';
    hwRow.className='deck-row'+(isCompact?' compact':'');
    hwRow.innerHTML=hwS.map(s=>deckHTML(s)).join('');hwS.forEach(bindDeck);
  }else{hwSec.style.display='none';hwRow.innerHTML='';}

  const vtSec=document.getElementById('vtSection');
  const vtRow=document.getElementById('vtRow');
  if(!isHWMode){
    vtSec.style.display='';
    vtRow.className='deck-row'+(isCompact?' compact':'');
    vtRow.innerHTML=vtS.map(s=>deckHTML(s)).join('');
    vtS.forEach(bindDeck);
  }else{
    vtSec.style.display='none';
    vtRow.innerHTML='';
  }
  // Restore expanded state after DOM rebuild
  if(_expandedSlot!=null){
    const exEl=document.getElementById('dk'+_expandedSlot);
    if(exEl)exEl.classList.add('dk-wide');
  }

  document.getElementById('addDeckBtn').style.display=(!isHWMode&&slots.length<MAX_DECKS)?'':'none';
  document.getElementById('vtLabel').textContent=vtS.length?'VIRTUAL DECKS':'VIRTUAL DECKS — 덱 추가 버튼을 눌러 추가하세요';

  // DJM 연결 상태를 mode-bar에 표시
  const djmDevs=pdjlDevices.filter(d=>d.type==='DJM');
  const djmHint=document.getElementById('djmHint');
  if(djmHint){
    if(djmDevs.length){djmHint.style.display='';djmHint.textContent='♪ '+djmDevs.map(d=>d.name).join(', ')+' CONNECTED';}
    else djmHint.style.display='none';
  }

  // HW device list hidden in pure virtual mode
  const hwSecLabel=document.getElementById('hwSection');
  if(hwS.length===0&&hwSecLabel)hwSecLabel.style.display='none';
  renderOutLayers();
  updateHeader();
}

function bindDeck(slot){
  const el=document.getElementById('dk'+slot);if(!el)return;
  const d=DECKS[slot];
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dov');});
  el.addEventListener('dragleave',()=>el.classList.remove('dov'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('dov');
    const f=e.dataTransfer.files[0];
    if(f&&(f.type.startsWith('audio/')||/\.(mp3|wav|flac|aac|ogg|m4a|aiff)$/i.test(f.name)))loadFile(slot,f);
  });
  // Overview canvas: click → seek
  document.getElementById('dwov'+slot)?.addEventListener('click',e=>{
    const r=e.target.closest('.dwov');if(!r)return;
    const rc=r.getBoundingClientRect();doSeek(slot,Math.max(0,Math.min(1,(e.clientX-rc.left)/rc.width)));
  });
  // Zoom canvas: drag to scrub (scratch feel) — cue point NOT changed
  const wzDiv=document.getElementById('dwz'+slot);
  if(wzDiv){
    let _drag=null;
    wzDiv.addEventListener('pointerdown',e=>{
      if(e.target.closest('.dzb'))return; // allow zoom buttons to handle their own events
      e.preventDefault();
      const d2=DECKS[slot];if(!d2||!d2.ld)return;
      DECKS[slot].scratch=true;
      _drag={startX:e.clientX,startPos:d2.pos};
      wzDiv.setPointerCapture(e.pointerId);
    });
    wzDiv.addEventListener('pointermove',e=>{
      if(!_drag)return;
      const d2=DECKS[slot];if(!d2||d2.type==='hw')return;
      const rc=wzDiv.getBoundingClientRect(),msPerPx=(DECKS[slot]?.zoomMs||8000)/rc.width;
      // Negate: drag right → earlier in track (waveform content follows finger)
      const newMs=Math.max(0,Math.min(d2.dur,_drag.startPos-(e.clientX-_drag.startX)*msPerPx));
      d2.pos=newMs;if(d2.au)d2.au.currentTime=newMs/1000;
    });
    wzDiv.addEventListener('pointerup',()=>{_drag=null;DECKS[slot].scratch=false;});
    wzDiv.addEventListener('pointercancel',()=>{_drag=null;DECKS[slot].scratch=false;});
  }
  // CUE button — pointerdown/up for hold-to-cue behaviour
  const cb=el.querySelector('[data-a="cue"]');
  if(cb&&d.type!=='hw'){
    cb.addEventListener('pointerdown',ev=>{ev.preventDefault();doCueDown(slot);});
    cb.addEventListener('pointerup',ev=>{ev.preventDefault();doCueUp(slot);});
    cb.addEventListener('pointerleave',()=>{if(DECKS[slot]?.cu&&!DECKS[slot]?.pl)doCueUp(slot);});
  }
  // init overview canvas
  const wov=document.getElementById('wov'+slot);
  if(wov){d.wovCtx=wov.getContext('2d');setTimeout(()=>{const p=wov.parentElement;wov.width=p?.offsetWidth||280;wov.height=p?.offsetHeight||18;},0);}
  // init zoom canvas
  const wzc=document.getElementById('wzc'+slot);
  if(wzc){d.wzCtx=wzc.getContext('2d');setTimeout(()=>{const p=wzc.parentElement;wzc.width=p?.offsetWidth||280;wzc.height=p?.offsetHeight||80;},0);}
}

// ID3v2 tag parser — TIT2 (title), TPE1/TPE2 (artist), APIC (album art)
function _id3DecodeText(fdata){
  const enc=fdata[0];let txt='';
  if(enc===0){for(let i=1;i<fdata.length;i++){if(fdata[i]===0)break;txt+=String.fromCharCode(fdata[i]);}}
  else if(enc===1){let s=1,le=true;if(fdata.length>2&&fdata[1]===0xFF&&fdata[2]===0xFE){le=true;s=3;}else if(fdata.length>2&&fdata[1]===0xFE&&fdata[2]===0xFF){le=false;s=3;}for(let i=s;i+1<fdata.length;i+=2){const c=le?(fdata[i]|fdata[i+1]<<8):(fdata[i]<<8|fdata[i+1]);if(c===0)break;txt+=String.fromCharCode(c);}}
  else if(enc===2){for(let i=1;i+1<fdata.length;i+=2){const c=(fdata[i]<<8|fdata[i+1]);if(c===0)break;txt+=String.fromCharCode(c);}}
  else if(enc===3){txt=new TextDecoder('utf-8').decode(fdata.slice(1));const ni=txt.indexOf('\0');if(ni>=0)txt=txt.slice(0,ni);}
  return txt.trim();
}

async function readID3Tags(file){
  const tags={title:'',artist:'',art:null,key:''};
  try{
    const buf=await file.slice(0,Math.min(file.size,524288)).arrayBuffer();
    const view=new DataView(buf);
    let id3Start=0;
    // AIFF: ID3v2 lives inside an 'ID3 ' chunk (may be at end of file)
    if(view.getUint32(0,false)===0x464F524D){ // "FORM"
      const formType=String.fromCharCode(view.getUint8(8),view.getUint8(9),view.getUint8(10),view.getUint8(11));
      if(formType==='AIFF'||formType==='AIFC'){
        // scan all chunks — ID3 tag may appear after the large SSND chunk
        const id3Off=await _findAIFFId3(file);
        if(id3Off<0)return tags;
        const id3Buf=await file.slice(id3Off,id3Off+524288).arrayBuffer();
        const id3V=new DataView(id3Buf);
        if(id3V.getUint8(0)!==0x49||id3V.getUint8(1)!==0x44||id3V.getUint8(2)!==0x33)return tags;
        const id3ver=id3V.getUint8(3);
        const id3sz=(id3V.getUint8(6)&0x7F)<<21|(id3V.getUint8(7)&0x7F)<<14|(id3V.getUint8(8)&0x7F)<<7|(id3V.getUint8(9)&0x7F);
        let ip=10;const ie=Math.min(10+id3sz,id3Buf.byteLength);
        while(ip+10<ie){
          const fid=String.fromCharCode(id3V.getUint8(ip),id3V.getUint8(ip+1),id3V.getUint8(ip+2),id3V.getUint8(ip+3));
          if(fid[0]==='\0')break;
          let fsz=id3ver===4?(id3V.getUint8(ip+4)&0x7F)<<21|(id3V.getUint8(ip+5)&0x7F)<<14|(id3V.getUint8(ip+6)&0x7F)<<7|(id3V.getUint8(ip+7)&0x7F):id3V.getUint32(ip+4,false);
          if(fsz<=0||ip+10+fsz>ie)break;
          const fdata=new Uint8Array(id3Buf,ip+10,fsz);
          if(fid==='TIT2'||fid==='TPE1'||fid==='TPE2'||fid==='TKEY'){const txt=_id3DecodeText(fdata);if(fid==='TIT2'&&txt)tags.title=txt;if(fid==='TPE1'&&txt)tags.artist=txt;if(fid==='TPE2'&&txt&&!tags.artist)tags.artist=txt;if(fid==='TKEY'&&txt)tags.key=txt;}
          if(fid==='APIC'&&!tags.art){try{const enc=fdata[0];let o=1;let mime='';while(o<fdata.length&&fdata[o]!==0){mime+=String.fromCharCode(fdata[o]);o++;}o++;o++;if(enc===0||enc===3){while(o<fdata.length&&fdata[o]!==0)o++;o++;}else{while(o+1<fdata.length){if(fdata[o]===0&&fdata[o+1]===0){o+=2;break;}o+=2;}}if(o<fdata.length){const imgData=fdata.slice(o);if(!mime||mime==='image/')mime=imgData[0]===0x89?'image/png':'image/jpeg';const blob=new Blob([imgData],{type:mime});tags.art=URL.createObjectURL(blob);}}catch(_){}}
          ip+=10+fsz;
        }
        return tags;
      }
    }
    // ID3v2 header check: "ID3"
    if(view.getUint8(id3Start)!==0x49||view.getUint8(id3Start+1)!==0x44||view.getUint8(id3Start+2)!==0x33) return tags;
    const ver=view.getUint8(id3Start+3);
    const sz=(view.getUint8(id3Start+6)&0x7F)<<21|(view.getUint8(id3Start+7)&0x7F)<<14|(view.getUint8(id3Start+8)&0x7F)<<7|(view.getUint8(id3Start+9)&0x7F);
    let pos=id3Start+10;
    const end=Math.min(id3Start+10+sz,buf.byteLength);
    while(pos+10<end){
      const fid=String.fromCharCode(view.getUint8(pos),view.getUint8(pos+1),view.getUint8(pos+2),view.getUint8(pos+3));
      if(fid[0]==='\0') break;
      let fsz;
      if(ver===4) fsz=(view.getUint8(pos+4)&0x7F)<<21|(view.getUint8(pos+5)&0x7F)<<14|(view.getUint8(pos+6)&0x7F)<<7|(view.getUint8(pos+7)&0x7F);
      else fsz=view.getUint32(pos+4);
      if(fsz<=0||pos+10+fsz>end) break;
      const fdata=new Uint8Array(buf,pos+10,fsz);
      if(fid==='TIT2'||fid==='TPE1'||fid==='TPE2'||fid==='TKEY'){
        const txt=_id3DecodeText(fdata);
        if(fid==='TIT2'&&txt) tags.title=txt;
        if(fid==='TPE1'&&txt) tags.artist=txt;
        if(fid==='TPE2'&&txt&&!tags.artist) tags.artist=txt;
        if(fid==='TKEY'&&txt) tags.key=txt;
      }
      // APIC: album art (front cover preferred)
      if(fid==='APIC'&&!tags.art){
        try{
          const enc=fdata[0];let o=1;
          let mime='';while(o<fdata.length&&fdata[o]!==0){mime+=String.fromCharCode(fdata[o]);o++;}o++; // null-terminate
          const picType=fdata[o];o++;
          // skip description string
          if(enc===0||enc===3){while(o<fdata.length&&fdata[o]!==0)o++;o++;}
          else{while(o+1<fdata.length){if(fdata[o]===0&&fdata[o+1]===0){o+=2;break;}o+=2;}}
          if(o<fdata.length){
            const imgData=fdata.slice(o);
            if(!mime||mime==='image/') mime=imgData[0]===0x89?'image/png':'image/jpeg';
            const blob=new Blob([imgData],{type:mime});
            tags.art=URL.createObjectURL(blob);
          }
        }catch(_){}
      }
      pos+=10+fsz;
    }
  }catch(e){console.warn('ID3 parse error:',e);}
  return tags;
}

// BPM analysis — onset-strength autocorrelation, normalized to 80-180 BPM
async function analyzeBPM(blob){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:11025});
    const ab=await blob.arrayBuffer();
    const buf=await ctx.decodeAudioData(ab);
    ctx.close();
    const ch=buf.getChannelData(0),sr=buf.sampleRate;
    const hopMs=10,hopSz=Math.round(sr*hopMs/1000); // 10ms frames
    const maxFrames=Math.min(Math.floor(ch.length/hopSz),3000); // max 30s
    // RMS energy
    const energy=new Float32Array(maxFrames);
    for(let i=0;i<maxFrames;i++){let e=0;const b=i*hopSz;for(let j=0;j<hopSz;j++)e+=ch[b+j]*ch[b+j];energy[i]=Math.sqrt(e/hopSz);}
    // Onset strength: half-wave rectified flux
    const flux=new Float32Array(maxFrames);
    for(let i=1;i<maxFrames;i++)flux[i]=Math.max(0,energy[i]-energy[i-1]);
    // autocorrelation over 250ms–2000ms lags = 30–240 BPM range
    const minLag=Math.round(250/hopMs),maxLag=Math.round(2000/hopMs);
    const nCorr=Math.min(maxFrames,1200); // analyse first 12s
    let bestCorr=-1,bestLag=minLag;
    for(let lag=minLag;lag<=Math.min(maxLag,maxFrames-1);lag++){
      let corr=0;
      for(let i=0;i<nCorr&&i+lag<maxFrames;i++)corr+=flux[i]*flux[i+lag];
      if(corr>bestCorr){bestCorr=corr;bestLag=lag;}
    }
    const bpm=60000/(bestLag*hopMs);
    let r=bpm;while(r>180)r/=2;while(r<80)r*=2;
    return Math.round(r*10)/10;
  }catch(e){console.warn('[BPM]',e);return 0;}
}

function loadFile(slot,f){
  const d=DECKS[slot];if(!d)return;
  if(d.type==='hw'){console.warn('[loadFile] HW 모드 덱에 파일 로드 차단');return;}
  if(d.au){d.au.pause();URL.revokeObjectURL(d.au.src);d.au=null;}
  if(d.artUrl){URL.revokeObjectURL(d.artUrl);d.artUrl=null;}
  d.ld=true;d.pl=false;d.cu=false;d.pos=0;d.cp=0;d.cuw=false;d.wf=null;
  // filename parsing used as fallback only — ID3 tags take priority
  const n=f.name.replace(/\.[^.]+$/,'');
  if(n.includes(' - ')){const p=n.split(' - ');d.ar=p[0].trim();d.tn=p.slice(1).join(' - ').trim();}
  else{d.tn=n;d.ar='';}
  // trackId: 파일명 해시로 고유 ID 생성
  d.trackId=(f.name+f.size).split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0,0)>>>0;
  // async ID3 tag read (MP3, AIFF, WAV)
  if(/\.(mp3|aiff?|wav)$/i.test(f.name)){
    readID3Tags(f).then(tags=>{
      if(tags.title) d.tn=tags.title;
      if(tags.artist) d.ar=tags.artist;
      if(tags.art) d.artUrl=tags.art;
      if(tags.key) d.key=_toCamelot(tags.key);
      console.log(`[ID3] slot=${slot} title="${d.tn}" artist="${d.ar}" key="${d.key}" art=${!!tags.art}`);
      renderDecks();
    });
  }
  // audio init — AIFF files are converted to WAV first (Chromium has no AIFF decoder)
  const _initAudio=(audioBlob)=>{
    if(d.au){d.au.pause();URL.revokeObjectURL(d.au.src);d.au=null;}
    d.au=new Audio();d.au.src=URL.createObjectURL(audioBlob);d.au.preload='auto';
    if(cfg.aoId)setOut(d.au,cfg.aoId);
    d.au.addEventListener('loadedmetadata',()=>{
      d.dur=d.au.duration*1000;d.bpm=0;
      renderDecks();
      setTimeout(()=>{
        const wov=document.getElementById('wov'+slot);if(wov){d.wovCtx=wov.getContext('2d');const p=wov.parentElement;wov.width=p?.offsetWidth||280;wov.height=p?.offsetHeight||16;}
        const wzc=document.getElementById('wzc'+slot);if(wzc){d.wzCtx=wzc.getContext('2d');const p=wzc.parentElement;wzc.width=p?.offsetWidth||280;wzc.height=p?.offsetHeight||72;}
      },0);
      buildRGBWaveform(audioBlob,(done,partial)=>{
        d.rgbWf=partial.slice(0,done);
        d.rgbWfPts=d.rgbWfPts||done*30; // estimate total on first chunk
        const prog2=document.getElementById('dwov-prog'+slot);
        if(prog2)prog2.style.width=(done/(d.rgbWfPts||8000)*100).toFixed(1)+'%';
      }).then(wf=>{
        d.rgbWf=wf;
        const prog2=document.getElementById('dwov-prog'+slot);
        if(prog2)prog2.style.width='0'; // hide when done
        if(wf){drawOverview(slot,0);drawZoomWaveform(slot,0);}
      });
      analyzeBPM(audioBlob).then(bpm=>{
        if(bpm>0){d.bpm=bpm;console.log(`[BPM] slot=${slot} bpm=${bpm}`);}
        else{d.bpm=128;}
        renderDecks();
      });
      if(E&&run){
        window.bridge.updateLayer(slot,{
          state:0,timecodeMs:0,bpm:d.bpm||128,
          trackId:d.trackId||0,totalLength:Math.round(d.dur)||0,
          trackName:d.tn||'',artistName:d.ar||'',beatPhase:0,
        });
      }
    });
    d.au.addEventListener('ended',()=>{d.pl=false;d.pos=0;d.au.currentTime=0;});
    // VU meter: stereo L/R via ChannelSplitter → two AnalyserNodes
    try{
      if(d.vuSrc){try{d.vuSrc.disconnect();}catch(_){}}
      const ac=_getAuCtx();
      const src=ac.createMediaElementSource(d.au);
      const split=ac.createChannelSplitter(2);
      const anL=ac.createAnalyser();anL.fftSize=256;anL.smoothingTimeConstant=0.65;
      const anR=ac.createAnalyser();anR.fftSize=256;anR.smoothingTimeConstant=0.65;
      src.connect(split);
      split.connect(anL,0);split.connect(anR,1);
      // merge back to destination for audio output
      const merge=ac.createChannelMerger(2);
      anL.connect(merge,0,0);anR.connect(merge,0,1);
      merge.connect(ac.destination);
      d.vuSrc=src;d.vuAn=anL;d.vuBuf=new Uint8Array(anL.fftSize);
      d.vuAnL=anL;d.vuAnR=anR;d.vuBufL=new Uint8Array(anL.fftSize);d.vuBufR=new Uint8Array(anR.fftSize);
    }catch(e){console.warn('[VU]',e);}
  };
  if(/\.aiff?$/i.test(f.name)){
    f.arrayBuffer().then(ab=>{
      try{_initAudio(_aiffToWav(ab));console.log('[AIFF] converted to WAV');}
      catch(e){console.error('[AIFF→WAV] failed, using original:',e);_initAudio(f);}
    });
  }else{_initAudio(f);}
}

// ════ Deck actions ═══════════════════════════════════

function doPlay(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  if(d.pl){
    d.au.pause();d.pl=false; // pause: cue point unchanged
  } else {
    d.au.play().catch(()=>{});d.pl=true;d.cu=false;
  }
}

/**
 * CDJ-style CUE behaviour:
 *
 * While playing: pause (cue point unchanged), enter CUE state.
 * While stopped/paused (down): set cue point to current position, pre-cue play.
 * CUE up: return to cue point and stop.
 */
function doCueDown(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  if(d.pl){
    d.au.pause();d.pl=false;d.cu=true;d.cuw=false;
  } else {
    d.cp=d.au.currentTime; // current position becomes new cue point
    d.cuw=false;
    d.au.currentTime=d.cp;
    d.au.play().catch(()=>{});
    d.cu=true;d.pl=false;
  }
}

function doCueUp(slot){
  const d=DECKS[slot];if(!d?.ld||!d.au||d.type==='hw')return;
  d.au.pause();
  d.au.currentTime=d.cp||0;
  d.pl=false;d.cu=true;
}

let _expandedSlot=null;
function doExpandDeck(slot){
  const el=document.getElementById('dk'+slot);if(!el)return;
  const wasExpanded=_expandedSlot===slot;
  // collapse previously expanded deck
  if(_expandedSlot!=null){
    const prev=document.getElementById('dk'+_expandedSlot);
    if(prev)prev.classList.remove('dk-wide');
  }
  _expandedSlot=wasExpanded?null:slot;
  if(!wasExpanded){
    el.classList.add('dk-wide');
    // resize canvases for expanded width
    setTimeout(()=>{
      const wov=document.getElementById('wov'+slot);
      if(wov){const p=wov.parentElement;wov.width=p.offsetWidth||600;wov.height=p.offsetHeight||28;}
      const wzc=document.getElementById('wzc'+slot);
      if(wzc){const p=wzc.parentElement;wzc.width=p.offsetWidth||600;wzc.height=p.offsetHeight||180;}
    },0);
  }else{
    // restore normal canvas sizes
    setTimeout(()=>{
      const wov=document.getElementById('wov'+slot);
      if(wov){const p=wov.parentElement;wov.width=p.offsetWidth||280;wov.height=p.offsetHeight||18;}
      const wzc=document.getElementById('wzc'+slot);
      if(wzc){const p=wzc.parentElement;wzc.width=p.offsetWidth||280;wzc.height=p.offsetHeight||80;}
    },0);
  }
}

function doEject(slot){
  const d=DECKS[slot];if(!d)return;
  if(d.au){d.au.pause();URL.revokeObjectURL(d.au.src);d.au=null;}
  if(d.artUrl){URL.revokeObjectURL(d.artUrl);d.artUrl=null;}
  if(d.vuSrc){try{d.vuSrc.disconnect();}catch(_){}}
  Object.assign(d,{ld:false,pl:false,cu:false,tn:'',ar:'',dur:0,pos:0,bpm:0,cp:0,key:'',wf:null,wfCtx:null,rgbWf:null,wovCtx:null,wzCtx:null,artUrl:null,beatInBar:1,vuSrc:null,vuAn:null,vuBuf:null,vuAnL:null,vuAnR:null,vuBufL:null,vuBufR:null,vuL:0,vuR:0});
  if(E&&run)window.bridge.removeLayer(slot);
  renderDecks();
}

function doSeek(slot,r){
  const d=DECKS[slot];if(!d?.au||!d.dur||d.type==='hw')return;
  const t=(r*d.dur)/1000;d.au.currentTime=t;
  if(!d.pl)d.cp=t; // update cue point when seeking while stopped
}

async function doToggleHW(slot){
  const d=DECKS[slot];if(!d)return;
  const goingHW=d.type!=='hw';

  if(goingHW){
    // Virtual → HW: stop playback, remove layer, then enable HW mode
    if(d.au)d.au.pause();
    d.pl=false;d.cu=false;
    if(E&&run)await window.bridge.updateLayer(slot,{state:0,timecodeMs:0,bpm:0,trackId:0,totalLength:0,beatPhase:0});
    await new Promise(r=>setTimeout(r,66));
    if(E&&run)await window.bridge.removeLayer(slot);
    await new Promise(r=>setTimeout(r,66));
    d.type='hw';
    d.ld=false;d.tn='';d.ar='';d.dur=0;d.pos=0;d.bpm=0;d.cp=0;d.wf=null;
    if(d.au){URL.revokeObjectURL(d.au.src);d.au=null;}
    if(E)window.bridge.setHWMode(slot,true);

  }else{
    // HW → Virtual 전환
    // 1) CDJ 신호 수신 중단
    if(E)window.bridge.setHWMode(slot,false);
    await new Promise(r=>setTimeout(r,66));

    // 2) 레이어 초기화
    if(E&&run)await window.bridge.removeLayer(slot);
    await new Promise(r=>setTimeout(r,66));

    // 3) Virtual 모드 (빈 상태)
    d.type='virtual';
    d.pl=false;d.cu=false;d.ld=false;
    d.tn='';d.ar='';d.dur=0;d.pos=0;d.bpm=0;d.cp=0;d.wf=null;
  }

  renderDecks();
}

document.addEventListener('click',e=>{
  const b=e.target.closest('[data-a]');if(!b)return;
  const act=b.dataset.a,slot=parseInt(b.dataset.i);
  if(act==='play')doPlay(slot);
  else if(act==='eject')doEject(slot);
  else if(act==='hw')doToggleHW(slot);
  else if(act==='remove')removeVirtualDeck(slot);
  else if(act==='expand')doExpandDeck(slot);
  else if(act==='zoom-in'){const d2=DECKS[slot];if(d2)d2.zoomMs=Math.max(2000,(d2.zoomMs||8000)/2);}
  else if(act==='zoom-out'){const d2=DECKS[slot];if(d2)d2.zoomMs=Math.min(32000,(d2.zoomMs||8000)*2);}
  else if(act==='zoom-rst'){const d2=DECKS[slot];if(d2)d2.zoomMs=8000;}
});
document.getElementById('addDeckBtn').addEventListener('click',addVirtualDeck);

// ════ 33ms tick loop ═════════════════════════════════
let _wfF=0;
function tick(){
  _wfF++;
  tcTick();
  _updateOutTcDisplay();

  if(run){up=Math.floor((Date.now()-t0)/1000);pk++;}

  // Faders (only when running with bridge)
  if(run){
    faders.forEach((v,i)=>{
      const pct=Math.round(v/255*100);
      const fb=document.getElementById('fb'+i);if(fb)fb.style.height=pct+'%';
      const fv=document.getElementById('fv'+i);if(fv)fv.textContent=pct+'%';
      const fa=document.getElementById('fair'+i);if(fa)fa.classList.toggle('hide',!onAirCh[i]);
    });
  }

  Object.values(DECKS).forEach(d=>{
    const slot=d.slot;
    const el=document.getElementById('dk'+slot);if(!el)return;
    // update virtual deck playback position — ALWAYS (not gated by run)
    if(d.type!=='hw'&&d.au&&d.ld){
      d.pos=d.au.currentTime*1000;
    }

    // Interpolate timecode for smooth display (HW mode: pos updates on beat boundaries)
    // timecodeMs is track position; track advances at pitched rate in real-time
    let displayPos=d.pos||0;
    if(d.type==='hw'&&d.pl&&d.bpm>0&&d._posTime){
      const pitchMul=1+(d.pitch||0)/100;
      displayPos+=((Date.now()-d._posTime)*pitchMul);
    }
    const prog=d.dur>0?(displayPos/d.dur):0;

    // UI updates — ALWAYS
    el.setAttribute('data-st',d.type==='hw'?(d.pl?'hwplay':'hw'):d.pl?'play':d.cu?'cue':'stop');
    // USB media color border — persisted via inline style to override data-st CSS
    if(d._mediaColor>0){
      const MCOLORS={1:'#ff6b9d',2:'#ff4444',3:'#ff8c00',4:'#ffd700',5:'#44cc44',6:'#00cccc',7:'#4488ff',8:'#aa44ff'};
      el.style.borderColor=MCOLORS[d._mediaColor]||'';el.style.borderWidth='2px';
    }
    const tc=document.getElementById('dtc'+slot);
    if(tc)tc.textContent=fTC(displayPos);
    const timeEl=document.getElementById('dtime'+slot);
    if(timeEl)timeEl.textContent=fTmMs(displayPos)+' / '+(d.dur>0?fTmMs(d.dur):'--:--.--');
    const bkEl=document.getElementById('dbk'+slot);
    if(bkEl){
      let bkTxt='';
      if(d.bpm>0) bkTxt=Math.round(d.baseBpm||d.bpm)+' BPM';
      else bkTxt='— BPM';
      if(d.key) bkTxt+=' '+d.key;
      bkEl.textContent=bkTxt;
    }
    const dtnEl=document.getElementById('dtn'+slot);
    if(dtnEl){
      const txt=d.tn||'—';
      const curTxt=dtnEl.querySelector('.mq-inner')?.textContent||dtnEl.textContent;
      if(curTxt!==txt){
        dtnEl.classList.remove('scrolling');
        dtnEl.textContent=txt;
        // Measure overflow after layout settles
        requestAnimationFrame(()=>{
          if(!dtnEl.parentElement) return;
          const cw=dtnEl.clientWidth, sw=dtnEl.scrollWidth;
          if(sw>cw+5){
            const inner=document.createElement('span');
            inner.className='mq-inner';
            inner.textContent=txt;
            dtnEl.textContent='';
            dtnEl.appendChild(inner);
            const overflow=sw-cw;
            dtnEl.style.setProperty('--scroll-dist','-'+overflow+'px');
            dtnEl.style.setProperty('--scroll-dur',Math.max(5,overflow/25)+'s');
            dtnEl.classList.add('scrolling');
          }
        });
      }
    }
    const dtaEl=document.getElementById('dta'+slot);if(dtaEl)dtaEl.textContent=d.ar?' · '+d.ar:'';
    // Waveform key + BPM overlay
    const wfkEl=document.getElementById('wfkey'+slot);
    if(wfkEl)wfkEl.textContent=d.key||'';
    const wfbEl=document.getElementById('wfbpm'+slot);
    if(wfbEl&&d.bpm>0){
      const pitchPct=d.pitch!==undefined?d.pitch:((d.baseBpm&&d.baseBpm>0)?((d.bpm-d.baseBpm)/d.baseBpm*100):0);
      const ps=Math.abs(pitchPct)<0.05?'±0.00%':(pitchPct>0?'+':'')+pitchPct.toFixed(2)+'%';
      wfbEl.textContent=Math.round(d.bpm)+' '+ps;
    }else if(wfbEl)wfbEl.textContent='';
    const dhwlEl=document.getElementById('dhwl'+slot);
    if(dhwlEl)dhwlEl.textContent=d.type==='hw'?(d.model?'⬡ '+d.model:'⬡ HW'):'◎ VIRTUAL';

    // VU meter — ALWAYS for virtual, only run-gated for HW
    if(d.type==='hw'){
      if(run){d.vu=d.hwVu>0?d.hwVu:Math.max(0,(d.vu||0)-0.02);d.hwVu=Math.max(0,(d.hwVu||0)-0.04);d.vuL=d.vu;d.vuR=d.vu;}
    } else {
      const _getRms=(an,buf)=>{if(!an||!buf)return 0;an.getByteTimeDomainData(buf);let s=0;for(let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;s+=v*v;}return Math.sqrt(s/buf.length);};
      const active=d.pl||d.cu;
      if(d.vuAnL&&d.vuBufL){const v=_getRms(d.vuAnL,d.vuBufL);d.vuL=active?v:Math.max(0,(d.vuL||0)-0.015);}
      if(d.vuAnR&&d.vuBufR){const v=_getRms(d.vuAnR,d.vuBufR);d.vuR=active?v:Math.max(0,(d.vuR||0)-0.015);}
      d.vu=Math.max(d.vuL||0,d.vuR||0);
    }
    const _vuBar=(id,v)=>{const el2=document.getElementById(id);if(!el2)return;const h=Math.min(100,v*350);el2.style.height=h+'%';el2.style.background=h>70?'var(--red)':h>40?'var(--ylw)':'var(--grn)';};
    _vuBar('dvuL'+slot,d.vuL||0);_vuBar('dvuR'+slot,d.vuR||0);

    const bg=document.getElementById('dbg'+slot);
    if(bg){
      const _st=d.type==='hw'?'HW':d.scratch?'SCRATCH':d.pl?'PLAY':d.cu?'CUE':'STOP';
      const isHwPlay=d.type==='hw'&&d.pl;
      bg.textContent=d.type==='hw'?(d.pl?'PLAY':d.cu?'CUE':'HW'):d.scratch?'SCRATCH':d.pl?'PLAY':d.cu?'CUE':'STOP';
      bg.className='dbadge '+(isHwPlay?'bg':d.type==='hw'?(d.cu?'by':'bp'):d.scratch?'bp':d.pl?'bg':d.cu?'by':'bm');
    }
    // ON AIR / SYNC / MASTER badges (HW mode)
    const bAir=document.getElementById('dair'+slot);
    if(bAir)bAir.classList.toggle('hide',!d.onAir);
    const bSync=document.getElementById('dsync'+slot);
    if(bSync)bSync.classList.toggle('hide',!d.sync);
    const bMst=document.getElementById('dmst'+slot);
    if(bMst)bMst.classList.toggle('hide',!d.master);
    const did=document.getElementById('did'+slot);
    if(did){
      // USB media color takes priority over default state color
      const mc=d._mediaColor;
      const MCOLORS={0:'',1:'#ff6b9d',2:'#ff4444',3:'#ff8c00',4:'#ffd700',5:'#44cc44',6:'#00cccc',7:'#4488ff',8:'#aa44ff'};
      const usbC=mc>0?MCOLORS[mc]:'';
      did.style.color=usbC||(d.type==='hw'?'var(--pur)':d.scratch?'var(--org)':d.pl?'var(--grn)':d.cu?'var(--ylw)':'var(--tx3)');
    }
    const pb=el.querySelector('[data-a="play"]');
    if(pb&&d.type!=='hw')pb.textContent=d.pl?'⏸':'▶';
    const cub=el.querySelector('[data-a="cue"]');
    if(cub)cub.classList.toggle('ac',d.cu&&!d.pl);


    // Waveform — ALWAYS
    if(d.rgbWf){
      const wov=document.getElementById('wov'+slot);
      if(wov&&wov.width>0)drawOverview(slot,prog);
      const wzc=document.getElementById('wzc'+slot);
      if(wzc&&wzc.width>0)drawZoomWaveform(slot,prog);
    }

    // Beat phasor — ALWAYS (but freeze when stopped)
    if(d.ld&&d.bpm>0){
      const beatMs=60000/d.bpm;
      let beatInBar, phaseInBeat;
      if(d.type==='hw'&&d.beatInBar>0&&d._beatTime){
        if(!d.pl){
          // Stopped: freeze at current beat position
          beatInBar=d.beatInBar;
          phaseInBeat=0;
        }else{
          // Playing: use CDJ's beatInBar + wall-clock interpolation for smooth phase
          beatInBar=d.beatInBar;
          const elapsed=Date.now()-d._beatTime;
          phaseInBeat=Math.min(0.99,elapsed/beatMs);
          // Advance to next beat if elapsed > beatMs
          if(elapsed>beatMs){
            const extra=Math.floor(elapsed/beatMs);
            beatInBar=((beatInBar-1+extra)%4)+1;
            phaseInBeat=Math.min(0.99,(elapsed-extra*beatMs)/beatMs);
          }
        }
      }else{
        const barMs=beatMs*4;
        const posInBar=displayPos%barMs;
        beatInBar=Math.floor(posInBar/beatMs)+1;
        phaseInBeat=(posInBar%beatMs)/beatMs;
      }
      const blink=cfg.phasorMode==='blink';
      for(let b=1;b<=4;b++){
        const seg=document.getElementById('dphs'+slot+'_'+b);
        const fill=document.getElementById('dphsf'+slot+'_'+b);
        if(!seg||!fill)continue;
        const active=b===beatInBar;
        if(blink){
          seg.classList.toggle('on',active);
          fill.style.width=active?'100%':'0%';
        }else{
          seg.classList.toggle('on',active);
          fill.style.width=active?(phaseInBeat*100).toFixed(1)+'%':'0%';
        }
      }
    }

    // TCNet transmission — GATED by run AND E
    if(!E||!run)return;
    if(d.type==='hw'){
      // HW mode: updateLayer is called by _onPDJL, skip here
    } else if(d.ld){
      const beatPhase=Math.floor((d.pos/(60000/(d.bpm||128)))%4)*64;
      window.bridge.updateLayer(slot,{
        state:d.pl?3:d.cu?7:0,
        timecodeMs:Math.round(d.pos),
        bpm:d.bpm||0,
        trackId:d.trackId||0,
        totalLength:Math.round(d.dur)||0,
        trackName:d.tn||'',
        artistName:d.ar||'',
        beatPhase,
      });
    }
  });

  updateHeader();
  const slots=Object.keys(DECKS).map(Number).sort();
  document.getElementById('bDots').innerHTML=slots.map(s=>{
    const d=DECKS[s],c=d.type==='hw'?'var(--pur)':d.pl?'var(--grn)':d.cu?'var(--ylw)':d.ld?'rgba(52,211,153,.4)':'var(--tx4)';
    return`<div style="display:flex;align-items:center;gap:4px"><span class="dot${d.pl?' dpu':''}" style="background:${c}"></span><span style="font:400 9px var(--mn);color:var(--tx3)">${s+1}</span></div>`;
  }).join('');
  if(run)document.getElementById('bPk').textContent='TX: '+pk.toLocaleString();
}
setInterval(tick,33);

  const active=Object.values(DECKS).filter(d=>d.ld).length;

  document.getElementById('stBadge').textContent=run?'ONLINE':'OFFLINE';

}

      <div class="srw"><span class="srl">Data 전송</span><span class="srv" style="color:var(--org)">브로드캐스트 + 유니캐스트</span></div>

  el.querySelectorAll('[data-cfg]').forEach(inp=>{

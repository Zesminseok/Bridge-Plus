}

// ════ Tab switching ════════════════════════════════════
document.getElementById('tabs').onclick=e=>{
  const t=e.target.closest('.tab');if(!t)return;
  curTab=t.dataset.t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.t===curTab));
  const m={link:'pgLink',pdjl:'pgPdjl',tcnet:'pgTcnet',settings:'pgSettings'};
  Object.values(m).forEach(id=>document.getElementById(id)?.classList.add('hide'));
  document.getElementById(m[curTab])?.classList.remove('hide');
  if(curTab==='pdjl')renderPDJL();
  if(curTab==='tcnet')renderTcnet();
  if(curTab==='settings'){loadInterfaces();renderSettings();}
};

async function loadInterfaces(){
  if(E){allIfaces=await window.bridge.getInterfaces();}
}

// ════ START / STOP ═══════════════════════════════════
document.getElementById('mainBtn').onclick=()=>run?doStop():doStart();
// Auto-start after 2 seconds
if(E) setTimeout(()=>{if(!run) doStart();}, 2000);
async function doStart(){
  if(E){
    const r=await window.bridge.start({
      broadcast:'auto',
      tcnetIface:cfg.tcnetIface||null,
      pdjlIface:cfg.pdjlIface||null,
      tcnetMode:cfg.tcnetMode||'auto',
      nodeName:cfg.nm||'BRIDGE29',
      tcnetUnicast:!!cfg.tcnetUnicast,
      tcnetAllIfaces:!!cfg.tcnetAllIfaces,
    });
    if(!r.ok){alert('시작 실패: '+r.err);return;}
    pdjlPort=r.pdjlPort||null;
    if(r.nodeName) TC_NAME=r.nodeName;
    // re-register all existing virtual decks after start
    for(const [slot,d] of Object.entries(DECKS)){
      if(d.type==='virtual'){
        window.bridge.registerVirtualDeck(Number(slot),'CDJ-3000');
        if(d._artRawB64 && window.bridge?.setVirtualArt)
          window.bridge.setVirtualArt(Number(slot), d._artRawB64);
      }
    }
    // Enable HW mode on bridge if in HW mode
    if(glMode==='hw')for(let i=0;i<4;i++) window.bridge.setHWMode(i,true);
  }
  run=true;t0=Date.now();pk=0;
  // Re-send any pending virtual deck artwork to Arena (may have loaded before bridge started)
  if(E&&window.bridge?.setVirtualArt){
    Object.values(DECKS).forEach(d=>{
      if(d.type!=='hw'&&d._artRawB64){window.bridge.setVirtualArt(d.slot,d._artRawB64);}
    });
  }
  const hd=document.getElementById('hDot'),hs=document.getElementById('hSt'),mb=document.getElementById('mainBtn');
  hd.style.background='var(--grn)';hd.classList.add('dpu');
  hs.textContent='ONLINE';hs.style.color='var(--grn)';
  mb.textContent='STOP';mb.className='btn btnr';
}
async function doStop(){
  if(E)await window.bridge.stop();
  run=false;pdjlPort=null;
  Object.values(DECKS).forEach(d=>{if(d.au)d.au.pause();d.pl=false;});
  const hd=document.getElementById('hDot'),hs=document.getElementById('hSt'),mb=document.getElementById('mainBtn');
  hd.style.background='var(--tx4)';hd.classList.remove('dpu');
  hs.textContent='OFFLINE';hs.style.color='var(--tx3)';
  mb.textContent='START';mb.className='btn btng';
}

// ════ Electron IPC events ════════════════════════════
if(E){
  window.bridge.onStatus?.(d=>{
    up=d.uptime;pk=d.pkts||pk;
    if(d.hwMode)d.hwMode.forEach((hw,i)=>{if(DECKS[i])DECKS[i].type=hw?'hw':'virtual';});
    if(d.faders)faders=d.faders;
    if(d.onAir)onAirCh=d.onAir;
    if(d.pdjlPort!=null)pdjlPort=d.pdjlPort;
    if(d.devices){pdjlDevices=d.devices;if(curTab==='pdjl')renderPDJL();}
  });
  window.bridge.onTcnetNode?.(n=>{tcNodes[n.name+'@'+n.ip]={...n,lastSeen:Date.now()};if(curTab==='tcnet')renderTcnet();});
  window.bridge.onCDJStatus?.(d=>{
    const{layerIndex,status}=d;
    // Beat packet (0x28) — update beatInBar for display
    if(status._beatPacket){
      const dk=DECKS[layerIndex];if(!dk||dk.type!=='hw')return;
      if(status.beatInBar>0) dk.beatInBar=status.beatInBar;
      if(status.bpmFromBeat>0&&!dk.bpm) dk.bpm=status.bpmFromBeat;
      dk._beatTime=Date.now();
      return;
    }
    // CDJ-3000 Precise Position — direct ms update, highest priority
    if(status._precisePos){
      const dk=DECKS[layerIndex];if(!dk||dk.type!=='hw')return;
      dk._hasPrecisePos=true;
      if(status.timecodeMs!=null){dk.pos=status.timecodeMs;dk._posTime=Date.now();}
      if(status.trackLengthSec>0) dk.dur=status.trackLengthSec*1000;
      if(status.bpmEffective>0) dk.bpm=Math.round(status.bpmEffective*100)/100;
      return;
    }
    ensureHWDeck(status.playerNum);
    const dk=DECKS[layerIndex];if(!dk||dk.type!=='hw')return;
    // Track change detection — reset stale data when track changes
    // Require 3 consecutive different trackId packets to confirm a real track change
    // (avoids false resets from dbserver reconnection or transient ID glitches)
    const newTid=status.trackId||0;
    const oldTid=dk._trackId||0;
    if(newTid>0 && oldTid>0 && newTid!==oldTid){
      dk._tidChangeCount=(dk._tidChangeCount||0)+1;
      dk._tidChangeTo=newTid;
      if(dk._tidChangeCount>=3 && dk._tidChangeTo===newTid){
        console.log(`[UI] P${status.playerNum} track change confirmed: ${oldTid} → ${newTid}`);
        dk.tn='';dk.ar='';dk.pos=0;dk._posTime=0;dk.artUrl='';dk.art=null;dk._hwWfSegs=null;dk._hwWfImg=null;dk.rgbWfDetail=null;dk._wfCache=null;dk.cuePoints=null;dk._beatGrid=null;
        dk.baseBpm=0;dk.bpm=0;dk.key='';dk._beatTime=0;dk._metaBaseBpm=false;
        dk._trackId=newTid;dk._tidChangeCount=0;
        const _artEl=document.getElementById('dart'+layerIndex);
        if(_artEl)_artEl.innerHTML='<span class="noart-icon">♪</span>';
        // Update title/artist DOM
        const _tnEl=document.getElementById('dtn'+layerIndex);if(_tnEl)_tnEl.textContent='—';
        const _taEl=document.getElementById('dta'+layerIndex);if(_taEl)_taEl.textContent='';
        // Re-request metadata — bridge-core may have already fetched it before this reset
        setTimeout(()=>window.bridge.refreshMeta(),200);
      }
    } else {
      dk._tidChangeCount=0;
      if(newTid>0) dk._trackId=newTid;
    }
    // Always update model name (even when no track loaded)
    if(status.name&&!dk.model){dk.model=status.name;const _hwlEl=document.getElementById('dhwl'+layerIndex);if(_hwlEl)_hwlEl.textContent='⬡ '+status.name;else patchDeck(layerIndex);}
    else if(status.name)dk.model=status.name;
    // If track ejected (hasTrack went false for 2+ consecutive status), reset
    if(!status.hasTrack){
      dk._noTrackCount=(dk._noTrackCount||0)+1;
      if(dk._noTrackCount>=3 && dk.ld){
        console.log(`[UI] P${status.playerNum} track ejected`);
        dk.ld=false;dk.tn='';dk.ar='';dk.pos=0;dk._posTime=0;dk.pl=false;dk.bpm=0;
        dk.artUrl='';dk._hwWfSegs=null;dk._hwWfImg=null;dk.rgbWfDetail=null;dk._wfCache=null;dk.cuePoints=null;dk._beatGrid=null;dk.baseBpm=0;dk.key='';dk._trackId=0;dk._metaBaseBpm=false;
        patchDeck(layerIndex);
      }
      return;
    }
    dk._noTrackCount=0;
    // STATE: IDLE=0, STOPPED=2, PLAYING=3, LOOPING=4, PAUSED=5, CUEDOWN=7
    const wasPl=dk.pl, wasCu=dk.cu;
    dk.pl=status.state===3||status.state===4; // PLAYING or LOOPING
    dk.cu=status.state===7||status.state===8;  // CUEDOWN or PLATTERDOWN
    dk._isLooping=!!status.isLooping; // CDJ active loop state
    if(dk.pl!==wasPl||dk.cu!==wasCu){dk._stateChanged=true;dk._smoothPos=null;}
    if(status.timecodeMs!=null&&status.timecodeMs!==dk.pos){dk.pos=status.timecodeMs;dk._posTime=Date.now();}
    // NXS2 debug: log state/timecode for non-precise decks
    if(!dk._hasPrecisePos){
      if(!dk._nxDbg)dk._nxDbg=0;
      if(dk._nxDbg++<40||dk._nxDbg%100===0)
        console.log(`[NX2-UI] P${status.playerNum} st=${status.state} pl=${dk.pl} tc=${status.timecodeMs} pos=${dk.pos} pm=${status.pitchMultiplier?.toFixed(3)} bpm=${status.bpm||status.bpmEffective}`);
    }
    if(status.bpmEffective&&status.bpmEffective<500)dk.bpm=Math.round(status.bpmEffective*100)/100;
    else if(status.bpm&&status.bpm<500)dk.bpm=Math.round(status.bpm*100)/100;
    // Use calculated baseBpm only if metadata hasn't provided authoritative value
    if(status.bpmTrack&&!dk._metaBaseBpm)dk.baseBpm=Math.round(status.bpmTrack*100)/100;
    if(status.key)dk.key=_toCamelot(status.key);
    if(status.trackName)dk.tn=status.trackName;
    if(status.artistName)dk.ar=status.artistName;
    if(status.name)dk.model=status.name;
    if(status.p1Name)dk.stateName=status.p1Name;
    const wasLoaded=dk.ld;
    dk.ld=!!status.hasTrack;
    if(!wasLoaded&&dk.ld){
      patchDeck(layerIndex); // re-render only this deck when track loads
      // If no metadata yet after 2s, trigger refresh
      if(!dk._metaRetry){dk._metaRetry=setTimeout(()=>{
        dk._metaRetry=null;
        if(dk.ld&&!dk.tn&&E&&run)window.bridge.refreshMeta?.();
      },2000);}
    }
    if(wasLoaded&&!dk.ld){patchDeck(layerIndex);if(dk._metaRetry){clearTimeout(dk._metaRetry);dk._metaRetry=null;}}
    if(status.beatInBar&&status.beatInBar!==dk.beatInBar){
      dk.beatInBar=status.beatInBar;dk._beatTime=Date.now();
      // Cache beat grid anchor: ms position of bar start (beat 1), using baseBpm (native track time)
      const _abpm=dk.baseBpm||dk.bpm;
      if(_abpm>0){const bMs=60000/_abpm;dk._barAnchorMs=(dk.pos||0)-(status.beatInBar-1)*bMs;}
    }
    if(status.beatNum>0)dk._beatNum=status.beatNum;
    dk.onAir=!!status.isOnAir;
    dk.master=!!status.isMaster;
    dk.sync=!!status.isSync;
    dk.vinylMode=!!status.isVinylMode;
    if(status.pitch!==undefined)dk.pitch=Math.round(status.pitch*100)/100;
    if(status.mediaColor!==undefined&&status.mediaColor>0&&status.mediaColor<=8){
      dk._mediaColor=status.mediaColor;
    }
    // Album art request disabled for now (dbserver protocol needs full implementation)
    // TODO: implement proper dbserver handshake (setup + query)
    if(false && status.trackId && status.trackId!==dk._lastTrackId && status.ip && status.slot){
      dk._lastTrackId=status.trackId;
      window.bridge.requestArtwork({ip:status.ip,slot:status.slot,artworkId:status.trackId,playerNum:status.playerNum});
    }
  });
  // HW waveform preview from CDJ / dbserver
  window.bridge.onWaveformPreview?.(d=>{
    const li=d.playerNum-1;
    const dk=DECKS[li];if(!dk||dk.type!=='hw')return;
    if(d.pts&&d.pts.length>0){
      if(d.wfType==='color'){
        // CDJ-3000 color waveform: accumulate segments → 3-band pseudo-mapping
        if(!dk._hwWfSegs)dk._hwWfSegs={};
        dk._hwWfSegs[d.seg]=d.pts;
        const segs=Object.keys(dk._hwWfSegs).map(Number).sort((a,b)=>a-b);
        const allPts=[];
        for(const s of segs) allPts.push(...dk._hwWfSegs[s]);
        dk.rgbWf=allPts.map(p=>{
          const [bass,mid,treble]=_cdjColorTo3Band(p.color);
          const h=p.height/255;
          // Store pure band ratios in r/g/b, height in h — shader uses wf.a for height
          return{r:bass,g:mid,b:treble,h,mn:-h,mx:h};
        });
      } else {
        // dbserver preview waveform: {height:0-31, color:0-7} → 3-band pseudo-mapping
        dk.rgbWf=d.pts.map(p=>{
          const [bass,mid,treble]=_cdjColorTo3Band(p.color);
          const h=p.height/31;
          return{r:bass,g:mid,b:treble,h,mn:-h,mx:h};
        });
      }
      // Don't override duration if we have a real value from metadata
      if(!dk.dur||dk.dur<=0) dk.dur=dk.rgbWf.length*30;
      dk._wfCache=null; // invalidate cache
      buildWaveformCache(li);
      const _wfD=dk.rgbWfDetail||dk.rgbWf;
      if(dk.wgl&&_wfD)dk.wgl.setData(_wfD,(_wfD.length/150*1000)||1);
      if(dk.ovgl&&_wfD)dk.ovgl.setData(_wfD);
      console.log(`[UI] P${d.playerNum} waveform: ${dk.rgbWf.length}pts (${d.wfType})`);
      const _prog=dk.dur>0&&dk.pos>0?dk.pos/dk.dur:0;
      drawOverview(li,_prog);drawZoomWaveform(li,_prog);
    }
  });
  // HW album art from CDJ dbserver
  window.bridge.onAlbumArt?.(d=>{
    const li=d.playerNum-1;
    const dk=DECKS[li];if(!dk)return;
    dk.art=d.art||null;
    const el=document.getElementById('dart'+li);
    if(el){
      if(d.art){
        const img=el.querySelector('img');
        if(img){img.src=d.art;}
        else{el.innerHTML=`<img src="${d.art}" alt="" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.innerHTML='<span class=\\'noart-icon\\'>♪</span>'">`;}
      } else {
        // 아트워크 없음 → 플레이스홀더로 복원
        el.innerHTML='<span class="noart-icon">♪</span>';
      }
    }
  });
  // HW cue points from dbserver (memory cues + hot cues)
  window.bridge.onCuePoints?.(d=>{
    const li=d.playerNum-1;
    const dk=DECKS[li];if(!dk)return;
    dk.cuePoints=d.cues;
    console.log(`[UI] P${d.playerNum} cues: ${d.cues.length} (${d.cues.map(c=>c.type==='hot'?'H'+c.hotCueNum:'M').join(',')})`);
  });
  // Beat grid from dbserver (0x2204) — accurate beat positions from Rekordbox analysis
  window.bridge.onBeatGrid?.(d=>{
    const li=d.playerNum-1;
    const dk=DECKS[li];if(!dk)return;
    dk._beatGrid=d.beats; // [{beatInBar, bpm, timeMs}]
    if(d.baseBpm>0){dk.baseBpm=d.baseBpm;dk._metaBaseBpm=true;}
    console.log(`[UI] P${d.playerNum} beat grid: ${d.beats.length} beats, baseBpm=${d.baseBpm}`);
  });
  // HW detail waveform from dbserver (150pts/sec — for zoom display)
  window.bridge.onWaveformDetail?.(d=>{
    const li=d.playerNum-1;
    const dk=DECKS[li];if(!dk||dk.type!=='hw')return;
    if(d.pts&&d.pts.length>0){
      if(d.wfType==='nxs2_3band'){
        // PWV7 3-band: raw bass/mid/treble (0-1 each)
        dk.rgbWfDetail=d.pts.map(p=>{
          const h=Math.max(p.low||0,p.mid||0,p.hi||0);
          return{r:p.low||0,g:p.mid||0,b:p.hi||0,h,mn:-h,mx:h};
        });
        dk._pwv7=true;
      } else {
        // Standard 1-byte encoding: 5-bit height + 3-bit color
        dk.rgbWfDetail=d.pts.map(p=>{
          const [bass,mid,treble]=_cdjColorTo3Band(p.color);
          const h=p.height/31;
          return{r:bass,g:mid,b:treble,h,mn:-h,mx:h};
        });
      }
      // Duration from detail waveform: pts / 150 segments per second * 1000ms
      const detailDur=Math.round(d.pts.length/150*1000);
      if(!dk.dur||dk.dur<=0||Math.abs(dk.dur-detailDur)>5000) dk.dur=detailDur;
      dk._wfCache=null; // invalidate cache — detail waveform replaces preview
      buildWaveformCache(li);
      const _wfD2=dk.rgbWfDetail||dk.rgbWf;
      if(dk.wgl&&_wfD2)dk.wgl.setData(_wfD2,(_wfD2.length/150*1000)||1);
      if(dk.ovgl&&_wfD2)dk.ovgl.setData(_wfD2);
      console.log(`[UI] P${d.playerNum} detail waveform: ${d.pts.length}pts (${Math.round(detailDur/1000)}s)`);
      const _prog2=dk.dur>0&&dk.pos>0?dk.pos/dk.dur:0;
      drawOverview(li,_prog2);drawZoomWaveform(li,_prog2);
    }
  });
  // Track metadata from dbserver (title, artist, album, key, etc.)
  window.bridge.onTrackMeta?.(d=>{
    const li=d.playerNum-1;
    const dk=DECKS[li];if(!dk)return;
    if(d.title)dk.tn=d.title;
    if(d.artist)dk.ar=d.artist;
    if(d.key)dk.key=_toCamelot(d.key);
    if(d.duration>0)dk.dur=d.duration*1000; // seconds→ms
    if(d.bpm>0){dk.baseBpm=d.bpm;dk._metaBaseBpm=true;} // metadata BPM is authoritative
    if(d.album)dk.album=d.album;
    console.log(`[UI] P${d.playerNum} meta: "${d.title}" by "${d.artist}"`);
    // Update track name in TCNet layer
    if(window.bridge&&dk.tn){
      window.bridge.updateLayer(li,{trackName:dk.tn,artistName:dk.ar||''});
    }
    // Incremental DOM update — no full rebuild needed for meta changes
    const _tnEl=document.getElementById('dtn'+li);if(_tnEl)_tnEl.textContent=dk.tn||'—';
    const _taEl=document.getElementById('dta'+li);if(_taEl)_taEl.textContent=dk.ar||'';
    const _sepEl=document.getElementById('dtsep'+li);if(_sepEl)_sepEl.style.display=dk.ar?'':'none';
  });
  window.bridge.onDJMStatus?.(d=>{
    faders=d.faders;
    if(d.eq){eqBands=d.eq;}
  });
  window.bridge.onDJMMeter?.(ch=>{
    // ch[0..3] = DJM channel 1-4 post-fader level (0-255)
    ch.forEach((v,i)=>{if(DECKS[i]){DECKS[i].hwVu=v/255;DECKS[i]._djmMeter=v;}});
  });
  window.bridge.onDevices?.(devs=>{
    pdjlDevices=devs;
    const hwCdjs=devs.filter(d=>d.type==='CDJ'&&!d.virtual);
    // Add new HW decks
    hwCdjs.forEach(d=>ensureHWDeck(d.playerNum));
    // Remove HW decks whose CDJ disappeared
    if(glMode==='hw'){
      const activeNums=new Set(hwCdjs.map(d=>d.playerNum));
      Object.keys(DECKS).map(Number).forEach(slot=>{
        if(DECKS[slot]&&DECKS[slot].type==='hw'&&!activeNums.has(slot+1)){
          if(DECKS[slot].au){try{DECKS[slot].au.pause();}catch(_){}}
          delete DECKS[slot];
          if(E&&run)window.bridge.setHWMode(slot,false);
        }
      });
      renderDecks();
    }
    // DJM hint
    const djmHint=document.getElementById('djmHint');
    const djmDevs=devs.filter(d=>d.type==='DJM');
    if(djmHint){if(djmDevs.length){djmHint.style.display='';djmHint.textContent='♪ '+djmDevs.map(d=>d.name).join(', ')+' CONNECTED';}else{djmHint.style.display='none';}}
    if(curTab==='pdjl')renderPDJL();
  });
  loadInterfaces();
  // Shutdown overlay
  window.bridge.onQuitting?.(()=>{
    // Destroy all WebGL contexts to prevent V8 BackingStore crash on window close
    for(const k of Object.keys(DECKS)){
      const d=DECKS[k];
      try{if(d.wgl){d.wgl.destroy();d.wgl=null;}}catch(_){}
      try{if(d.ovgl){d.ovgl.destroy();d.ovgl=null;}}catch(_){}
    }
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px';
    ov.innerHTML='<div style="font:600 16px var(--sn);color:var(--tx);letter-spacing:.05em">종료 중...</div><div style="font:400 11px var(--mn);color:var(--tx3)">TCNet 연결 해제 및 소켓 정리</div>';
    document.body.appendChild(ov);
  });
}

function fTC(ms){if(!ms&&ms!==0)return'--:--:--:--';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),f=Math.floor((ms%1000)/33.33);return z(h)+':'+z(m)+':'+z(s)+':'+z(f);}
function fTm(ms){if(!ms)return'0:00';return Math.floor(ms/60000)+':'+z(Math.floor((ms%60000)/1000));}
// mm:ss.mm format (centiseconds)
function fTmMs(ms){if(!ms&&ms!==0)return'--:--.----';const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),ml=Math.floor(ms%1000);return m+':'+z(s)+'.'+z3(ml);}
function z3(n){return n<10?'00'+n:n<100?'0'+n:''+n;}
// Cue point time: mm:ss.cs (centiseconds, 2 digits)
function fTcue(ms){if(!ms&&ms!==0)return'--:--.---';const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),ml=Math.floor(ms%1000);return z(m)+':'+z(s)+'.'+z3(ml);}
// Bar.Beat counter like Rekordbox ("8.2")
function fBars(posMs,bpm){if(!bpm||!posMs)return'0.0';const bMs=60000/bpm,bar=Math.floor(posMs/(bMs*4))+1,beat=Math.floor((posMs%(bMs*4))/bMs)+1;return bar+'.'+beat;}
function z(n){return String(Math.max(0,Math.round(n))).padStart(2,'0');}

// initial state: no decks — created on CDJ connect or manual add
renderDecks();
</script></body></html>

name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (Windows x64)
        run: npx electron-rebuild --force --arch=x64

      - name: Verify abletonlink.node built for win32
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path node_modules\abletonlink -Recurse -Filter *.node
          if (-not $found) { throw "abletonlink.node not found after rebuild" }
          $found | ForEach-Object { Write-Host "Built: $($_.FullName)" }

      - name: Package Windows x64 installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BRIDGE-Plus-windows-x64
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest*.yml
          if-no-files-found: error
